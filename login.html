<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#D4540E">
<meta name="mobile-web-app-capable" content="yes">
<title>Mtaiirus — Sign In / Sign Up</title>
<meta name="description" content="Sign in to Mtaiirus to access free premium courses from India's best educators.">
<link rel="icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
<link rel="apple-touch-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #D4540E;
  --accent-light: #F0A87A;
  --accent-dark: #bf4a0c;
  --accent-soft: rgba(212,84,14,.08);
  --ink: #1A1814;
  --bg: #F5F2EB;
  --bg2: #ECEAE2;
  --card: #FFFDFB;
  --border: rgba(26,24,20,.08);
  --border-focus: rgba(212,84,14,.3);
  --muted: #6B6760;
  --muted-light: #B0ADA7;
  --green: #2D6A3F;
  --font-heading: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --ease: cubic-bezier(.4,0,.2,1);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html,body{
  height:100%;
  font-family:var(--font-body);
  background:
    radial-gradient(ellipse at 20% 0%, rgba(212,84,14,.06), transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(240,168,122,.04), transparent 50%),
    var(--bg);
  display:flex;justify-content:center;align-items:center;
  padding:16px;
  -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
}

.floating-words{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;opacity:.02;font-family:var(--font-heading);font-weight:800;font-size:clamp(1.2rem,3vw,3rem);color:var(--ink);white-space:nowrap;user-select:none}
.float-word{position:absolute;animation:floatAround 26s infinite alternate ease-in-out;letter-spacing:-2px}
.float-word:nth-child(1){top:8%;left:3%;animation-duration:22s}
.float-word:nth-child(2){top:22%;right:5%;animation-duration:30s;animation-delay:-5s}
.float-word:nth-child(3){bottom:18%;left:8%;animation-duration:24s;animation-delay:-8s}
.float-word:nth-child(4){bottom:32%;right:4%;animation-duration:28s;animation-delay:-13s}
.float-word:nth-child(5){top:48%;left:28%;animation-duration:32s;animation-delay:-4s}
@keyframes floatAround{0%{transform:translate(0,0)rotate(0deg)}25%{transform:translate(35px,-25px)rotate(1.5deg)}50%{transform:translate(-25px,30px)rotate(-1.5deg)}75%{transform:translate(20px,15px)rotate(.8deg)}100%{transform:translate(-15px,-20px)rotate(-.8deg)}}

.login-wrap{
  position:relative;z-index:1;
  width:100%;max-width:440px;
  background:var(--card);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(26,24,20,.12),0 0 0 1px var(--border);
  animation:popIn .35s var(--ease);
}
@keyframes popIn{from{opacity:0;transform:scale(.94)translateY(8px)}to{opacity:1;transform:scale(1)translateY(0)}}

.login-hero{
  background:linear-gradient(135deg,#1A1814 0%,#2d2520 50%,#3d2a1a 100%);
  padding:36px 24px 28px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  position:relative;overflow:hidden;
}
.login-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 65% 25%,rgba(240,168,122,.25)0%,transparent 60%);
}
.login-hero::after{
  content:'';position:absolute;top:-40px;right:-40px;
  width:150px;height:150px;border-radius:50%;
  background:rgba(212,84,14,.1);pointer-events:none;
}

.brand-logo{
  width:56px;height:56px;
  background:rgba(245,242,235,.1);
  border:2px solid rgba(245,242,235,.18);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;overflow:hidden;
}
.brand-logo img{width:40px;height:40px;object-fit:contain}

.brand-name{
  font-family:var(--font-heading);font-size:1.3rem;font-weight:800;
  color:var(--bg);z-index:1;letter-spacing:1.2px;
}
.brand-name span{color:var(--accent-light)}

.hero-tagline{font-size:11px;color:rgba(245,242,235,.5);z-index:1;text-align:center;letter-spacing:.5px}

.login-body{padding:28px 28px 32px;display:flex;flex-direction:column;gap:16px}
.login-body h2{font-family:var(--font-heading);font-size:1.2rem;font-weight:700;color:var(--ink);letter-spacing:-.3px;text-align:center}

.tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;gap:4px}
.tab{flex:1;height:42px;border:none;background:transparent;border-radius:10px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s var(--ease);-webkit-tap-highlight-color:transparent}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--card);color:var(--accent);box-shadow:0 1px 4px rgba(26,24,20,.06)}

.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.field input{
  height:50px;border:1.5px solid var(--border);border-radius:14px;
  padding:0 16px;font-size:15px;font-family:inherit;color:var(--ink);outline:none;
  transition:border .2s var(--ease),box-shadow .2s var(--ease);background:var(--bg);
  -webkit-appearance:none;appearance:none;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(212,84,14,.08)}
.field input::placeholder{color:var(--muted-light)}
.field input.error{border-color:var(--accent);box-shadow:0 0 0 4px rgba(212,84,14,.08)}

.pass-wrap{position:relative}
.pass-wrap input{width:100%;padding-right:52px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted-light);display:flex;align-items:center;padding:8px;-webkit-tap-highlight-color:transparent;transition:color .15s}
.eye-btn:hover{color:var(--accent)}

.forgot-link{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer;text-align:right;margin-top:-8px;-webkit-tap-highlight-color:transparent;transition:color .15s}
.forgot-link:hover{text-decoration:underline;color:var(--accent-dark)}

.error-msg{
  font-size:12px;color:var(--accent);font-weight:500;
  display:none;align-items:center;gap:6px;
  padding:10px 14px;background:var(--accent-soft);
  border-radius:10px;border:1px solid rgba(212,84,14,.15);
}
.error-msg.show{display:flex}
.error-msg.success{color:var(--green);background:rgba(45,106,63,.08);border-color:rgba(45,106,63,.15)}

.submit-btn{
  height:52px;background:var(--ink);
  color:var(--bg);border:none;border-radius:14px;
  font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;
  letter-spacing:.3px;transition:all .25s var(--ease);
  display:flex;align-items:center;justify-content:center;gap:10px;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 16px rgba(26,24,20,.1);
}
.submit-btn:hover{background:var(--accent);color:#fff;transform:translateY(-1px);box-shadow:0 8px 28px rgba(212,84,14,.25)}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{opacity:.55;cursor:not-allowed;background:var(--muted-light);transform:none;box-shadow:none}

.spinner{width:18px;height:18px;border:2.5px solid rgba(245,242,235,.25);border-top-color:var(--bg);border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{display:flex;align-items:center;gap:12px;color:var(--muted-light);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.google-btn{
  height:50px;border:1.5px solid var(--border);background:var(--card);border-radius:14px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:14px;font-weight:600;color:var(--ink);font-family:inherit;cursor:pointer;
  transition:all .2s var(--ease);-webkit-tap-highlight-color:transparent;
}
.google-btn:hover{border-color:var(--accent);background:var(--accent-soft)}
.google-btn:active{background:var(--bg)}
.google-btn svg{width:18px;height:18px;flex-shrink:0}

.footer-text{font-size:11px;color:var(--muted-light);text-align:center;line-height:1.7}
.footer-text span{color:var(--accent);cursor:pointer;font-weight:600;transition:color .15s}
.footer-text span:hover{color:var(--accent-dark);text-decoration:underline}

#signupFields{display:none}

@media (max-width:480px){
  .login-wrap{border-radius:20px}
  .login-hero{padding:28px 20px 24px}
  .login-body{padding:20px 20px 24px}
  .brand-logo{width:48px;height:48px}
  .brand-logo img{width:34px;height:34px}
  .brand-name{font-size:1.1rem}
  .field input,.submit-btn,.google-btn{height:48px;font-size:14px}
  .tab{height:40px;font-size:13px}
  input,button,.google-btn,.submit-btn,.tab{font-size:16px}
}
</style>
</head>
<body>

<div class="floating-words">
  <div class="float-word">FREE COURSES</div>
  <div class="float-word">PREMIUM ACCESS</div>
  <div class="float-word">MTAIIRUS</div>
  <div class="float-word">NO SIGNUP</div>
  <div class="float-word">STUDY FREE</div>
</div>

<div class="login-wrap">
  <div class="login-hero">
    <div class="brand-logo">
      <img src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" alt="Mtaiirus" onerror="this.innerHTML='<span style=font-size:24px;font-weight:800;color:var(--accent-light)>M</span>'">
    </div>
    <div class="brand-name">MTAI<span>IRUS</span></div>
    <div class="hero-tagline">Free Premium Courses · No Subscription</div>
  </div>

  <div class="login-body">
    <h2 id="formTitle">Welcome Back 👋</h2>

    <div class="tabs">
      <button class="tab active" id="tabSignin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div id="signupFields">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name" autocomplete="name">
      </div>
    </div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="emailInp" placeholder="you@example.com" autocomplete="email" inputmode="email">
    </div>

    <div class="field">
      <label>Password</label>
      <div class="pass-wrap">
        <input type="password" id="passInp" placeholder="••••••••" autocomplete="current-password">
        <button class="eye-btn" type="button" onclick="togglePass()">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot-link" id="forgotLink" onclick="forgotPassword()">Forgot password?</div>

    <div class="error-msg" id="errorMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText"></span>
    </div>

    <button class="submit-btn" id="authBtn" onclick="handleAuth()">
      <div class="spinner" id="btnSpinner"></div>
      <span id="btnText">Sign In</span>
    </button>

    <div class="divider">or continue with</div>

    <button class="google-btn" onclick="googleSignIn()">
      <svg viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="footer-text" id="switchText">
      Don't have an account? <span onclick="switchTab('signup')">Create one</span>
    </div>
    <div class="footer-text">By continuing, you agree to our <span>Terms</span> and <span>Privacy Policy</span></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://meatemqrhqthgpxwstrl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lYXRlbXFyaHF0aGdweHdzdHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTc5NjEsImV4cCI6MjA5NjU3Mzk2MX0.Qnx5wU6o0OvBFrWlq3jjt3kN2sa20nhEv4zGZbQu_pw";
const REDIRECT_AFTER_LOGIN = 'index.html';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentTab = 'signin';
let passVisible = false;

function clearError() {
  const e = document.getElementById('errorMsg');
  e.classList.remove('show', 'success');
  ['emailInp', 'passInp', 'fullName'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.classList.remove('error');
  });
}

function showError(msg, isSuccess = false) {
  const el = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  el.classList.add('show');
  if(isSuccess) el.classList.add('success');
  else el.classList.remove('success');
}

function setLoading(on) {
  const btn = document.getElementById('authBtn');
  const sp = document.getElementById('btnSpinner');
  const tx = document.getElementById('btnText');
  btn.disabled = on;
  sp.style.display = on ? 'block' : 'none';
  tx.style.opacity = on ? '0.4' : '1';
}

// ✅ Save login state to localStorage
function saveLoginState() {
  localStorage.setItem('mtaiirus_logged_in', 'true');
  localStorage.setItem('mtaiirus_login_time', Date.now());
}

function switchTab(tab) {
  currentTab = tab;
  clearError();
  document.getElementById('tabSignin').classList.toggle('active', tab === 'signin');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('signupFields').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('forgotLink').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('btnText').textContent = tab === 'signin' ? 'Sign In' : 'Create Account';
  document.getElementById('formTitle').textContent = tab === 'signin' ? 'Welcome Back 👋' : 'Join Mtaiirus ✨';
  document.getElementById('switchText').innerHTML = tab === 'signin' 
    ? `Don't have an account? <span onclick="switchTab('signup')">Create one</span>`
    : `Already have an account? <span onclick="switchTab('signin')">Sign In</span>`;
  document.getElementById('passInp').autocomplete = tab === 'signin' ? 'current-password' : 'new-password';
}

function togglePass() {
  passVisible = !passVisible;
  document.getElementById('passInp').type = passVisible ? 'text' : 'password';
  document.getElementById('eyeIcon').innerHTML = passVisible ? 
    `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>` :
    `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}

async function handleAuth() {
  clearError();
  currentTab === 'signin' ? await handleSignIn() : await handleSignUp();
}

async function handleSignIn() {
  const email = document.getElementById('emailInp').value.trim();
  const pass = document.getElementById('passInp').value;
  if(!email) { document.getElementById('emailInp').classList.add('error'); showError('Please enter your email'); return; }
  if(!pass) { document.getElementById('passInp').classList.add('error'); showError('Please enter your password'); return; }
  
  setLoading(true);
  try {
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
    if(error) throw error;
    // ✅ SAVE LOGIN STATE
    saveLoginState();
    window.location.href = REDIRECT_AFTER_LOGIN;
  } catch(err) { showError(err.message); setLoading(false); }
}

async function handleSignUp() {
  const fullName = document.getElementById('fullName').value.trim();
  const email = document.getElementById('emailInp').value.trim();
  const pass = document.getElementById('passInp').value;
  
  if(!fullName) { document.getElementById('fullName').classList.add('error'); showError('Please enter your full name'); return; }
  if(!email) { document.getElementById('emailInp').classList.add('error'); showError('Please enter your email'); return; }
  if(!pass) { document.getElementById('passInp').classList.add('error'); showError('Please create a password'); return; }
  if(pass.length < 6) { document.getElementById('passInp').classList.add('error'); showError('Password must be at least 6 characters'); return; }
  
  setLoading(true);
  try {
    const { data, error } = await supabaseClient.auth.signUp({
      email, password: pass,
      options: { data: { full_name: fullName } }
    });
    if(error) throw error;
    if(data.user) {
      // ✅ SAVE LOGIN STATE
      saveLoginState();
      window.location.href = REDIRECT_AFTER_LOGIN;
    } else {
      showError('✓ Check your email to confirm your account!', true);
      setLoading(false);
    }
  } catch(err) { showError(err.message); setLoading(false); }
}

async function googleSignIn() {
  setLoading(true);
  try {
    // ✅ SAVE LOGIN STATE before redirect
    saveLoginState();
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/' + REDIRECT_AFTER_LOGIN }
    });
    if(error) throw error;
  } catch(err) { showError(err.message); setLoading(false); }
}

async function forgotPassword() {
  const email = document.getElementById('emailInp').value.trim();
  if(!email) { document.getElementById('emailInp').classList.add('error'); showError('Enter your email first to reset password'); return; }
  
  setLoading(true);
  try {
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    });
    if(error) throw error;
    showError('✓ Password reset link sent! Check your email.', true);
    setLoading(false);
  } catch(err) { showError(err.message); setLoading(false); }
}

document.getElementById('emailInp').addEventListener('keydown', function(e) {
  if(e.key === 'Enter') document.getElementById('passInp').focus();
});
document.getElementById('passInp').addEventListener('keydown', function(e) {
  if(e.key === 'Enter') handleAuth();
});

// ═══════════ AUTO-REDIRECT IF LOGGED IN ═══════════
window.addEventListener('load', async () => {
  // Quick check: if already flagged, redirect immediately
  if (localStorage.getItem('mtaiirus_logged_in') === 'true') {
    window.location.href = REDIRECT_AFTER_LOGIN;
    return;
  }
  // Otherwise check Supabase session
  const { data: { session } } = await supabaseClient.auth.getSession();
  if(session?.user) {
    saveLoginState();
    window.location.href = REDIRECT_AFTER_LOGIN;
  }
});

supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    saveLoginState();
    window.location.href = REDIRECT_AFTER_LOGIN;
  }
});
</script>
</body>
</html>
