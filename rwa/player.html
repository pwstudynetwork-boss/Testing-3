
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #000; color: white; min-height: 100vh; }
        header { background-color: #000; color: white; height: 56px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 50; }
        .header-content { display: flex; align-items: center; gap: 16px; width: 100%; max-width: 1400px; margin: 0 auto; }
        .back-button { background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; padding: 10px; display: flex; align-items: center; justify-content: center; border-radius: 8px; width: 40px; height: 40px; }
        .back-button:hover { background: rgba(255,255,255,0.2); }
        .page-title { font-size: 20px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        main { padding: 24px 16px; max-width: 1400px; margin: 0 auto; }
        .player-container { max-width: 960px; margin: 0 auto; position: relative; }
        .video-wrapper { position: relative; background: #111; border-radius: 12px; overflow: hidden; }
        video { width: 100%; display: block; border-radius: 12px; }
        .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); z-index: 10; border-radius: 12px; }
        .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 10; border-radius: 12px; }
        .error-overlay p { color: #ef4444; font-size: 16px; margin-bottom: 12px; }
        .error-overlay button { background: #5a4bda; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .error-overlay button:hover { background: #4a3bba; }
        .controls { padding: 12px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); border-radius: 0 0 12px 12px; position: absolute; bottom: 0; left: 0; right: 0; z-index: 20; }
        .controls-top { margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-bar:hover { height: 6px; }
        .progress-bar:hover .progress-thumb { opacity: 1; }
        .progress-played { height: 100%; background: #5a4bda; border-radius: 2px; width: 0%; }
        .progress-buffered { height: 100%; background: rgba(255,255,255,0.2); border-radius: 2px; width: 0%; position: absolute; top: 0; }
        .progress-thumb { width: 14px; height: 14px; background: #5a4bda; border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.15s; }
        .controls-bottom { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .controls-left, .controls-right { display: flex; align-items: center; gap: 8px; }
        .control-btn { background: none; border: none; color: white; cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; border-radius: 6px; width: 36px; height: 36px; }
        .control-btn:hover { background: rgba(255,255,255,0.1); }
        .control-btn svg { width: 20px; height: 20px; }
        .time-display { font-size: 13px; color: #ccc; font-variant-numeric: tabular-nums; white-space: nowrap; }
        .time-display span { margin: 0 2px; }
        .volume-wrap { display: flex; align-items: center; gap: 4px; }
        .volume-slider { width: 0; overflow: hidden; transition: width 0.2s; }
        .volume-wrap:hover .volume-slider { width: 80px; }
        .volume-slider input { width: 80px; height: 4px; -webkit-appearance: none; background: #333; border-radius: 2px; outline: none; }
        .volume-slider input::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; }
        .speed-menu { position: relative; }
        .speed-btn { background: rgba(255,255,255,0.1); border: none; color: #ccc; cursor: pointer; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .speed-btn:hover { background: rgba(255,255,255,0.2); }
        .speed-dropdown { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1f2937; border-radius: 8px; padding: 4px; display: none; margin-bottom: 4px; min-width: 72px; }
        .speed-dropdown.show { display: block; }
        .speed-option { padding: 6px 16px; font-size: 13px; cursor: pointer; border-radius: 4px; text-align: center; color: #ccc; }
        .speed-option:hover { background: rgba(255,255,255,0.1); }
        .speed-option.active { color: #5a4bda; font-weight: 600; }
        .quality-btn { background: rgba(255,255,255,0.1); border: none; color: #ccc; cursor: pointer; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .quality-btn:hover { background: rgba(255,255,255,0.2); }
        .quality-selector { position: relative; }
        .quality-dropdown { position: absolute; bottom: 100%; right: 0; background: #1f2937; border-radius: 8px; padding: 4px; display: none; margin-bottom: 4px; min-width: 100px; }
        .quality-dropdown.show { display: block; }
        .quality-option { padding: 8px 16px; font-size: 13px; cursor: pointer; border-radius: 4px; text-align: center; color: #ccc; }
        .quality-option:hover { background: rgba(255,255,255,0.1); }
        .quality-option.active { color: #5a4bda; font-weight: 600; }
        .fullscreen-btn { }
        .video-wrapper:-webkit-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
        .video-wrapper:fullscreen { width: 100vw; height: 100vh; border-radius: 0; }
        .video-wrapper:-webkit-full-screen video { border-radius: 0; }
        .video-wrapper:fullscreen video { border-radius: 0; }
        .video-wrapper:-webkit-full-screen .controls { border-radius: 0; }
        .video-wrapper:fullscreen .controls { border-radius: 0; }
        .video-wrapper .center-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 64px; height: 64px; background: rgba(90,75,218,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5; }
        .video-wrapper .center-play svg { width: 28px; height: 28px; margin-left: 3px; }
        .swipe-indicator { position: absolute; z-index: 4; color: white; font-size: 24px; font-weight: bold; background: rgba(0,0,0,0.5); border-radius: 8px; padding: 12px 20px; display: none; align-items: center; gap: 8px; pointer-events: none; }
        .swipe-indicator.show { display: flex; }
        .swipe-seek { top: 50%; transform: translateY(-50%); }
        .swipe-seek.left { left: 20px; }
        .swipe-seek.right { right: 20px; }
        .swipe-volume { left: 50%; transform: translateX(-50%); }
        .swipe-volume.up { top: 20px; }
        .swipe-volume.down { bottom: 20px; }
        .quality-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .quality-content { background: #1f2937; border-radius: 12px; padding: 24px; width: 90%; max-width: 400px; }
        .quality-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .quality-option-btn { padding: 12px 16px; background: #374151; border-radius: 8px; margin-bottom: 8px; cursor: pointer; text-align: center; border: none; color: white; width: 100%; font-size: 14px; }
        .quality-option-btn:hover { background: #5a4bda; }
        .loading-text { text-align: center; padding: 40px; font-size: 16px; color: #ccc; }
        @media (max-width: 600px) {
            main { padding: 0; }
            .player-container { max-width: 100%; }
            .video-wrapper { border-radius: 0; }
            video { border-radius: 0; }
            .controls { padding: 8px 10px; border-radius: 0; }
            .control-btn { width: 36px; height: 36px; }
            .control-btn svg { width: 20px; height: 20px; }
            .time-display { font-size: 11px; }
            .progress-bar { height: 6px; }
            .progress-thumb { width: 18px; height: 18px; opacity: 1; }
            .loading-overlay, .error-overlay { border-radius: 0; }
            .volume-wrap .volume-slider { width: 80px; }
            .center-play { width: 56px; height: 56px; }
            .center-play svg { width: 24px; height: 24px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <button class="back-button" onclick="goBack()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h1 class="page-title" id="pageTitle">Video Player</h1>
        </div>
    </header>

    <main>
        <div class="player-container">
            <div id="loading" class="loading-text">Loading video...</div>
            <div id="playerWrapper" class="video-wrapper" style="display:none;">
                <video id="video" preload="auto" playsinline></video>
                <div class="center-play" id="centerPlay" onclick="togglePlay()">
                    <svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </div>
                <div class="swipe-indicator swipe-seek left" id="swipeLeft"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5"/><path d="M18 17l-5-5 5-5"/></svg> 10s</div>
                <div class="swipe-indicator swipe-seek right" id="swipeRight">10s <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 17l5-5-5-5"/><path d="M6 17l5-5-5-5"/></svg></div>
                <div class="swipe-indicator swipe-volume up" id="swipeVolUp"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg></div>
                <div class="swipe-indicator swipe-volume down" id="swipeVolDown"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="12" x2="17" y2="12"/></svg></div>
                <div id="loadingOverlay" class="loading-overlay" style="display:none;">
                    <div class="spinner"></div>
                </div>
                <div id="errorOverlay" class="error-overlay" style="display:none;">
                    <p id="errorMessage"></p>
                    <button onclick="retry()">Retry</button>
                </div>
                <div id="controls" class="controls" style="display:none;">
                <div class="controls-top">
                    <div class="progress-bar" id="progressBar" onclick="seek(event)">
                        <div class="progress-buffered" id="bufferedBar"></div>
                        <div class="progress-played" id="playedBar"></div>
                        <div class="progress-thumb" id="progressThumb"></div>
                    </div>
                </div>
                <div class="controls-bottom">
                    <div class="controls-left">
                        <button class="control-btn" id="playBtn" onclick="togglePlay()">
                            <svg id="playIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            <svg id="pauseIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                        </button>
                        <div class="volume-wrap">
                            <button class="control-btn" id="muteBtn" onclick="toggleMute()">
                                <svg id="volHigh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                                <svg id="volMid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                                <svg id="volOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                            </button>
                            <div class="volume-slider">
                                <input type="range" id="volumeRange" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
                            </div>
                        </div>
                        <div class="time-display">
                            <span id="currentTime">0:00</span>
                            <span>/</span>
                            <span id="duration">0:00</span>
                        </div>
                    </div>
                    <div class="controls-right">
                        <div class="speed-menu">
                            <button class="speed-btn" onclick="toggleSpeedMenu(event)">1x</button>
                            <div class="speed-dropdown" id="speedDropdown">
                                <div class="speed-option" data-speed="0.25" onclick="setSpeed(0.25)">0.25x</div>
                                <div class="speed-option" data-speed="0.5" onclick="setSpeed(0.5)">0.5x</div>
                                <div class="speed-option" data-speed="1" onclick="setSpeed(1)">1x</div>
                                <div class="speed-option" data-speed="1.25" onclick="setSpeed(1.25)">1.25x</div>
                                <div class="speed-option" data-speed="1.5" onclick="setSpeed(1.5)">1.5x</div>
                                <div class="speed-option" data-speed="2" onclick="setSpeed(2)">2x</div>
                            </div>
                        </div>
                        <div class="quality-selector">
                            <button class="quality-btn" id="qualityBtn" style="display:none;" onclick="toggleQualityMenu(event)">Auto</button>
                            <div class="quality-dropdown" id="qualityDropdown"></div>
                        </div>
                        <button class="control-btn fullscreen-btn" onclick="toggleFullscreen()">
                            <svg id="fsEnter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                            <svg id="fsExit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </main>

    <div id="qualityModal" class="quality-modal" style="display:none;">
        <div class="quality-content">
            <h2 class="quality-title">Select Video Quality</h2>
            <div id="qualityOptions"></div>
        </div>
    </div>

    <script>
        let video = document.getElementById('video');
        let hls = null;
        let videoData = null;
        let qualities = [];
        let isDragging = false;

        function getParams() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                videoId: urlParams.get('videoid'),
                courseId: urlParams.get('courseid'),
                directUrl: urlParams.get('url'),
                title: urlParams.get('title'),
                thumbnail: urlParams.get('thumbnail')
            };
        }

        const APISERVER = 'https://apiserver.deltastudy.site';

        function proxyUrl(url) {
            return `https://rwa.therankforge.site/api/proxy?url=${encodeURIComponent(url)}`;
        }

        function playUrl(url) {
            if (url.includes('.m3u8') || url.includes('transcoded-videos.classx.co.in')) {
                return proxyUrl(`${APISERVER}/api/rwa?url=${encodeURIComponent(url)}`);
            }
            return proxyUrl(url);
        }

        let gesturesInit = false;
        function playVideo(url) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('playerWrapper').style.display = 'block';
            document.getElementById('controls').style.display = 'block';
            if (!gesturesInit) { initGestures(); gesturesInit = true; }

            if (hls) { hls.destroy(); hls = null; }

            if (url.includes('.m3u8') || url.includes('transcoded-videos.classx.co.in')) {
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(playUrl(url));
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        document.getElementById('loadingOverlay').style.display = 'none';
                        video.play().catch(() => {});
                        buildQualitySwitcher();
                    });
                    hls.on(Hls.Events.ERROR, (e, data) => {
                        if (data.fatal) {
                            showError('Video playback error. Try retrying.');
                        }
                    });
                    showLoading();
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = playUrl(url);
                    video.addEventListener('loadedmetadata', () => {
                        document.getElementById('loadingOverlay').style.display = 'none';
                        video.play().catch(() => {});
                    });
                    showLoading();
                } else {
                    showError('HLS playback not supported in this browser.');
                }
            } else {
                video.src = playUrl(url);
                video.addEventListener('loadedmetadata', () => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                    video.play().catch(() => {});
                });
                showLoading();
            }
        }

        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('errorOverlay').style.display = 'none';
        }

        function showError(msg) {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('errorOverlay').style.display = 'flex';
            document.getElementById('errorMessage').textContent = msg;
        }

        function retry() {
            document.getElementById('errorOverlay').style.display = 'none';
            loadVideo();
        }

        function buildQualitySwitcher() {
            if (!hls || !hls.levels || hls.levels.length < 2) {
                document.getElementById('qualityBtn').style.display = 'none';
                return;
            }
            document.getElementById('qualityBtn').style.display = 'block';
            const dd = document.getElementById('qualityDropdown');
            dd.innerHTML = `<div class="quality-option active" data-level="-1" onclick="switchLevel(-1)">Auto</div>`;
            hls.levels.forEach((level, i) => {
                const height = level.height || level.bitrate || '?';
                const opt = document.createElement('div');
                opt.className = 'quality-option';
                opt.dataset.level = i;
                opt.textContent = height + 'p';
                opt.onclick = () => switchLevel(i);
                dd.appendChild(opt);
            });
        }

        function switchLevel(level) {
            if (!hls) return;
            hls.currentLevel = level;
            document.querySelectorAll('#qualityDropdown .quality-option').forEach(el => el.classList.remove('active'));
            document.querySelector(`#qualityDropdown .quality-option[data-level="${level}"]`).classList.add('active');
            const label = level === -1 ? 'Auto' : hls.levels[level]?.height + 'p';
            document.getElementById('qualityBtn').textContent = label;
            document.getElementById('qualityDropdown').classList.remove('show');
        }

        function toggleQualityMenu(e) {
            e.stopPropagation();
            document.getElementById('qualityDropdown').classList.toggle('show');
            document.getElementById('speedDropdown').classList.remove('show');
        }

        function toggleSpeedMenu(e) {
            e.stopPropagation();
            document.getElementById('speedDropdown').classList.toggle('show');
            document.getElementById('qualityDropdown').classList.remove('show');
        }

        function setSpeed(speed) {
            video.playbackRate = speed;
            document.querySelectorAll('.speed-option').forEach(el => el.classList.remove('active'));
            document.querySelector(`.speed-option[data-speed="${speed}"]`).classList.add('active');
            document.querySelector('.speed-btn').textContent = speed + 'x';
            document.getElementById('speedDropdown').classList.remove('show');
        }

        async function loadVideo() {
            const { videoId, courseId, directUrl, title, thumbnail } = getParams();

            if (directUrl) {
                try {
                    const decodedUrl = decodeURIComponent(directUrl);
                    videoData = { title: title || 'Video', thumbnail, best_url: decodedUrl, all_urls: [] };
                    document.getElementById('pageTitle').textContent = videoData.title;
                    playVideo(decodedUrl);
                    return;
                } catch (e) {
                    showError('Invalid URL');
                    return;
                }
            }

            if (!videoId || !courseId) {
                document.getElementById('loading').textContent = 'Missing videoid or courseid';
                return;
            }

            try {
                const response = await fetch(`https://rwa.therankforge.site/api/rwa?videoid=${videoId}&courseid=${courseId}`);
                const text = await response.text();
                let data;
                try { data = JSON.parse(text); } catch { throw new Error(text); }
                if (!response.ok) throw new Error(data.error || 'Failed to fetch');
                if (data.status !== 200 || !data.data?.length) throw new Error(data.message || 'Video not found');

                videoData = data.data[0];
                document.getElementById('pageTitle').textContent = videoData.title || 'Video';

                if (videoData.all_urls?.length > 1) {
                    qualities = videoData.all_urls.sort((a, b) => parseInt(b.quality) - parseInt(a.quality));
                    showQualityModal();
                } else {
                    playVideo(videoData.best_url);
                }
            } catch (e) {
                showError(e.message);
            }
        }

        function showQualityModal() {
            document.getElementById('qualityOptions').innerHTML = qualities.map(q =>
                `<button class="quality-option-btn" onclick="selectQuality('${q.url}')">${q.quality}p</button>`
            ).join('');
            document.getElementById('qualityModal').style.display = 'flex';
        }

        function selectQuality(url) {
            document.getElementById('qualityModal').style.display = 'none';
            playVideo(url);
        }

        function goBack() {
            const p = new URLSearchParams(window.location.search);
            window.location.href = `../rwa/subjects.html?courseId=${p.get('courseid')}`;
        }

        function showSwipe(el, duration) {
            el.classList.add('show');
            clearTimeout(el._hide);
            el._hide = setTimeout(() => el.classList.remove('show'), duration || 600);
        }

        // --- Touch / Gesture Support ---
        function initGestures() {
            const wrap = document.getElementById('playerWrapper');
            let startX, startY, startTime, volStart, seeking = false, volTracking = false;
            let touched = false;

            wrap.addEventListener('touchstart', (e) => {
                touched = true;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                startTime = Date.now();
                volStart = video.volume;
                seeking = false; volTracking = false;
            }, { passive: true });

            wrap.addEventListener('touchmove', (e) => {
                if (e.touches.length > 1) return;
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;
                const absDx = Math.abs(dx), absDy = Math.abs(dy);

                if (!seeking && !volTracking) {
                    if (absDx > absDy && absDx > 30) seeking = true;
                    else if (absDy > absDx && absDy > 30) volTracking = true;
                }

                if (seeking) {
                    e.preventDefault();
                    showSwipe(dx > 0 ? document.getElementById('swipeRight') : document.getElementById('swipeLeft'));
                } else if (volTracking) {
                    e.preventDefault();
                    const delta = -dy / 200;
                    const newVol = Math.max(0, Math.min(1, volStart + delta));
                    video.volume = newVol;
                    video.muted = newVol === 0;
                    updateVolumeUI();
                    showSwipe(newVol > volStart ? document.getElementById('swipeVolUp') : document.getElementById('swipeVolDown'));
                }
            }, { passive: false });

            wrap.addEventListener('touchend', (e) => {
                if (seeking || volTracking) {
                    if (seeking) {
                        const dx = e.changedTouches[0].clientX - startX;
                        const pct = dx / wrap.offsetWidth;
                        video.currentTime = Math.max(0, Math.min(video.duration || 0, video.currentTime + pct * 120));
                    }
                    seeking = false; volTracking = false;
                    return;
                }

                const dx = Math.abs(e.changedTouches[0].clientX - startX);
                const dy = Math.abs(e.changedTouches[0].clientY - startY);
                const elapsed = Date.now() - startTime;

                if (dx < 15 && dy < 15 && elapsed < 300) {
                    togglePlay();
                }
            }, { passive: true });

            wrap.addEventListener('click', () => {
                if (touched) { touched = false; return; }
            });
        }

        // --- Controls ---
        function togglePlay() {
            if (video.paused) video.play();
            else video.pause();
        }

        function toggleMute() {
            video.muted = !video.muted;
            updateVolumeUI();
        }

        function setVolume(val) {
            video.volume = parseFloat(val);
            video.muted = false;
            updateVolumeUI();
        }

        function updateVolumeUI() {
            const v = video.muted ? 0 : video.volume;
            document.getElementById('volumeRange').value = v;
            document.getElementById('volHigh').style.display = v > 0.5 ? '' : 'none';
            document.getElementById('volMid').style.display = v > 0 && v <= 0.5 ? '' : 'none';
            document.getElementById('volOff').style.display = v === 0 ? '' : 'none';
        }

        function toggleFullscreen() {
            const el = document.getElementById('playerWrapper');
            if (!document.fullscreenElement) {
                el.requestFullscreen();
                document.querySelector('header').style.display = 'none';
                document.querySelector('main').style.padding = '0';
            } else {
                document.exitFullscreen();
                document.querySelector('header').style.display = '';
                document.querySelector('main').style.padding = '';
            }
        }
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.querySelector('header').style.display = '';
                document.querySelector('main').style.padding = '';
            }
        });

        function seek(e) {
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            if (video.duration) video.currentTime = pct * video.duration;
        }

        function formatTime(s) {
            if (!s || !isFinite(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        video.addEventListener('play', () => {
            document.getElementById('playIcon').style.display = 'none';
            document.getElementById('pauseIcon').style.display = '';
            document.getElementById('centerPlay').style.opacity = '0';
        });
        video.addEventListener('pause', () => {
            document.getElementById('playIcon').style.display = '';
            document.getElementById('pauseIcon').style.display = 'none';
            document.getElementById('centerPlay').style.opacity = '1';
        });
        video.addEventListener('timeupdate', () => {
            document.getElementById('currentTime').textContent = formatTime(video.currentTime);
            updateDuration();
            const pct = video.duration ? (video.currentTime / video.duration * 100) : 0;
            document.getElementById('playedBar').style.width = pct + '%';
            document.getElementById('progressThumb').style.left = pct + '%';
        });
        function updateDuration() {
            if (video.duration && isFinite(video.duration)) {
                document.getElementById('duration').textContent = formatTime(video.duration);
            }
        }
        video.addEventListener('loadedmetadata', updateDuration);
        video.addEventListener('durationchange', updateDuration);
        video.addEventListener('waiting', () => {
            document.getElementById('loadingOverlay').style.display = 'flex';
        });
        video.addEventListener('canplay', () => {
            document.getElementById('loadingOverlay').style.display = 'none';
        });
        video.addEventListener('progress', () => {
            if (video.buffered.length > 0) {
                const end = video.buffered.end(video.buffered.length - 1);
                const pct = video.duration ? (end / video.duration * 100) : 0;
                document.getElementById('bufferedBar').style.width = pct + '%';
            }
        });
        video.addEventListener('volumechange', updateVolumeUI);

        // Progress bar drag (mouse + touch)
        const progressBar = document.getElementById('progressBar');
        progressBar.addEventListener('mousedown', (e) => { isDragging = true; seek(e); });
        document.addEventListener('mousemove', (e) => { if (isDragging) seek(e); });
        document.addEventListener('mouseup', () => { isDragging = false; });
        progressBar.addEventListener('touchstart', (e) => { isDragging = true; seek(e.touches[0]); });
        document.addEventListener('touchmove', (e) => { if (isDragging) seek(e.touches[0]); });
        document.addEventListener('touchend', () => { isDragging = false; });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            switch (e.key) {
                case ' ':
                case 'k': e.preventDefault(); togglePlay(); break;
                case 'f': toggleFullscreen(); break;
                case 'm': toggleMute(); break;
                case 'ArrowLeft': video.currentTime = Math.max(0, video.currentTime - 10); break;
                case 'ArrowRight': video.currentTime = Math.min(video.duration, video.currentTime + 10); break;
                case 'ArrowUp': e.preventDefault(); setVolume(Math.min(1, video.volume + 0.1)); break;
                case 'ArrowDown': e.preventDefault(); setVolume(Math.max(0, video.volume - 0.1)); break;
            }
        });

        // Close dropdowns on click outside
        document.addEventListener('click', () => {
            document.getElementById('speedDropdown').classList.remove('show');
            document.getElementById('qualityDropdown').classList.remove('show');
        });
        document.querySelectorAll('.speed-menu, .quality-selector').forEach(el => {
            el.addEventListener('click', (e) => e.stopPropagation());
        });

        // Close quality modal on click outside
        document.getElementById('qualityModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('qualityModal').style.display = 'none';
                goBack();
            }
        });

        document.addEventListener('DOMContentLoaded', loadVideo);
    </script>
</body>
</html>
