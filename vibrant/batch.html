<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibrant Course Content - LearnByAKP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="top-header">
      <div class="container">
        <h1 id="courseTitle">Loading...</h1>
      </div>
    </header>

    <nav class="main-tabs-wrap">
      <div class="container tabs-row">
        <button class="pill active" id="contentTab">Content</button>
        <button class="pill" id="liveTab">Live & Upcoming</button>
      </div>
    </nav>

    <main class="container main-area">
      <section id="contentSection">
        <div id="breadcrumb" class="breadcrumb"></div>
        <div id="contentLoader" class="list-loader"></div>
        <div id="contentError" class="empty-state error-state hidden"></div>
        <div id="emptyContent" class="empty-state hidden">
          <div class="not-found-wrap">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTUv5X5h2sxnfIyxhUjlX0uFl4kxSBuCRVXRw&s" alt="No Content Found" />
            <span>404</span>
          </div>
          <h2>Empty Folder</h2>
          <p>There is no content in this folder.</p>
        </div>
        <div id="contentGrid" class="content-grid"></div>
      </section>

      <section id="liveSection" class="hidden">
        <div class="sub-tabs">
          <button class="sub-pill active" id="liveUpcomingBtn">Live & Upcoming</button>
          <button class="sub-pill" id="previousLiveBtn">Previous Live Videos</button>
        </div>

        <div id="liveUpcomingPanel">
          <div id="liveLoader" class="content-grid"></div>
          <div id="noLive" class="empty-state hidden">
            <div class="big-icon">📺</div>
            <h2>No Live Videos</h2>
            <p>There are no live classes scheduled at the moment.</p>
          </div>
          <div id="liveGrid" class="content-grid"></div>
        </div>

        <div id="previousLivePanel" class="hidden">
          <div id="previousLoader" class="content-grid"></div>
          <div id="previousError" class="empty-state error-state hidden"></div>
          <div id="noPrevious" class="empty-state hidden">
            <div class="not-found-wrap">
              <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTUv5X5h2sxnfIyxhUjlX0uFl4kxSBuCRVXRw&s" alt="No Videos Found" />
              <span>404</span>
            </div>
            <h2>No Previous Live Videos</h2>
          </div>
          <div id="previousGrid" class="content-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- PDF Modal -->
  <div class="modal hidden" id="pdfModal">
    <div class="modal-box pdf-box">
      <div class="modal-header">
        <h3 id="pdfTitle">PDF</h3>
        <button class="icon-btn" id="closePdf">×</button>
      </div>
      <iframe id="pdfFrame" title="PDF Viewer"></iframe>
    </div>
  </div>

  <!-- Image Modal -->
  <div class="modal image-modal hidden" id="imageModal">
    <button class="image-close" id="closeImage">×</button>
    <img id="previewImage" alt="Preview" />
  </div>

  <script src="/apv/script.js"></script>
</body>
</html>
