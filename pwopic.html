      --bg2: #ECEAE2;
      --ink: #1A1814;
      --ink2: #6B6760;
      --ink3: #B0ADA7;

    /* Floating bg words */
    .floating-words {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: .04;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 5vw, 5rem);
      color: var(--ink);
      white-space: nowrap;
      user-select: none;
    }
    .float-word {
      position: absolute;
      animation: floatAround 26s infinite alternate ease-in-out;
      letter-spacing: -2px;
    }
    .float-word:nth-child(1) { top: 8%; left: 3%; animation-duration: 22s; }
    .float-word:nth-child(2) { top: 22%; right: 5%; animation-duration: 30s; animation-delay: -5s; }
    .float-word:nth-child(3) { bottom: 18%; left: 8%; animation-duration: 24s; animation-delay: -8s; }
    .float-word:nth-child(4) { bottom: 32%; right: 4%; animation-duration: 28s; animation-delay: -13s; }
    @keyframes floatAround {
      0% { transform: translate(0,0) rotate(0deg); }
      25% { transform: translate(35px,-25px) rotate(1.5deg); }
      50% { transform: translate(-25px,30px) rotate(-1.5deg); }
      75% { transform: translate(20px,15px) rotate(.8deg); }
      100% { transform: translate(-15px,-20px) rotate(-.8deg); }

    /* Skeleton */
    .skeleton {

    .skeleton-line {

    .flex-1 { flex: 1; }
    .mb-1 { margin-bottom: 4px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      grid-column: 1 / -1;

    .empty-state-icon {
      width: 64px;
      height: 64px;

      background: var(--bg2);
      border-radius: 60px;

      align-items: center;
      justify-content: center;
      font-size: 28px;

      font-weight: 700;
      color: var(--ink);
      margin-bottom: 8px;

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--ink);
      color: var(--bg);
      padding: 12px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      animation: slideUp .3s ease;
      pointer-events: auto;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Security watermark */
    .security-watermark {
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-size: 9px;
      color: rgba(107,103,96,.15);
      font-family: monospace;
      z-index: 9999;
      pointer-events: none;
      user-select: none;
    }

   @media (max-width: 700px) {
      .card-top { flex-direction: column; }
      .card-icon { width: 100%; height: auto; aspect-ratio: 16/9; }
      .card-actions { margin-left: 0; }
      .topic-tab { font-size: 12px; min-width: 80px; }
      .topic-tab i { margin-right: 4px; }
      .brand-name { display: none; }
    }
  </style>
</head>

    try {

    if (durationRaw.includes(':')) {

        const h = parseInt(parts[0], 10);
        const m = parseInt(parts[1], 10);
        if (h > 0) return `${h}h ${m}m`;
        return `${m}m`;
      }
      if (parts.length === 2) return `${parts[0]}m ${parts[1]}s`;
    }
    return durationRaw;
  }

  // UPDATED: Play video using pwplayer.html with correct parameters
  window.playVideo = function(videoId, scheduleId) {
    const targetUrl = `pwplayer.html?video_id=${videoId}&subject_slug=${subjectSlug}&batch_id=${batchId}&schedule_id=${scheduleId}&subject_id=${subjectId}&topicSlug=${topicSlug}`;
    window.location.href = targetUrl;
  };

  window.toggleComplete = function(btn, id) {
    let completed = JSON.parse(localStorage.getItem('mtaiirus_completed_lectures') || '[]');
    const isCompleted = completed.includes(id);
    
    if (isCompleted) {
      completed = completed.filter(c => c !== id);
      btn.style.color = 'var(--ink3)';
      btn.innerHTML = '<i class="far fa-circle" style="font-size: 20px;"></i>';
      showToast('Marked as incomplete', 'info');
    } else {
      completed.push(id);
      btn.style.color = '#10b981';
      btn.innerHTML = '<i class="fas fa-check-circle" style="font-size: 20px;"></i>';
      showToast('Marked as complete!', 'success');
    }
    
    localStorage.setItem('mtaiirus_completed_lectures', JSON.stringify(completed));
  };

  window.openPdf = async function(contentId) {
    try {
      const res = await fetch(`${WORKER}/api/pw/attachments-url?BatchId=${batchId}&SubjectId=${subjectId}&ContentId=${contentId}`);
      const data = await res.json();
      if (data.success && data.data && data.data.length > 0) {
        const att = data.data[0];
        const actualUrl = att.url || (att.baseUrl + att.key);
        const viewUrl = `${WORKER}/api/pw/view?url=${encodeURIComponent(actualUrl)}&filename=${encodeURIComponent(att.topic || 'Document')}`;
        window.open(viewUrl, '_blank');
      } else {
        showToast('PDF not available for this item', 'error');
      }
    } catch (err) {
      console.error(err);
      showToast('Failed to fetch PDF', 'error');
    }
  };

  async function fetchContent() {
    const container = document.getElementById('content-container');
    const loadingBar = document.getElementById('loading-bar');
    
    container.innerHTML = `
      <div class="content-card"><div class="card-top"><div class="card-icon skeleton"></div><div class="card-info"><div class="skeleton-line skeleton-line-sm mb-1"></div><div class="skeleton-line skeleton-line-lg mb-1"></div><div class="skeleton-line w-3/4"></div></div></div><div class="card-actions"><div class="skeleton-btn flex-1"></div><div class="skeleton-btn flex-1"></div></div></div>
      <div class="content-card"><div class="card-top"><div class="card-icon skeleton"></div><div class="card-info"><div class="skeleton-line skeleton-line-sm mb-1"></div><div class="skeleton-line skeleton-line-lg mb-1"></div><div class="skeleton-line w-3/4"></div></div></div><div class="card-actions"><div class="skeleton-btn flex-1"></div><div class="skeleton-btn flex-1"></div></div></div>
    `;
    loadingBar.classList.remove('hidden');

    try {
      const res = await fetch(`${WORKER}/api/pw/datacontent?batchId=${batchId}&subjectSlug=${subjectSlug}&topicSlug=${topicSlug}&contentType=${currentTab}`);
      const data = await res.json();
      
      container.innerHTML = '';
      
      if (!data.success || !Array.isArray(data.data) || data.data.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <i class="fas fa-folder-open"></i>
            </div>
            <h2 class="empty-state-title">No ${currentTab.replace('-', ' ')} found</h2>
          </div>
        `;
        return;
      }

      const completedLectures = JSON.parse(localStorage.getItem('mtaiirus_completed_lectures') || '[]');

      data.data.forEach((item, idx) => {
        const title = item.topic || item.name || (item.homeworkIds && item.homeworkIds[0] && item.homeworkIds[0].topic) || 'Untitled';
        const date = item.date || item.createdAt;
        const formattedDate = date ? formatDate(date) : 'Recent';
        const isCompleted = completedLectures.includes(item._id);

        if (currentTab === 'videos' || currentTab === 'dppVideos') {
          const vidId = (item.videoDetails && item.videoDetails.findKey) ? item.videoDetails.findKey : item._id;
          const durationRaw = (item.videoDetails && item.videoDetails.duration) ? item.videoDetails.duration : (item.duration || '00:00');
          const duration = formatDuration(durationRaw);
          
          let imgUrl = 'https://i.ibb.co/9Hm0NqsH/f69ed82b-7169-45fc-a82b-915e453c6340.png';
          if (item.videoDetails && item.videoDetails.image) imgUrl = item.videoDetails.image;
          else if (item.previewImage) imgUrl = item.previewImage;

          const tag = currentTab === 'videos' ? 'Video Lecture' : 'DPP Solution';
          
          const card = document.createElement('div');
          card.className = 'content-card';
          card.style.animation = `slideUp 0.3s ease forwards ${idx * 0.05}s`;
          card.innerHTML = `
            <button class="mark-complete-btn" onclick="toggleComplete(this, '${item._id}')" title="Mark as complete">
              <i class="${isCompleted ? 'fas fa-check-circle' : 'far fa-circle'}" style="font-size: 20px; color: ${isCompleted ? '#10b981' : 'var(--ink3)'};"></i>
            </button>
            <div class="card-top">
              <div class="card-icon">
                <img src="${imgUrl}" onerror="this.src='https://i.ibb.co/9k8fbHmZ/empty-state.png'" alt="Thumbnail">
                <div class="play-overlay"><i class="fas fa-play"></i></div>
              </div>
              <div class="card-info">
                <div class="card-meta">${tag} • ${formattedDate}</div>
                <div class="card-title" title="${title.replace(/</g, '&lt;')}">${title.replace(/</g, '&lt;')}</div>
                <div class="card-duration"><i class="far fa-clock"></i> ${duration}</div>
              </div>
            </div>
            <div class="card-actions">
              <button class="btn-action btn-primary-action" onclick="playVideo('${vidId}', '${item._id}')">
                <i class="fas fa-play"></i> Watch Now
              </button>
              <button class="btn-action" onclick="document.querySelector('.topic-tab[data-tab=\\'notes\\']').click();">
                <i class="fas fa-file-alt"></i> Notes
              </button>
            </div>
          `;
          container.appendChild(card);
        } 
        else if (currentTab === 'dpp' || currentTab === 'notes') {
          const tag = currentTab === 'dpp' ? 'DPP' : 'Notes';
          const icon = currentTab === 'dpp' ? 'fa-tasks' : 'fa-sticky-note';
          
          const card = document.createElement('div');
          card.className = 'content-card';
          card.style.animation = `slideUp 0.3s ease forwards ${idx * 0.05}s`;
          card.innerHTML = `
            <div class="card-top">
              <div class="card-icon" style="background: var(--accentb); display: flex; align-items: center; justify-content: center;">
                <i class="fas ${icon}" style="font-size: 32px; color: var(--accent);"></i>
              </div>
              <div class="card-info">
                <div class="card-meta">${tag} • ${formattedDate}</div>
                <div class="card-title" title="${title.replace(/</g, '&lt;')}">${title.replace(/</g, '&lt;')}</div>
              </div>
            </div>
            <div class="card-actions">
              <button class="btn-action btn-primary-action" onclick="openPdf('${item._id}')">
                <i class="fas fa-eye"></i> View ${tag}
              </button>
              <button class="btn-icon-only" onclick="openPdf('${item._id}')">
                <i class="fas fa-download"></i>
              </button>
            </div>
          `;
          container.appendChild(card);
        }
      });

    } catch (err) {
      console.error(err);
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon" style="color: #ef4444; background: rgba(239,68,68,0.1);">
            <i class="fas fa-exclamation-triangle"></i>
          </div>
          <h2 class="empty-state-title text-red-400">Failed to load content</h2>
        </div>
      `;
      showToast('Failed to load content', 'error');
    } finally {
      loadingBar.classList.add('hidden');
    }
  }

  if (!batchId || !subjectSlug || !topicSlug) {
    showToast('Invalid course information', 'error');
    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
  } else {
    fetchContent();
  }
})();
</script>

<style>
  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</body>
</html>
