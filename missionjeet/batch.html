
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#D4540E">
  <title>Mtaiirus — Mission JEET Course Details</title>
  <meta name="description" content="Access free premium Mission JEET course content on Mtaiirus.">
  <link rel="icon" type="image/png" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="apple-touch-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F2EB;
      --bg2: #ECEAE2;
      --panel: #FFFDFB;
      --panel-2: #F5F2EB;
      --card: #FFFDFB;
      --muted: #6B6760;
      --muted2: #B0ADA7;
      --text: #1A1814;
      --soft: #6B6760;
      --line: rgba(26,24,20,.10);
      --accent: #D4540E;
      --accent-2: #e8651f;
      --success: #2D6A3F;
      --warning: #d97706;
      --danger: #D4540E;
      --shadow: 0 18px 50px rgba(26,24,20,.10);
      --radius: 20px;
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background:
        radial-gradient(circle at top left, rgba(212,84,14,.08), transparent 26%),
        radial-gradient(circle at top right, rgba(240,168,122,.06), transparent 22%),
        linear-gradient(180deg, #F5F2EB 0%, #ECEAE2 55%, #F5F2EB 100%);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    img { display: block; max-width: 100%; }

    .container { width: min(1240px, calc(100% - 28px)); margin: 0 auto; }

    .topbar {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      background: rgba(245,242,235,.88);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 4px 16px rgba(26,24,20,.04);
    }

    .topbar-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 18px; padding: 16px 0;
    }

    .brand {
      display: flex; align-items: center; gap: 12px; min-width: 0; cursor: pointer;
    }

    .brand-logo {
      width: 38px; height: 38px; border-radius: 10px; object-fit: contain;
      background: #fff; box-shadow: var(--shadow);
      border: 1px solid var(--line); flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0; font-family: var(--font-heading); font-size: 1.1rem;
      font-weight: 800; letter-spacing: 1px; color: var(--text);
    }
    .brand-text h1 span { color: var(--accent); }
    .brand-text p { margin: 3px 0 0; color: var(--muted); font-size: 11px; }

    .search-wrap { flex: 1; max-width: 420px; position: relative; }
    .search {
      width: 100%; height: 48px; border-radius: 14px;
      border: 1px solid var(--line); outline: none;
      background: var(--card); color: var(--text);
      padding: 0 18px 0 46px; transition: .2s ease;
      font-family: var(--font-body);
    }
    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(212,84,14,.08);
    }
    .search::placeholder { color: var(--muted2); }
    .search-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%); color: var(--muted2);
      font-size: 16px; pointer-events: none;
    }

    .page { padding: 26px 0 38px; }
    .breadcrumb {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 14px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .breadcrumb button { background: none; border: none; color: var(--accent); cursor: pointer; padding: 0; font-weight: 600; }

    .hero {
      display: grid; grid-template-columns: minmax(0, 1fr) 360px;
      gap: 24px; align-items: start;
    }

    .glass {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .main-panel { padding: 28px; }
    .side-panel { padding: 16px; position: sticky; top: 90px; }

    .course-title {
      margin: 0 0 18px; font-family: var(--font-heading);
      font-size: clamp(26px, 3vw, 38px); line-height: 1.15;
      color: var(--text); letter-spacing: -.5px;
    }

    .btn {
      border: none; cursor: pointer; transition: .22s ease;
      border-radius: 14px; font-weight: 600; font-family: var(--font-body);
    }
    .btn-primary {
      background: var(--text); color: var(--bg);
      padding: 14px 20px; box-shadow: 0 8px 24px rgba(212,84,14,.15);
    }
    .btn-primary:hover { background: var(--accent); color: #fff; transform: translateY(-1px); }

    .tabs {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px;
      padding: 6px; border-radius: 16px;
      background: var(--bg2); border: 1px solid var(--line);
    }
    .tab {
      border: none; cursor: pointer; color: var(--muted);
      background: transparent; padding: 12px 16px;
      border-radius: 12px; font-weight: 600; transition: .2s ease;
      font-family: var(--font-body);
    }
    .tab.active {
      color: var(--bg); background: var(--text);
      box-shadow: 0 4px 16px rgba(26,24,20,.1);
    }

    .list { display: grid; gap: 14px; }

    .item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px; background: var(--card);
      border: 1px solid var(--line); border-radius: 18px;
      cursor: pointer; position: relative; transition: .2s ease; overflow: hidden;
    }
    .item:hover {
      transform: translateY(-2px); border-color: var(--accent);
      box-shadow: 0 10px 28px rgba(212,84,14,.08);
    }

    .thumb {
      width: 126px; aspect-ratio: 16/9; border-radius: 14px;
      object-fit: cover; background: var(--bg2); flex-shrink: 0;
      border: 1px solid var(--line);
    }
    .thumb.small { width: 92px; }

    .item-info { min-width: 0; flex: 1; }
    .item-title {
      font-family: var(--font-heading); font-size: 15px; font-weight: 700;
      color: var(--text); line-height: 1.4; margin-bottom: 7px; letter-spacing: -.2px;
    }
    .item-meta { display: flex; gap: 10px; flex-wrap: wrap; color: var(--muted); font-size: 12px; }

    .pill {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; padding: 5px 10px;
      font-size: 11px; font-weight: 700; letter-spacing: .2px;
    }
    .pill-live {
      background: rgba(212,84,14,.10); color: var(--accent);
      border: 1px solid rgba(212,84,14,.18);
      position: absolute; top: 12px; right: 12px;
      animation: pulse 1.1s infinite alternate;
    }
    .pill-upcoming {
      background: rgba(217,119,6,.10); color: #b45309;
      border: 1px solid rgba(217,119,6,.18);
      position: absolute; top: 12px; left: 12px;
    }

    .empty, .loading, .error-box, .live-box {
      text-align: center; padding: 46px 18px; border-radius: 20px;
      border: 1px dashed var(--line); background: var(--bg);
    }
    .empty h3, .live-box h3, .error-box h3 { margin: 0 0 8px; font-family: var(--font-heading); color: var(--text); }
    .empty p, .loading p, .error-box p, .live-box p { margin: 0; color: var(--muted); }

    .spinner {
      width: 56px; height: 56px; border-radius: 50%;
      border: 4px solid rgba(212,84,14,.08);
      border-top-color: var(--accent); margin: 0 auto 14px;
      animation: spin 1s linear infinite;
    }

    .footer {
      border-top: 1px solid var(--line); margin-top: 38px;
      background: var(--bg2); backdrop-filter: blur(12px);
    }
    .footer-inner {
      display: flex; justify-content: space-between; align-items: center;
      gap: 20px; flex-wrap: wrap; padding: 20px 0;
      color: var(--muted); font-size: 14px;
    }
    .footer-inner a { color: var(--accent); font-weight: 500; margin-left: 18px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { from { transform: scale(.98); } to { transform: scale(1.04); } }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .side-panel { position: static; }
    }
    @media (max-width: 720px) {
      .topbar-inner { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: none; }
      .main-panel { padding: 18px; }
      .course-title { font-size: 26px; }
      .thumb { width: 90px; }
    }

    /* Fullscreen loader overlay */
    #fs-loader {
      position: fixed; inset: 0; background: rgba(245,242,235,.96); backdrop-filter: blur(12px);
      z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
      visibility: hidden; opacity: 0; transition: visibility 0s, opacity 0.25s;
    }
    #fs-loader.visible { visibility: visible; opacity: 1; }
    .loader-text { margin-top: 20px; font-weight: 600; color: var(--accent); letter-spacing: 1px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand" onclick="goHome()">
        <img id="brandLogo" class="brand-logo"
          src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg"
          alt="Mtaiirus" onerror="this.style.display='none'">
        <div class="brand-text">
          <h1>MTAI<span>IRUS</span></h1>
          <p>Free Premium Courses</p>
        </div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="searchInput" class="search" type="search" placeholder="Search content, folder, pdf, video...">
      </div>
    </div>
  </header>

  <div class="page">
    <div class="container">
      <div class="breadcrumb">
        <button onclick="goHome()">Home</button>
        <span>›</span>
        <span id="breadcrumbCourseName">Course Details</span>
      </div>

      <div class="hero">
        <section class="glass main-panel" id="mainPanel">
          <div id="mainState"></div>
        </section>
        <aside class="glass side-panel" id="sidePanel">
          <div style="margin-bottom: 14px;"><strong>📚 Info</strong></div>
          <div id="sideContent" class="item-meta" style="display: flex; flex-direction: column; gap: 12px;">
            <p style="color: var(--muted); font-size: 13px;">Select a batch to view details</p>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer-inner">
      <div>© 2025 Mtaiirus · Made with ♥ for Students of India</div>
      <div>
        <a href="https://www.instagram.com/mission.jeet/?hl=en" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://www.youtube.com/@mission_jeet" target="_blank" rel="noopener noreferrer">YouTube</a>
      </div>
    </div>
  </footer>

  <div id="fs-loader">
    <div class="spinner" style="width: 48px; height: 48px;"></div>
    <div class="loader-text">LOADING STREAM...</div>
  </div>

  <script>
    // ======================== CORE LOGIC (preserved from original) ========================
    const API = 'https://1api.notjitu.workers.dev';
    const BATCHES = [
      { id: 185, title: 'Drona 2.0 JEE Class 11th', thumbnail: 'https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/2967410_131_drona%202.0%20JEE%20banner%20app.png' },
      { id: 184, title: 'Drona 2.0 NEET Class 11th', thumbnail: 'https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/241318_131_drona%202.0%20NEET%20banner%20app.png' },
      { id: 151, title: 'Drona JEE class 11th', thumbnail: 'https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/7574748_131_Class%2011th%20Mission%20Jeet%20JEE%20App%20Banners.jpg' },
      { id: 152, title: 'Drona NEET class 11th', thumbnail: 'https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/4072473_131_Class%2011th%20Mission%20Jeets%20NEET%20App%20Banners.jpg' }
    ];
    const FALLBACK = 'https://i.postimg.cc/26F5zTH7/4661462-1-Mission-JEET-Logo.png';

    const urlParams = new URLSearchParams(window.location.search);
    let currentCourseId = urlParams.get('courseId') || '185';
    
    // State
    let currentTab = 'overview';
    let folderStack = [{ id: '0', name: 'Subjects' }];
    let contentCache = {};
    let liveDataCache = null;
    let currentBatchInfo = BATCHES.find(b => b.id == currentCourseId) || BATCHES[0];
    
    // DOM elements
    const mainStateDiv = document.getElementById('mainState');
    const sideContentDiv = document.getElementById('sideContent');
    const breadcrumbSpan = document.getElementById('breadcrumbCourseName');
    const searchInput = document.getElementById('searchInput');
    let searchQuery = '';
    
    function goHome() { window.location.href = 'index.html'; }
    
    function updateBreadcrumb() { breadcrumbSpan.textContent = currentBatchInfo.title; }
    
    function showLoader(show) {
      const loader = document.getElementById('fs-loader');
      if (show) loader.classList.add('visible');
      else loader.classList.remove('visible');
    }
    
    // Helper render main area (tabs + dynamic content)
    function renderMainInterface() {
      mainStateDiv.innerHTML = `
        <div class="tabs">
          <button class="tab ${currentTab === 'overview' ? 'active' : ''}" data-tab="overview">📖 Overview</button>
          <button class="tab ${currentTab === 'content' ? 'active' : ''}" data-tab="content">📂 Content</button>
          <button class="tab ${currentTab === 'live' ? 'active' : ''}" data-tab="live">🔴 Live Classes</button>
        </div>
        <div id="tabContent"></div>
      `;
      
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', (e) => {
          currentTab = btn.dataset.tab;
          renderMainInterface();
          loadTabContent();
        });
      });
      
      loadTabContent();
    }
    
    async function loadTabContent() {
      const tabContainer = document.getElementById('tabContent');
      if (!tabContainer) return;
      if (currentTab === 'overview') await loadOverview(tabContainer);
      else if (currentTab === 'content') await loadContentExplorer(tabContainer);
      else if (currentTab === 'live') await loadLiveTab(tabContainer);
    }
    
    async function loadOverview(container) {
      container.innerHTML = `<div class="loading"><div class="spinner"></div><p>Fetching course details...</p></div>`;
      try {
        const res = await fetch(`${API}/mj/course-details`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ course_id: currentCourseId })
        });
        const json = await res.json();
        let title = currentBatchInfo.title;
        let price = '', mrp = '', discount = '', description = '';
        if (json.success && json.data && json.data.length > 0) {
          const overviewData = json.data.find(d => d.type === 'overview');
          if (overviewData && overviewData.data && overviewData.data[0] && overviewData.data[0].layout_data) {
            const details = overviewData.data[0].layout_data[0];
            title = details.title || title;
            if (details.offer_price) price = `₹${details.offer_price}`;
            if (details.mrp) mrp = `₹${details.mrp}`;
            if (details.discount_percentage) discount = `${details.discount_percentage}% OFF`;
            description = details.description || 'No detailed description provided.';
          }
        }
        // update side panel with batch info
        sideContentDiv.innerHTML = `
          <img src="${currentBatchInfo.thumbnail}" style="width:100%; border-radius: 16px; border:1px solid var(--line); margin-bottom: 12px;" onerror="this.src='${FALLBACK}'">
          <div style="font-weight: 700;">${title}</div>
          <div style="font-size:13px; margin-top:8px;">${price ? `<span style="font-weight:800; color:var(--accent);">${price}</span> ${mrp ? `<span style="text-decoration:line-through;">${mrp}</span>` : ''}` : ''}</div>
          ${discount ? `<span class="pill" style="background:var(--success); color:white; margin-top:6px;">${discount}</span>` : ''}
        `;
        container.innerHTML = `
          <h2 class="course-title">${escapeHtml(title)}</h2>
          <div class="item-meta" style="margin-bottom: 20px;">${price ? `<span class="pill" style="background:var(--accent); color:white;">${price}</span>` : ''} ${mrp ? `<span class="pill">${mrp}</span>` : ''}</div>
          <div style="line-height:1.6; color: var(--text);">${description ? `<div>${description}</div>` : '<p class="empty">No overview available.</p>'}</div>
        `;
      } catch (err) {
        container.innerHTML = `<div class="error-box"><h3>⚠️ Failed to load</h3><p>${err.message}</p></div>`;
      }
    }
    
    async function loadContentExplorer(container) {
      container.innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading folders...</p></div>`;
      await renderContentNavigation(container, '0');
    }
    
    async function renderContentNavigation(container, folderId) {
      if (!contentCache[folderId]) {
        try {
          const res = await fetch(`${API}/mj/all-content`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ course_id: currentCourseId, folder_id: folderId })
          });
          const json = await res.json();
          if (json.data && json.data.length) contentCache[folderId] = json.data.sort((a,b) => {
            if (a.type === 'folder' && b.type !== 'folder') return -1;
            if (a.type !== 'folder' && b.type === 'folder') return 1;
            return 0;
          });
          else contentCache[folderId] = [];
        } catch(e) { contentCache[folderId] = []; }
      }
      const items = contentCache[folderId] || [];
      const filtered = searchQuery ? items.filter(i => i.title.toLowerCase().includes(searchQuery.toLowerCase())) : items;
      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty"><h3>📭 No content found</h3><p>${searchQuery ? 'Try different keyword' : 'Folder is empty'}</p></div>`;
        return;
      }
      container.innerHTML = `<div class="list" id="contentList"></div>`;
      const listDiv = document.getElementById('contentList');
      filtered.forEach((item, idx) => {
        const thumbHtml = item.data?.thumbnail ? `<img class="thumb small" src="${item.data.thumbnail}" onerror="this.src='${FALLBACK}'">` :
          `<div class="thumb small" style="display:flex; align-items:center; justify-content:center; background:var(--bg2);">${item.type === 'folder' ? '📁' : '🎬'}</div>`;
        const metaHtml = item.type === 'folder' && item.data?.content_counts ? 
          `<div class="item-meta">📹 ${item.data.content_counts.videos || 0} videos · 📄 ${item.data.content_counts.pdfs || 0} notes</div>` :
          (item.data?.duration ? `<div class="item-meta">⏱️ ${Math.floor(item.data.duration/60)} min</div>` : `<div class="item-meta">📅 ${new Date(item.created_at).toLocaleDateString()}</div>`);
        const divItem = document.createElement('div');
        divItem.className = 'item';
        divItem.style.animationDelay = `${idx * 0.03}s`;
        divItem.innerHTML = `
          ${thumbHtml}
          <div class="item-info">
            <div class="item-title">${escapeHtml(item.title)}</div>
            ${metaHtml}
          </div>
        `;
        divItem.onclick = () => handleContentClick(item, container);
        listDiv.appendChild(divItem);
      });
    }
    
    async function handleContentClick(item, container) {
      if (item.type === 'folder') {
        folderStack.push({ id: item.entity_id, name: item.title });
        await renderContentNavigation(container, item.entity_id);
      } else {
        showLoader(true);
        let url = item.data?.file_url;
        if (!url) {
          try {
            const res = await fetch(`${API}/mj/details?content_id=${item.entity_id}&course_id=${currentCourseId}`);
            const json = await res.json();
            if (json.success && json.data) url = json.data.file_url;
          } catch(e) { console.error(e); }
        }
        showLoader(false);
        if (url) {
          if (item.type === 'notes' || item.type === 'pdf' || url.toLowerCase().includes('.pdf')) window.open(url, '_blank');
          else if (url.includes('youtube.com') || url.includes('youtu.be')) {
            let vid = url.includes('v=') ? new URL(url).searchParams.get('v') : url.split('youtu.be/')[1];
            window.open(`https://m.youtube.com/watch?v=${vid}`, '_blank');
          } else {
            window.location.href = `player.html?url=${encodeURIComponent(url)}&title=${encodeURIComponent(item.title)}`;
          }
        } else alert('Content URL not available.');
      }
    }
    
    async function loadLiveTab(container) {
      container.innerHTML = `<div class="loading"><div class="spinner"></div><p>Fetching live classes...</p></div>`;
      if (!liveDataCache) {
        try {
          const res = await fetch(`${API}/mj/live?batchid=${currentCourseId}`);
          const json = await res.json();
          liveDataCache = { live: [], upcoming: [] };
          if (json.success && json.data) {
            json.data.forEach(item => item.is_live == 1 ? liveDataCache.live.push(item) : liveDataCache.upcoming.push(item));
          }
        } catch(e) { liveDataCache = { live: [], upcoming: [] }; }
      }
      const activeLive = liveDataCache.live;
      const upcoming = liveDataCache.upcoming;
      if (activeLive.length === 0 && upcoming.length === 0) {
        container.innerHTML = `<div class="empty"><h3>📡 No live classes</h3><p>Check back later for streams</p></div>`;
        return;
      }
      let html = `<div style="margin-bottom: 16px;"><div class="tabs" style="background:transparent; padding:0;"><button class="tab" id="liveNowBtn" style="background:var(--text); color:var(--bg);">🔴 LIVE NOW (${activeLive.length})</button><button class="tab" id="upcomingBtn">⏰ UPCOMING (${upcoming.length})</button></div></div><div id="liveSubContent"></div>`;
      container.innerHTML = html;
      const renderSub = (type) => {
        const items = type === 'live' ? activeLive : upcoming;
        const subDiv = document.getElementById('liveSubContent');
        if (!subDiv) return;
        if (items.length === 0) { subDiv.innerHTML = `<div class="empty"><p>No ${type} sessions</p></div>`; return; }
        subDiv.innerHTML = `<div class="list"></div>`;
        const listDiv = subDiv.querySelector('.list');
        items.forEach((item, idx) => {
          const isLive = type === 'live';
          const date = new Date(item.created_at);
          const timeStr = date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
          const dateStr = date.toLocaleDateString([], {day:'numeric', month:'short'});
          const card = document.createElement('div');
          card.className = 'item';
          card.style.flexDirection = 'column';
          card.style.alignItems = 'stretch';
          card.innerHTML = `
            <div style="display:flex; gap:14px;">
              <img class="thumb small" src="${item.thumbnail || FALLBACK}" onerror="this.src='${FALLBACK}'" style="width:100px;">
              <div class="item-info">
                <div class="item-title">${escapeHtml(item.title)}</div>
                <div class="item-meta">${isLive ? '🔴 LIVE NOW' : `📅 ${dateStr} at ${timeStr}`}</div>
              </div>
            </div>
            <button class="btn btn-primary" style="margin-top:8px; width:100%;" data-id="${item.entity_id}" data-title="${escapeHtml(item.title)}">${isLive ? '▶ WATCH NOW' : '🔔 REMINDER'}</button>
          `;
          const btn = card.querySelector('button');
          btn.onclick = async (e) => {
            e.stopPropagation();
            if (isLive) {
              showLoader(true);
              try {
                const res = await fetch(`${API}/mj/details?content_id=${item.entity_id}&course_id=${currentCourseId}`);
                const json = await res.json();
                if (json.success && json.data?.file_url) window.location.href = `player.html?url=${encodeURIComponent(json.data.file_url)}&title=${encodeURIComponent(item.title)}&live=1`;
                else alert("Stream not ready");
              } catch(e) { alert("Stream error"); }
              showLoader(false);
            } else alert("This class will start soon! Stay tuned.");
          };
          listDiv.appendChild(card);
        });
      };
      document.getElementById('liveNowBtn')?.addEventListener('click', () => renderSub('live'));
      document.getElementById('upcomingBtn')?.addEventListener('click', () => renderSub('upcoming'));
      renderSub('live');
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }
    
    // Search handler
    function debounce(fn, delay) { let t; return function(...args){ clearTimeout(t); t = setTimeout(()=>fn.apply(this,args), delay); }; }
    searchInput.addEventListener('input', debounce((e) => {
      searchQuery = e.target.value;
      if (currentTab === 'content') {
        const container = document.getElementById('tabContent');
        if (container) renderContentNavigation(container, folderStack[folderStack.length-1]?.id || '0');
      }
    }, 400));
    
    // init
    updateBreadcrumb();
    sideContentDiv.innerHTML = `<img src="${currentBatchInfo.thumbnail}" style="width:100%; border-radius: 16px;" onerror="this.src='${FALLBACK}'"><div style="margin-top:12px; font-weight:bold;">${currentBatchInfo.title}</div><p style="font-size:12px; margin-top:6px;">Click tabs to explore</p>`;
    renderMainInterface();
  </script>
</body>
</html>
