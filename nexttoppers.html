<html lang="en">
<head>

  <title>Mtaiirus — Next Toppers Free Batches</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F5F2EB;
      --bg2: #ECEAE2;
      --panel: #FFFDFB;
      --panel-2: #F5F2EB;
      --card: #FFFDFB;
      --muted: #6B6760;
      --muted2: #B0ADA7;
      --text: #1A1814;
      --soft: #6B6760;
      --line: rgba(26,24,20,.10);
      --accent: #D4540E;
      --accent-2: #e8651f;
      --success: #2D6A3F;
      --warning: #d97706;
      --danger: #D4540E;
      --shadow: 0 18px 50px rgba(26,24,20,.10);
      --radius: 20px;
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--font-body);
      background:
        radial-gradient(circle at top left, rgba(212,84,14,.08), transparent 26%),
        radial-gradient(circle at top right, rgba(240,168,122,.06), transparent 22%),
        linear-gradient(180deg, #F5F2EB 0%, #ECEAE2 55%, #F5F2EB 100%);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container { width: min(1240px, calc(100% - 28px)); margin: 0 auto; }

    /* Topbar */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      background: rgba(245,242,235,.88);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 4px 16px rgba(26,24,20,.04);
    }

    .topbar-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 18px; padding: 16px 0;
    }

    .brand {
      display: flex; align-items: center; gap: 12px; min-width: 0; cursor: pointer;
    }

    .brand-logo {
      width: 38px; height: 38px; border-radius: 10px; object-fit: contain;
      background: #fff; box-shadow: var(--shadow);
      border: 1px solid var(--line); flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0; font-family: var(--font-heading); font-size: 1.1rem;
      font-weight: 800; letter-spacing: 1px; color: var(--text);
    }
    .brand-text h1 span { color: var(--accent); }
    .brand-text p { margin: 3px 0 0; color: var(--muted); font-size: 11px; }

    .search-wrap { flex: 1; max-width: 420px; position: relative; }
    .search {
      width: 100%; height: 48px; border-radius: 14px;
      border: 1px solid var(--line); outline: none;
      background: var(--card); color: var(--text);
      padding: 0 18px 0 46px; transition: .2s ease;
      font-family: var(--font-body);
    }
    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(212,84,14,.08);
    }
    .search::placeholder { color: var(--muted2); }
    .search-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%); color: var(--muted2);
      font-size: 16px; pointer-events: none;
    }

    .filter-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 0 20px; height: 48px;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 14px; font-family: var(--font-body);
      font-weight: 600; color: var(--text); cursor: pointer;
      transition: all 0.2s ease; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); background: var(--bg2); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(212,84,14,.05); }

    /* Page Header */
    .page-header {
      text-align: center; padding: 48px 0 32px;
    }
    .page-header h1 {
      font-family: var(--font-heading);
      font-size: 3rem; font-weight: 800; letter-spacing: -0.02em;
      color: var(--text); margin-bottom: 12px;
    }
    .page-header h1 span { color: var(--accent); }
    .page-header .subtitle {
      color: var(--muted); font-size: 1rem; max-width: 500px; margin: 0 auto;
    }

    /* Filter Modal */
    .filter-overlay {
      position: fixed; inset: 0; background: rgba(26,24,20,.5);
      backdrop-filter: blur(6px); z-index: 1000;
      opacity: 0; visibility: hidden; transition: all 0.3s ease;
    }
    .filter-overlay.open { opacity: 1; visibility: visible; }
    .filter-modal {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--panel); border-radius: 24px 24px 0 0;
      padding: 28px 24px 36px; transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-width: 560px; margin: 0 auto; max-height: 80vh; overflow-y: auto;
      border-top: 1px solid var(--line);
    }
    .filter-overlay.open .filter-modal { transform: translateY(0); }
    .filter-modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--line);
    }
    .filter-modal-header h3 { font-family: var(--font-heading); font-weight: 700; }
    .filter-close-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg2); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .filter-section { margin-bottom: 24px; }
    .filter-section label {
      display: block; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
      margin-bottom: 12px;
    }
    .pill-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .pill-btn {
      padding: 8px 18px; border-radius: 40px; border: 1px solid var(--line);
      background: transparent; font-family: var(--font-body);
      font-size: 0.85rem; font-weight: 500; color: var(--muted);
      cursor: pointer; transition: all 0.2s;
    }
    .pill-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pill-btn.active {
      background: var(--accent); border-color: var(--accent);
      color: white; font-weight: 600;
    }
    .filter-submit-btn {
      width: 100%; padding: 14px; background: var(--text);
      border: none; border-radius: 14px; color: white;
      font-weight: 700; font-size: 1rem; cursor: pointer;
      margin-top: 8px; transition: background 0.2s;
    }
    .filter-submit-btn:hover { background: var(--accent); }

    /* Batch Grid */
    .batch-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px; padding: 16px 0 40px;
    }

    /* Card (2nd file theme) */
    .batch-card {
      background: var(--card); border-radius: 20px;
      border: 1px solid var(--line); overflow: hidden;
      transition: all 0.3s ease; cursor: pointer;
      opacity: 0; transform: translateY(20px);
    }
    .batch-card.visible {
      opacity: 1; transform: translateY(0);
      transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.3s;
    }
    .batch-card:hover {
      transform: translateY(-6px); box-shadow: var(--shadow);
      border-color: var(--accent);
    }
    .card-thumb-wrapper {
      position: relative; width: 100%; padding-top: 56.25%;
      overflow: hidden; background: var(--bg2);
    }
    .card-thumb-wrapper img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transition: transform 0.4s;
    }
    .batch-card:hover .card-thumb-wrapper img { transform: scale(1.05); }
    .play-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.2);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s;
    }
    .batch-card:hover .play-overlay { opacity: 1; }
    .play-circle {
      width: 52px; height: 52px; background: rgba(212,84,14,0.9);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .play-circle svg { width: 22px; height: 22px; fill: white; margin-left: 3px; }

    .bookmark-btn {
      position: absolute; top: 12px; right: 12px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(4px);
      border: 1px solid var(--line); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; z-index: 5;
    }
    .bookmark-btn svg {
      width: 18px; height: 18px; stroke: var(--text); fill: none; stroke-width: 2;
    }
    .bookmark-btn.enrolled svg { fill: var(--accent); stroke: var(--accent); }
    .free-badge {
      position: absolute; bottom: 12px; left: 12px;
      padding: 4px 10px; background: var(--success);
      color: white; font-size: 0.7rem; font-weight: 700;
      border-radius: 20px; letter-spacing: 0.5px;
    }
    .card-body { padding: 16px; }
    .card-title {
      font-family: var(--font-heading); font-size: 0.95rem;
      font-weight: 700; color: var(--text); line-height: 1.4;
      margin-bottom: 12px; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
    }
    .free-access-tag {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.7rem; color: var(--success); font-weight: 600;
    }
    .pulse-dot {
      width: 7px; height: 7px; background: var(--success);
      border-radius: 50%; animation: pulseDot 1.8s infinite;
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .study-link {
      font-size: 0.8rem; font-weight: 700; color: var(--accent);
      text-decoration: none; transition: color 0.2s;
    }
    .study-link:hover { color: var(--accent-2); text-decoration: underline; }

    /* Load More */
    .load-more-wrapper { text-align: center; padding: 20px 0 60px; }
    .load-more-btn {
      padding: 12px 32px; background: transparent;
      border: 1px solid var(--line); border-radius: 40px;
      font-family: var(--font-body); font-weight: 600;
      color: var(--muted); cursor: pointer; transition: all 0.2s;
    }
    .load-more-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(212,84,14,.05); }

    /* Empty & Result */
    .empty-state {
      text-align: center; padding: 60px 20px; display: none;
    }
    .empty-state.show { display: block; }
    .empty-state svg { width: 60px; height: 60px; color: var(--muted2); margin-bottom: 16px; }
    .empty-state h3 { font-family: var(--font-heading); margin-bottom: 8px; }
    .result-count {
      text-align: center; font-size: 0.8rem; color: var(--muted);
      margin: 8px 0 16px;
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--line); margin-top: 20px;
      background: var(--bg2); backdrop-filter: blur(12px);
    }
    .footer-inner {
      display: flex; justify-content: space-between; align-items: center;
      gap: 20px; flex-wrap: wrap; padding: 20px 0;
      color: var(--muted); font-size: 14px;
    }
    .footer-inner a { color: var(--accent); font-weight: 500; margin-left: 18px; }

    /* Instagram Floating */
    .ig-floating-btn {
      position: fixed; bottom: 24px; right: 24px;
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(220,39,67,0.3); z-index: 999;
      transition: transform 0.3s, box-shadow 0.3s; animation: floatPulse 2s infinite;
    }
    .ig-floating-btn:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 8px 25px rgba(220,39,67,0.5); animation: none; }
    .ig-floating-btn svg { width: 28px; height: 28px; fill: white; }
    @keyframes floatPulse {
      0% { transform: scale(1); box-shadow: 0 4px 15px rgba(220,39,67,0.3); }
      50% { transform: scale(1.05); box-shadow: 0 6px 22px rgba(220,39,67,0.5); }
      100% { transform: scale(1); }
    }

    @media (max-width: 720px) {
      .topbar-inner { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: none; }
      .page-header h1 { font-size: 2.2rem; }
      .batch-grid { grid-template-columns: 1fr; gap: 16px; }
      .filter-modal { max-width: 100%; }
    }
  </style>
</head>

  const CARDS_PER_PAGE = 4;
  let currentPage = 1;
  let filteredBatches = [];
  let activeYear = 'all';
  let activeClass = 'all';

  function getAllBatches() {
    return [
      ...batches2026.map(b => ({ ...b, year: '2026-27' })),
      ...batches2025.map(b => ({ ...b, year: '2025-26' }))
    ];
  }

  function detectClass(title) {
    const t = title.toUpperCase();
    if (/\b9TH\b/.test(t)) return '9th';
    if (/\b10TH\b/.test(t)) return '10th';
    if (/\b11TH\b/.test(t)) return '11th';
    if (/\b12TH\b/.test(t)) return '12th';
    return 'others';
  }

  function getEnrollments() { try { return JSON.parse(localStorage.getItem('asm_enrollments_nt') || '[]'); } catch { return []; } }
  function setEnrollments(arr) { localStorage.setItem('asm_enrollments_nt', JSON.stringify(arr)); }
  function isEnrolled(id) { return getEnrollments().includes(id); }
  function toggleEnrollment(id) {
    let arr = getEnrollments();
    if (arr.includes(id)) arr = arr.filter(i => i !== id);
    else arr.push(id);
    setEnrollments(arr);
    return arr.includes(id);
  }

  function applyFilters() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    let all = getAllBatches();
    if (activeYear !== 'all') all = all.filter(b => b.year === activeYear);
    if (activeClass !== 'all') all = all.filter(b => detectClass(b.title) === activeClass);
    if (query) all = all.filter(b => b.title.toLowerCase().includes(query));
    const enrolls = getEnrollments();
    all.sort((a,b) => (enrolls.includes(b.id) - enrolls.includes(a.id)));
    filteredBatches = all;
    currentPage = 1;
    renderBatches();
  }

  function renderBatches() {
    const grid = document.getElementById('batchGrid');
    const empty = document.getElementById('emptyState');
    const resultSpan = document.getElementById('resultCount');
    const loadMoreWrap = document.getElementById('loadMoreWrapper');
    grid.innerHTML = '';
    if (!filteredBatches.length) { empty.classList.add('show'); loadMoreWrap.style.display = 'none'; resultSpan.textContent = ''; return; }
    empty.classList.remove('show');
    const visible = filteredBatches.slice(0, currentPage * CARDS_PER_PAGE);
    resultSpan.textContent = `${visible.length} of ${filteredBatches.length} batch${filteredBatches.length !== 1 ? 'es' : ''}`;
    visible.forEach(b => grid.appendChild(createCard(b)));
    loadMoreWrap.style.display = (visible.length >= filteredBatches.length) ? 'none' : 'block';
    setTimeout(() => { document.querySelectorAll('.batch-card').forEach(c => c.classList.add('visible')); }, 20);
  }

  function createCard(batch) {
    const card = document.createElement('div'); card.className = 'batch-card';
    const enrolled = isEnrolled(batch.id);
    card.innerHTML = `
      <div class="card-thumb-wrapper">
        <img src="${batch.thumbnail}" alt="${batch.title}" loading="lazy" onerror="this.src='https://placehold.co/400x225/ECEAE2/6B6760?text=No+Image'">
        <div class="play-overlay"><div class="play-circle"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
        <button class="bookmark-btn ${enrolled ? 'enrolled' : ''}" data-id="${batch.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
        <span class="free-badge">FREE</span>
      </div>
      <div class="card-body">
        <h3 class="card-title">${escapeHtml(batch.title)}</h3>
        <div class="card-footer">
          <div class="free-access-tag"><span class="pulse-dot"></span> Free Access</div>
          <a href="batch.html?id=${batch.id}" class="study-link">Study →</a>
        </div>
      </div>
    `;
    const bookmark = card.querySelector('.bookmark-btn');
    bookmark.addEventListener('click', (e) => {
      e.stopPropagation();
      const now = toggleEnrollment(batch.id);
      bookmark.classList.toggle('enrolled', now);
      applyFilters();
    });
    card.addEventListener('click', () => window.location.href = `batch.html?id=${batch.id}`);
    return card;
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  document.getElementById('loadMoreBtn').addEventListener('click', () => { currentPage++; renderBatches(); });
  let debounce; document.getElementById('searchInput').addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(applyFilters, 250); });

  // Filters Modal
  const overlay = document.getElementById('filterOverlay');
  const toggleBtn = document.getElementById('filterToggleBtn');
  const closeBtn = document.getElementById('filterCloseBtn');
  const submitBtn = document.getElementById('filterSubmitBtn');
  toggleBtn.onclick = () => overlay.classList.add('open');
  closeBtn.onclick = () => overlay.classList.remove('open');
  overlay.onclick = (e) => { if (e.target === overlay) overlay.classList.remove('open'); };
  document.getElementById('yearPills').addEventListener('click', (e) => {
    const btn = e.target.closest('.pill-btn'); if (!btn) return;
    document.querySelectorAll('#yearPills .pill-btn').forEach(p => p.classList.remove('active'));
    btn.classList.add('active'); activeYear = btn.dataset.value;
  });
  document.getElementById('classPills').addEventListener('click', (e) => {
    const btn = e.target.closest('.pill-btn'); if (!btn) return;
    document.querySelectorAll('#classPills .pill-btn').forEach(p => p.classList.remove('active'));
    btn.classList.add('active'); activeClass = btn.dataset.value;
  });
  submitBtn.onclick = () => { overlay.classList.remove('open'); applyFilters(); toggleBtn.classList.toggle('active', activeYear !== 'all' || activeClass !== 'all'); };
  function goHome() { window.location.href = 'index.html'; }
  applyFilters();
</script>
