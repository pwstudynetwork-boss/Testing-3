<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#D4540E">
  <title>Mtaiirus — Course Topics</title>
  <meta name="description" content="Access all course topics and study materials on Mtaiirus. Free premium content for JEE, NEET, and board exams.">
  <link rel="icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="apple-touch-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    
    :root {
      --bg: #F5F2EB;
      --bg2: #ECEAE2;
      --ink: #1A1814;
      --ink2: #6B6760;
      --ink3: #B0ADA7;
      --accent: #D4540E;
      --accentl: #F0A87A;
      --accentb: rgba(212,84,14,.08);
      --green: #2D6A3F;
      --greenl: #E4F0E8;
      --blue: #1A4B8C;
      --bluel: #E4EBF7;
      --card: #FFFDFB;
      --border: rgba(26,24,20,.1);
      --borderh: rgba(26,24,20,.2);
      --shadow: 0 2px 0 var(--border), 0 8px 30px rgba(26,24,20,.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* Floating bg words */
    .floating-words {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: .04;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 5vw, 5rem);
      color: var(--ink);
      white-space: nowrap;
      user-select: none;
    }
    .float-word {
      position: absolute;
      animation: floatAround 26s infinite alternate ease-in-out;
      letter-spacing: -2px;
    }
    .float-word:nth-child(1) { top: 8%; left: 3%; animation-duration: 22s; }
    .float-word:nth-child(2) { top: 22%; right: 5%; animation-duration: 30s; animation-delay: -5s; }
    .float-word:nth-child(3) { bottom: 18%; left: 8%; animation-duration: 24s; animation-delay: -8s; }
    .float-word:nth-child(4) { bottom: 32%; right: 4%; animation-duration: 28s; animation-delay: -13s; }
    @keyframes floatAround {
      0% { transform: translate(0,0) rotate(0deg); }
      25% { transform: translate(35px,-25px) rotate(1.5deg); }
      50% { transform: translate(-25px,30px) rotate(-1.5deg); }
      75% { transform: translate(20px,15px) rotate(.8deg); }
      100% { transform: translate(-15px,-20px) rotate(-.8deg); }
    }

    /* Header */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(245,242,235,.96);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      padding: 0 clamp(16px, 4vw, 40px);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .brand-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .brand-logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: 1.5px;
    }
    .brand-name span { color: var(--accent); }
    .header-back {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 40px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .2s;
      color: var(--ink2);
    }
    .header-back:hover {
      background: var(--accentb);
      border-color: var(--accent);
      color: var(--accent);
    }
    .header-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      background: var(--accentb);
      padding: 6px 16px;
      border-radius: 100px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Loading bar */
    .loading-bar {
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(212,84,14,.2);
      z-index: 1001;
    }
    .loading-bar-inner {
      height: 100%;
      width: 0%;
      background: var(--accent);
      animation: loadingProgress 1.5s ease-in-out infinite;
    }
    @keyframes loadingProgress {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }
    .hidden { display: none !important; }

    /* Main container */
    .main-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 88px clamp(16px, 4vw, 40px) 60px;
      position: relative;
      z-index: 1;
    }

    /* Topics list */
    .topics-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .list-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all .25s cubic-bezier(.2,0,0,1);
      position: relative;
    }
    .list-item:hover {
      transform: translateX(4px);
      border-color: var(--accentl);
      box-shadow: var(--shadow);
    }
    .list-item-violet {
      background: linear-gradient(135deg, var(--card) 0%, var(--accentb) 100%);
      border-left: 3px solid var(--accent);
    }
    .section-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .section-dot-violet {
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accentl);
    }
    .section-dot-gray {
      background: var(--ink3);
    }
    .list-item-content {
      flex: 1;
    }
    .list-item-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .list-item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 11px;
      color: var(--ink3);
    }
    .list-item-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .list-item-arrow {
      color: var(--ink2);
      transition: all .2s;
      flex-shrink: 0;
    }
    .list-item:hover .list-item-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }
    .tag-pill {
      background: var(--accentb);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .mt-2 { margin-top: 8px; }

    /* Skeleton */
    .skeleton-list-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .skeleton-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--bg2);
      animation: pulse 1.5s infinite;
    }
    .skeleton-content {
      flex: 1;
    }
    .skeleton-line {
      height: 16px;
      background: var(--bg2);
      border-radius: 20px;
      margin-bottom: 8px;
      animation: pulse 1.5s infinite;
    }
    .skeleton-line-sm {
      width: 60%;
      height: 12px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-state-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: var(--bg2);
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--ink3);
    }
    .empty-state-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .empty-state-subtitle {
      font-size: 13px;
      color: var(--ink2);
    }
    .text-red-400 { color: #ef4444; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--ink);
      color: var(--bg);
      padding: 12px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      animation: slideUp .3s ease;
      pointer-events: auto;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Security watermark */
    .security-watermark {
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-size: 9px;
      color: rgba(107,103,96,.15);
      font-family: monospace;
      z-index: 9999;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 700px) {
      .main-container { padding-top: 80px; }
      .header-title { font-size: 14px; white-space: normal; }
      .list-item { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<div class="floating-words">
  <div class="float-word">TOPICS</div>
  <div class="float-word">FREE COURSES</div>
  <div class="float-word">MTAIIRUS</div>
  <div class="float-word">STUDY NOW</div>
</div>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="brand-link">
      <div class="brand-logo">
        <img src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" alt="Mtaiirus" onerror="this.parentElement.innerHTML='<span style=\'font-size:20px\'>M</span>'">
      </div>
      <span class="brand-name">MTAI<span>IRUS</span></span>
    </a>
    <button class="header-back" onclick="window.history.back()" aria-label="Go back">
      <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="header-title" id="subject-name">Loading...</h1>
  </div>
</header>

<div class="loading-bar hidden" id="loading-bar">
  <div class="loading-bar-inner"></div>
</div>

<main class="main-container">
  <div class="topics-list" id="topics-container">
    <!-- Skeletons -->
    <div class="skeleton-list-item">
      <div class="skeleton-dot"></div>
      <div class="skeleton-content">
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line-sm"></div>
      </div>
    </div>
    <div class="skeleton-list-item">
      <div class="skeleton-dot"></div>
      <div class="skeleton-content">
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line-sm"></div>
      </div>
    </div>
    <div class="skeleton-list-item">
      <div class="skeleton-dot"></div>
      <div class="skeleton-content">
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line-sm"></div>
      </div>
    </div>
    <div class="skeleton-list-item">
      <div class="skeleton-dot"></div>
      <div class="skeleton-content">
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line-sm"></div>
      </div>
    </div>
  </div>
</main>

<div class="toast-container" id="toast-container"></div>
<div class="security-watermark">🔒 MTAIIRUS SECURE • v4.8.1</div>

<script>
(function() {
  'use strict';
  
  // ==================== SECURITY LAYER ====================
  
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  }, true);
  
  document.addEventListener('keydown', function(e) {
    const key = e.key || '';
    const keyCode = e.keyCode || e.which;
    if (keyCode === 123) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (key === 'I' || key === 'J' || key === 'C' || key === 'i' || key === 'j' || key === 'c')) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
    if ((e.ctrlKey || e.metaKey) && (key === 'U' || key === 'u' || key === 'S' || key === 's' || key === 'P' || key === 'p' || key === 'R' || key === 'r')) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);
  
  window.addEventListener('beforeprint', function(e) {
    e.preventDefault();
    e.stopImmediatePropagation();
    window.print = function() { return false; };
    return false;
  }, true);
  
  const disableEvents = ['copy', 'cut', 'paste', 'selectstart', 'dragstart', 'select', 'selectionchange'];
  disableEvents.forEach(function(ev) {
    document.addEventListener(ev, function(e) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }, true);
  });
  
  document.body.style.userSelect = 'none';
  document.body.style.webkitUserSelect = 'none';
  document.body.style.msUserSelect = 'none';
  document.body.style.mozUserSelect = 'none';
  
  let devToolsOpen = false;
  const element = new Image();
  Object.defineProperty(element, 'id', {
    get: function() {
      devToolsOpen = true;
      window.location.href = 'about:blank';
      throw new Error('DevTools detected');
    }
  });
  setInterval(function() {
    devToolsOpen = false;
    console.log(element);
    console.clear();
    if (devToolsOpen) {
      window.location.href = 'about:blank';
    }
  }, 1000);
  
  setInterval(function() {
    var start = performance.now();
    debugger;
    var end = performance.now();
    if (end - start > 100) {
      window.location.href = 'about:blank';
    }
  }, 2000);
  
  setInterval(function() {
    console.clear();
  }, 500);
  
  const noop = function() {};
  const consoleMethods = ['log', 'warn', 'error', 'info', 'debug', 'table', 'dir', 'dirxml', 'trace', 'group', 'groupCollapsed', 'groupEnd', 'time', 'timeEnd', 'profile', 'profileEnd', 'count', 'clear'];
  for (var i = 0; i < consoleMethods.length; i++) {
    if (console[consoleMethods[i]]) {
      console[consoleMethods[i]] = noop;
    }
  }
  
  document.onmouseup = function(e) {
    window.getSelection().removeAllRanges();
    return false;
  };
  
  setInterval(function() {
    var threshold = 160;
    var w = window.outerWidth - window.innerWidth;
    var h = window.outerHeight - window.innerHeight;
    if (w > threshold || h > threshold) {
      window.location.href = 'about:blank';
    }
  }, 600);
  
  if (window.self !== window.top) {
    window.top.location = window.self.location;
  }
  
  if (window.location.href.indexOf('view-source:') === 0) {
    window.location.href = 'about:blank';
  }
  
  window.addEventListener('dragstart', function(e) {
    e.preventDefault();
    return false;
  }, true);
  
  console.log('%c🔒 MTAIIRUS SECURE CONTENT • Copying Prohibited', 'color: #D4540E; font-size: 16px; font-weight: bold;');
  
  // ==================== END SECURITY ====================
  
  // ==================== APP FUNCTIONALITY ====================
  
  const urlParams = new URLSearchParams(window.location.search);
  const batchId = urlParams.get('batchId');
  const subjectSlug = urlParams.get('subjectSlug');
  const subjectName = urlParams.get('subjectName') || 'Subject';
  const subjectId = urlParams.get('subjectId');
  
  document.getElementById('subject-name').textContent = decodeURIComponent(subjectName);
  document.title = `Mtaiirus — ${decodeURIComponent(subjectName)}`;

  const WORKER = 'https://pw.2snfjitu.workers.dev';

  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // UPDATED: Navigation to pwopic.html with all parameters
  function navigateToTopic(topicId, topicName, topicSlug) {
    let nameSlug = topicName
      .toLowerCase()
      .replace(/[^a-z0-9\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-');
    
    const encodedBatchId = encodeURIComponent(batchId);
    const encodedSubjectSlug = encodeURIComponent(subjectSlug);
    const encodedTopicSlug = encodeURIComponent(topicSlug);
    const encodedTopicName = encodeURIComponent(nameSlug);
    const encodedTopicId = encodeURIComponent(topicId);
    const encodedSubjectId = encodeURIComponent(subjectId);
    
    // Correct URL: pwopic.html
    window.location.href = `pwopic.html?batchId=${encodedBatchId}&subjectSlug=${encodedSubjectSlug}&topicSlug=${encodedTopicSlug}&topicName=${encodedTopicName}&topicId=${encodedTopicId}&subjectId=${encodedSubjectId}`;
  }

  async function fetchTopics() {
    if (!batchId || !subjectSlug) {
      showToast('Invalid course information', 'error');
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      return;
    }
    
    const container = document.getElementById('topics-container');
    const loadingBar = document.getElementById('loading-bar');
    loadingBar.classList.remove('hidden');
    
    try {
      const res = await fetch(`${WORKER}/api/pw/topics?BatchId=${batchId}&SubjectId=${subjectSlug}`);
      const data = await res.json();
      
      container.innerHTML = '';
      
      if (!data.success) {
        throw new Error(data.error || 'Failed to fetch topics');
      }
      
      const topics = Array.isArray(data.data) ? data.data : [];
      
      if (topics.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <i class="fas fa-folder-open"></i>
            </div>
            <h2 class="empty-state-title">No topics found</h2>
            <p class="empty-state-subtitle">This course doesn't have any topics yet.</p>
          </div>
        `;
        return;
      }

      // Aggregate counts for "All Contents"
      let totalVideos = 0, totalExercises = 0, totalNotes = 0;
      topics.forEach(t => {
        totalVideos += (t.videos || t.lectureVideos || 0);
        totalExercises += (t.exercises || 0);
        totalNotes += (t.notes || 0);
      });
      
      const allContents = {
        _id: 'all-contents',
        name: 'All Contents',
        slug: 'all-contents',
        videos: totalVideos,
        exercises: totalExercises,
        notes: totalNotes
      };
      
      const fullList = [allContents, ...topics];
      
      fullList.forEach((topic, index) => {
        const isAll = topic._id === 'all-contents';
        const videos = topic.videos || topic.lectureVideos || 0;
        const exercises = topic.exercises || 0;
        const notes = topic.notes || 0;
        
        const item = document.createElement('div');
        item.className = `list-item ${isAll ? 'list-item-violet' : ''}`;
        item.style.animation = `slideUp 0.3s ease forwards ${index * 0.05}s`;
        item.style.opacity = '0';
        item.style.transform = 'translateY(20px)';
        
        item.onclick = () => {
          navigateToTopic(topic._id, topic.name, topic.slug);
        };
        
        let metaHtml = '';
        if (videos > 0) metaHtml += `<span><i class="fas fa-video"></i> ${videos} Videos</span>`;
        if (exercises > 0) metaHtml += `<span><i class="fas fa-tasks"></i> ${exercises} Exercises</span>`;
        if (notes > 0) metaHtml += `<span><i class="fas fa-file-alt"></i> ${notes} Notes</span>`;
        
        let tagsHtml = '';
        if (isAll && (videos > 0 || exercises > 0 || notes > 0)) {
          tagsHtml = `<div class="flex gap-2 mt-2">
            <span class="tag-pill"><i class="fas fa-play-circle"></i> All Videos</span>
            <span class="tag-pill"><i class="fas fa-puzzle-piece"></i> All Exercises</span>
            <span class="tag-pill"><i class="fas fa-sticky-note"></i> All Notes</span>
          </div>`;
        }

        item.innerHTML = `
          <div class="section-dot ${isAll ? 'section-dot-violet' : 'section-dot-gray'}"></div>
          <div class="list-item-content">
            <div class="list-item-title">${topic.name.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
            ${(videos > 0 || exercises > 0 || notes > 0) ? `<div class="list-item-meta">${metaHtml}</div>` : ''}
            ${tagsHtml}
          </div>
          <div class="list-item-arrow">
            <i class="fas fa-chevron-right"></i>
          </div>
        `;
        
        container.appendChild(item);
        
        setTimeout(() => {
          item.style.opacity = '1';
          item.style.transform = 'translateY(0)';
        }, 50);
      });

    } catch (err) {
      console.error(err);
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon" style="color: #ef4444; background: rgba(239,68,68,0.1);">
            <i class="fas fa-exclamation-triangle"></i>
          </div>
          <h2 class="empty-state-title text-red-400">Something went wrong</h2>
          <p class="empty-state-subtitle">${err.message || 'Failed to load topics. Please try again.'}</p>
        </div>
      `;
      showToast('Failed to load topics', 'error');
    } finally {
      loadingBar.classList.add('hidden');
    }
  }

  fetchTopics();
})();
</script>

<style>
  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .list-item {
    transition: all .25s cubic-bezier(.2,0,0,1);
  }
</style>
</body>
</html>
