

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#D4540E">
  <title>Mtaiirus — Video Player</title>
  <meta name="description" content="Watch free premium PW video lectures on Mtaiirus. High-quality playback for JEE, NEET, and board exam preparation.">
  <link rel="icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="apple-touch-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <!-- Load Shaka Player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.7/shaka-player.compiled.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: #000; color: #fff; height: 100vh; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
    
    @media (min-width: 768px) {
      body { flex-direction: row; }
    }

    /* Video Area */
    .video-container { position: relative; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
    @media (max-width: 767px) {
      .video-container { height: 56.25vw; max-height: 45vh; flex-shrink: 0; }
    }
    @media (min-width: 768px) {
      .video-container { flex: 1; min-width: 0; height: 100vh; }
    }
    .video-player { width: 100%; height: 100%; object-fit: contain; }
    .yt-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; pointer-events: none; }
    
    /* Overlay UI */
    .overlay { position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column; justify-content: space-between; opacity: 1; transition: opacity 0.3s; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 15%, transparent 80%, rgba(0,0,0,0.85) 100%); pointer-events: none; }
    .overlay.hidden { opacity: 0; }
    
    .top-bar { padding: 12px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
    .bottom-bar { padding: 10px 12px; pointer-events: auto; }
    @media (min-width: 768px) {
      .top-bar { padding: 16px; }
      .bottom-bar { padding: 16px; }
    }
    
    button { background: transparent; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; border-radius: 8px; }
    button:hover { background: rgba(255,255,255,0.1); color: #D4540E; }
    button:active { transform: scale(0.95); }
    .btn-icon { width: 40px; height: 40px; min-width: 40px; }
    .btn-control { width: 44px; height: 44px; min-width: 44px; }
    @media (min-width: 768px) {
      .btn-control { width: 48px; height: 48px; }
    }
    
    /* Progress Bar */
    .progress-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    @media (min-width: 768px) { .progress-wrapper { gap: 12px; margin-bottom: 8px; } }
    .time-display { font-family: 'JetBrains Mono', monospace; font-size: 0.6875rem; color: rgba(255,255,255,0.7); width: 52px; text-align: center; }
    @media (min-width: 768px) { .time-display { font-size: 0.75rem; width: 60px; } }
    .progress-bar { flex: 1; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; position: relative; cursor: pointer; touch-action: none; }
    @media (min-width: 768px) { .progress-bar { height: 6px; } }
    .progress-buffer { position: absolute; top: 0; left: 0; height: 100%; background: rgba(255,255,255,0.3); border-radius: 4px; pointer-events: none; }
    .progress-filled { position: absolute; top: 0; left: 0; height: 100%; background: #D4540E; border-radius: 4px; pointer-events: none; }
    .progress-handle { position: absolute; top: 50%; width: 16px; height: 16px; background: #D4540E; border-radius: 50%; transform: translate(-50%, -50%); opacity: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: none; transition: opacity 0.2s; }
    @media (min-width: 768px) {
      .progress-handle { width: 14px; height: 14px; opacity: 0; }
      .progress-bar:hover .progress-handle { opacity: 1; }
    }

    /* Bottom Controls */
    .controls-row { display: flex; justify-content: space-between; align-items: center; }
    .controls-left, .controls-right { display: flex; align-items: center; gap: 4px; }
    @media (min-width: 768px) { .controls-left, .controls-right { gap: 8px; } }
    
    /* Settings Menu */
    .settings-menu { position: absolute; bottom: 70px; right: 8px; background: rgba(15,15,26,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; width: 200px; display: none; overflow: hidden; z-index: 25; }
    @media (min-width: 768px) { .settings-menu { bottom: 80px; right: 16px; } }
    .settings-menu.open { display: block; }
    .settings-item { padding: 12px 16px; font-size: 0.875rem; display: flex; justify-content: space-between; cursor: pointer; }
    .settings-item:hover { background: rgba(212,84,14,0.1); }
    .settings-item.active { color: #D4540E; background: rgba(212,84,14,0.1); }
    .settings-header { padding: 12px 16px; font-size: 0.875rem; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; cursor: pointer; }
    
    /* Loading States */
    .loader-overlay { position: absolute; inset: 0; background: #000; z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #D4540E; border-radius: 50%; animation: spin 1s linear infinite; }
    .loader-text { margin-top: 16px; font-size: 0.875rem; color: rgba(255,255,255,0.7); }
    .loader-progress { width: 200px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 16px; border-radius: 2px; overflow: hidden; }
    .loader-progress-inner { height: 100%; background: #D4540E; width: 0%; transition: width 0.3s; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Side Panel */
    @media (max-width: 767px) {
      .side-panel { width: 100%; flex: 1; background: #0f0f1a; border-top: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; z-index: 40; position: relative; transform: none; overflow: hidden; }
      .side-panel.open { display: flex; }
    }
    @media (min-width: 768px) {
      .side-panel { width: 384px; height: 100vh; background: #0f0f1a; border-left: 1px solid rgba(255,255,255,0.1); display: none; flex-direction: column; z-index: 40; position: static; transform: none; }
      .side-panel.open { display: flex; }
    }
    .panel-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
    .panel-tab { flex: 1; padding: 12px; font-size: 0.8125rem; font-weight: 600; color: rgba(255,255,255,0.3); border-bottom: 2px solid transparent; border-radius: 0; background: transparent; cursor: pointer; }
    @media (min-width: 768px) { .panel-tab { padding: 16px; font-size: 0.875rem; } }
    .panel-tab:hover { color: #fff; background: transparent; }
    .panel-tab.active { color: #D4540E; border-bottom-color: #D4540E; background: transparent; }
    .panel-close { padding: 12px; color: rgba(255,255,255,0.3); display: none; cursor: pointer; background: transparent; }
    @media (max-width: 767px) { .panel-close { display: none; } }
    @media (min-width: 768px) { .panel-close { display: flex; padding: 16px; } }
    .panel-close:hover { color: #D4540E; background: transparent; }
    .panel-content { flex: 1; overflow-y: auto; padding: 8px; -webkit-overflow-scrolling: touch; }
    @media (min-width: 768px) { .panel-content { padding: 12px; } }
    
    /* List Items */
    .panel-item { display: flex; gap: 10px; padding: 10px; border-radius: 12px; margin-bottom: 6px; cursor: pointer; transition: background 0.2s; }
    .panel-item:hover { background: rgba(212,84,14,0.08); }
    .panel-item.active { background: rgba(212,84,14,0.12); border: 1px solid rgba(212,84,14,0.3); }
    .panel-item img { width: 96px; height: 54px; object-fit: cover; border-radius: 8px; background: #000; flex-shrink: 0; }
    @media (min-width: 768px) { .panel-item img { width: 112px; height: 63px; } }
    .panel-item-title { font-size: 0.8125rem; font-weight: 600; color: rgba(255,255,255,0.85); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
    @media (min-width: 768px) { .panel-item-title { font-size: 0.875rem; } }
    .panel-item-meta { font-size: 0.6875rem; color: rgba(255,255,255,0.3); margin-top: 4px; }
    
    /* Slides */
    .slides-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .slide-item { position: relative; border-radius: 10px; overflow: hidden; background: #17172a; cursor: pointer; }
    .slide-item:hover { box-shadow: 0 0 0 2px #D4540E; }
    .slide-item:active { transform: scale(0.97); }
    .slide-item img { width: 100%; display: block; }
    .slide-time { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.8); color: #D4540E; font-family: monospace; font-size: 0.625rem; padding: 2px 5px; border-radius: 4px; }
    @media (min-width: 768px) { .slide-time { font-size: 0.75rem; padding: 2px 6px; } }

    .note-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #17172a; border-radius: 12px; margin-bottom: 8px; }
    .note-icon { width: 36px; height: 36px; background: rgba(212,84,14,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    @media (min-width: 768px) { .note-icon { width: 40px; height: 40px; } }

    /* Clickable background trap */
    .click-trap { position: absolute; inset: 0; z-index: 10; }
    
    /* Security watermark */
    .security-watermark {
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-size: 9px;
      color: rgba(255,255,255,0.15);
      font-family: monospace;
      z-index: 9999;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <!-- Main Video Area -->
  <div class="video-container" id="video-container">
    
    <!-- Loader -->
    <div id="loader" class="loader-overlay">
      <div class="spinner"></div>
      <div id="loader-text" class="loader-text">Initializing...</div>
      <div class="loader-progress"><div id="loader-bar" class="loader-progress-inner"></div></div>
    </div>

    <!-- Error State -->
    <div id="error-state" class="loader-overlay" style="display: none; background: rgba(0,0,0,0.95);">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D4540E" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" x2="12" y1="9" y2="13"></line><line x1="12" x2="12.01" y1="17" y2="17"></line></svg>
      <h2 style="font-size: 1.25rem; margin: 16px 0 8px; font-family: 'Syne', sans-serif;">Video Unavailable</h2>
      <p id="error-msg" style="color: rgba(255,255,255,0.4); font-size: 0.875rem; margin-bottom: 24px; max-width: 300px; text-align: center;"></p>
      <button onclick="window.history.back()" style="background: #D4540E; padding: 10px 24px; font-weight: 600; border: none; border-radius: 8px; color: white; cursor: pointer;">Go Back</button>
    </div>

    <!-- Players -->
    <video id="shaka-video" class="video-player" playsinline autoplay muted></video>
    <div id="yt-container" class="yt-container"></div>
    
    <div class="click-trap" id="click-trap"></div>

    <!-- Buffering Spinner -->
    <div id="buffering-spinner" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 15; display: none;">
      <div class="spinner" style="width: 56px; height: 56px; border-width: 4px; border-top-color: #D4540E;"></div>
    </div>

    <!-- Overlay UI -->
    <div id="overlay" class="overlay hidden">
      <div class="top-bar">
        <button class="btn-icon" onclick="window.history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <div style="display: flex; gap: 8px;">
          <button class="btn-icon" style="background: rgba(0,0,0,0.3)" onclick="toggleSidePanel()" id="btn-panel-toggle">
            <svg width="22" height="22" viewBox="0 0 27 27" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M3.375 5.625H3.3875M3.375 13.5H3.3875M3.375 21.375H3.3875M9 5.625H23.625M9 13.5H23.625M9 21.375H23.625"></path></svg>
          </button>
        </div>
      </div>

      <div class="bottom-bar">
        <div class="progress-wrapper">
          <span class="time-display" id="time-current">0:00</span>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-buffer" id="progress-buffer" style="width: 0%"></div>
            <div class="progress-filled" id="progress-filled" style="width: 0%"></div>
            <div class="progress-handle" id="progress-handle" style="left: 0%"></div>
          </div>
          <span class="time-display" id="time-duration">0:00</span>
        </div>

        <div class="controls-row">
          <div class="controls-left">
            <button class="btn-control" onclick="seekBy(-10)">
              <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M21.47 6.18C19.25 4.31 16.7 3.12 14 2.85c-.22-.02-.44-.03-.66-.04l1.46-1.15a.94.94 0 00-.33-1.66.93.93 0 00-.99.35L10.15 2.97a1.11 1.11 0 000 1.99l3.51 2.79a.94.94 0 001.09-1.62l-2.58-2.03c.53-.04 1.06-.04 1.58 0C16.39 4.33 18.51 5.33 20.12 6.92c3.85 3.8 3.85 9.99 0 13.79-1.87 1.84-4.36 2.86-6.99 2.86s-5.12-1.02-6.99-2.86C2.3 16.91 2.3 10.72 6.14 6.92a.94.94 0 00-1.33-1.31C2.37 7.79 1.14 10.71 1.14 13.81s1.23 6.02 3.47 8.22c2.23 2.2 5.19 3.41 8.34 3.41s6.11-1.21 8.34-3.41c2.24-2.2 3.47-5.12 3.47-8.22s-1.23-6.02-3.39-8.19z" fill="#fff"></path><text x="50%" y="66%" text-anchor="middle" font-size="7.5" font-weight="bold" fill="white" font-family="sans-serif">10</text></svg>
            </button>
            <button class="btn-control" id="btn-play-pause" onclick="togglePlay()">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z" id="icon-play"></path><path d="M6.75 5.25a.75.75 0 01.75-.75H9a.75.75 0 01.75.75v13.5a.75.75 0 01-.75.75H7.5a.75.75 0 01-.75-.75V5.25Zm7.5 0A.75.75 0 0115 4.5h1.5a.75.75 0 01.75.75v13.5a.75.75 0 01-.75.75H15a.75.75 0 01-.75-.75V5.25Z" id="icon-pause" style="display:none"></path></svg>
            </button>
            <button class="btn-control" onclick="seekBy(10)">
              <svg viewBox="0 0 26 26" fill="none" width="26" height="26"><path d="M4.81 6.18C7.03 4.31 9.58 3.12 12.28 2.85c.22-.02.44-.03.66-.04L11.48 1.66a.94.94 0 01.33-1.66.93.93 0 01.99.35l3.22 2.62a1.11 1.11 0 010 1.99L12.51 7.75a.94.94 0 01-1.09-1.62L14 4.1c-.53-.04-1.06-.04-1.58 0C9.89 4.33 7.77 5.33 6.16 6.92c-3.85 3.8-3.85 9.99 0 13.79 1.87 1.84 4.36 2.86 6.99 2.86s5.12-1.02 6.99-2.86c3.85-3.8 3.85-9.99 0-13.79a.94.94 0 011.33-1.31c2.24 2.18 3.47 5.1 3.47 8.2s-1.23 6.02-3.47 8.22c-2.23 2.2-5.19 3.41-8.34 3.41S6.03 24.02 3.8 21.82c-2.24-2.2-3.47-5.12-3.47-8.22s1.23-6.02 3.48-8.42z" fill="#fff"></path><text x="50%" y="66%" text-anchor="middle" font-size="7.5" font-weight="bold" fill="white" font-family="sans-serif">10</text></svg>
            </button>
            <button class="btn-control" onclick="toggleMute()" id="btn-mute">
              <svg width="24" height="24" viewBox="0 0 28 28" fill="none"><path id="icon-vol-on" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12.833 5.486a.822.822 0 0 0-1.403-.581L7.482 8.852a1.63 1.63 0 0 1-1.164.481H3.5A1.167 1.167 0 0 0 2.333 10.5v7A1.167 1.167 0 0 0 3.5 18.667h2.818a1.63 1.63 0 0 1 1.164.482l3.946 3.948a.823.823 0 0 0 1.405-.583zM18.667 10.5a5.83 5.83 0 0 1 0 7M22.59 21.425a10.5 10.5 0 0 0 0-14.85"></path><g id="icon-vol-off" style="display:none"><path d="M14.833 5.486a.822.822 0 0 0-1.403-.581L9.482 8.852a1.63 1.63 0 0 1-1.164.481H5.5A1.167 1.167 0 0 0 4.333 10.5v7A1.167 1.167 0 0 0 5.5 18.667h2.818a1.63 1.63 0 0 1 1.164.482l3.946 3.948a.823.823 0 0 0 1.405-.583z" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path><path d="M21 11L27 17M27 11L21 17" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" transform="translate(-4,-0.5)"></path></g></svg>
            </button>
          </div>
          
          <div class="controls-right" style="position: relative;">
            <button class="btn-control" onclick="toggleSettings(event)" id="btn-settings">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
            </button>
            <button class="btn-control" onclick="toggleFullscreen()" id="btn-fullscreen">

              <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff" id="icon-fs-exit" style="display:none"><path fill-rule="evenodd" clip-rule="evenodd" d="M3.7 6.78H8.37V2H6.04v4.44H3.7V6.78ZM3.7 16.25H6.04V18.47H8.37v2.17H3.7V16.25ZM20.63 6.78h-4.67V2h2.33v4.44h2.34V6.78ZM20.63 16.25h-2.34V20.64h-2.33v-2.17h4.67V16.25Z"></path></svg>
            </button>

            <!-- Settings Dropdown -->
            <div class="settings-menu" id="settings-menu" onclick="event.stopPropagation()">
              <div id="settings-main">
                <div class="settings-item" onclick="openSubmenu('speed')"><span>Speed</span><span style="color:rgba(255,255,255,0.5)" id="val-speed">Normal ›</span></div>
                <div class="settings-item" onclick="openSubmenu('quality')" id="menu-quality"><span>Quality</span><span style="color:rgba(255,255,255,0.5)" id="val-quality">Auto ›</span></div>
              </div>
              <div id="settings-speed" style="display:none">
                <div class="settings-header" onclick="closeSubmenu()">‹ Speed</div>
                <div class="settings-item" onclick="setSpeed(0.25)">0.25x</div>
                <div class="settings-item" onclick="setSpeed(0.5)">0.5x</div>
                <div class="settings-item" onclick="setSpeed(0.75)">0.75x</div>
                <div class="settings-item active" onclick="setSpeed(1)">Normal</div>
                <div class="settings-item" onclick="setSpeed(1.25)">1.25x</div>
                <div class="settings-item" onclick="setSpeed(1.5)">1.5x</div>
                <div class="settings-item" onclick="setSpeed(1.75)">1.75x</div>
                <div class="settings-item" onclick="setSpeed(2)">2x</div>
              </div>
              <div id="settings-quality" style="display:none">
                <div class="settings-header" onclick="closeSubmenu()">‹ Quality</div>
                <div class="settings-item active" onclick="setQuality('auto')">Auto</div>
                <div id="quality-tracks"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Side Panel -->
  <div class="side-panel open" id="side-panel">
    <div class="panel-tabs">

      // ==================== PLAYER FUNCTIONALITY ====================
      
      const urlParams = new URLSearchParams(window.location.search);

      const WORKER = 'https://pw.2snfjitu.workers.dev';
      
      // Player State
      let shakaPlayer = null;
      let ytPlayer = null;
      let isYT = false;
      let duration = 0;
      let isPlaying = false;
      let isMuted = false;
      let manifestUrl = '';
      
      // UI Elements
      const video = document.getElementById('shaka-video');
      const ytContainer = document.getElementById('yt-container');

      const timeCurrent = document.getElementById('time-current');
      const timeDuration = document.getElementById('time-duration');
      const progressBar = document.getElementById('progress-bar');
      const progressFilled = document.getElementById('progress-filled');
      const progressBuffer = document.getElementById('progress-buffer');
      const progressHandle = document.getElementById('progress-handle');
      
      const iconPlay = document.getElementById('icon-play');
      const iconPause = document.getElementById('icon-pause');
      const iconVolOn = document.getElementById('icon-vol-on');
      const iconVolOff = document.getElementById('icon-vol-off');
      
      // Overlay logic
      let overlayTimeout;
      function showOverlay() {
        overlay.classList.remove('hidden');
        clearTimeout(overlayTimeout);
        if (isPlaying) {
          overlayTimeout = setTimeout(() => overlay.classList.add('hidden'), 3000);
        }
      }
      overlay.addEventListener('mousemove', showOverlay);
      clickTrap.addEventListener('mousemove', showOverlay);
      clickTrap.addEventListener('click', () => { showOverlay(); togglePlay(); });
      
      function updateProgress(currentTime) {
        if (duration === 0) return;
        timeCurrent.textContent = formatTime(currentTime);
        const percent = (currentTime / duration) * 100;
        progressFilled.style.width = `${percent}%`;
        progressHandle.style.left = `${percent}%`;
        
        if (isYT && ytPlayer) {
          progressBuffer.style.width = `${ytPlayer.getVideoLoadedFraction() * 100}%`;
        } else if (video && video.buffered.length > 0) {
          const bufferedEnd = video.buffered.end(video.buffered.length - 1);
          progressBuffer.style.width = `${(bufferedEnd / duration) * 100}%`;
        }
      }

      // Scrubber
      let isDragging = false;
      progressBar.addEventListener('mousedown', (e) => {
        isDragging = true;
        scrub(e);
      });
      window.addEventListener('mousemove', (e) => {
        if (isDragging) scrub(e);
      });
      window.addEventListener('mouseup', () => {
        if (isDragging) isDragging = false;
      });
      
      progressBar.addEventListener('touchstart', (e) => { isDragging = true; scrub(e.touches[0]); });
      window.addEventListener('touchmove', (e) => { if (isDragging) scrub(e.touches[0]); });
      window.addEventListener('touchend', () => { if (isDragging) isDragging = false; });

      function scrub(e) {
        if (duration === 0) return;
        const rect = progressBar.getBoundingClientRect();
        let pos = (e.clientX - rect.left) / rect.width;
        pos = Math.max(0, Math.min(1, pos));
        const newTime = pos * duration;
        
        if (isYT && ytPlayer) ytPlayer.seekTo(newTime, true);
        else video.currentTime = newTime;
        
        updateProgress(newTime);
      }

      function formatTime(sec) {
        if (isNaN(sec) || sec === 0) return '0:00';
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = Math.floor(sec % 60);
        if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        return `${m}:${s.toString().padStart(2,'0')}`;
      }

      function togglePlay() {
        if (isYT && ytPlayer) {
          if (isPlaying) ytPlayer.pauseVideo();
          else ytPlayer.playVideo();
        } else {
          if (video.paused) video.play();
          else video.pause();
        }
      }

      function seekBy(sec) {
        if (isYT && ytPlayer) {
          ytPlayer.seekTo(Math.max(0, Math.min(ytPlayer.getCurrentTime() + sec, duration)), true);
        } else {
          video.currentTime = Math.max(0, Math.min(video.currentTime + sec, duration));
        }
      }

      function toggleMute() {
        isMuted = !isMuted;
        if (isYT && ytPlayer) {
          if (isMuted) ytPlayer.mute(); else ytPlayer.unMute();
        } else {
          video.muted = isMuted;
        }
        iconVolOn.style.display = isMuted ? 'none' : 'block';
        iconVolOff.style.display = isMuted ? 'block' : 'none';

      video.addEventListener('timeupdate', () => { if (!isDragging) updateProgress(video.currentTime); });
      video.addEventListener('loadedmetadata', () => { duration = video.duration; timeDuration.textContent = formatTime(duration); });
      video.addEventListener('waiting', () => bufferingSpinner.style.display = 'block');
      video.addEventListener('playing', () => bufferingSpinner.style.display = 'none');

      // YouTube API
      function initYouTube(url) {
        isYT = true;
        document.getElementById('menu-quality').style.display = 'none';
        
        let ytId = '';
        try {
          const urlObj = new URL(url);
          if (urlObj.hostname.includes('youtu.be')) ytId = urlObj.pathname.slice(1).split('?')[0];
          else ytId = urlObj.searchParams.get('v');
        } catch (e) {}

        if (!ytId) return showError('Invalid YouTube URL');

        ytContainer.innerHTML = '<div id="yt-player-inner"></div>';
        
        function onYouTubeIframeAPIReady() {
          ytPlayer = new YT.Player('yt-player-inner', {
            videoId: ytId,
            width: '100%', height: '100%',
            playerVars: { autoplay: 1, controls: 0, disablekb: 1, fs: 0, iv_load_policy: 3, modestbranding: 1, rel: 0, showinfo: 0, playsinline: 1 },
            events: {
              onReady: (e) => {
                duration = e.target.getDuration();
                timeDuration.textContent = formatTime(duration);
                loader.style.display = 'none';
                showOverlay();
                
                setInterval(() => {
                  if (isPlaying && !isDragging) updateProgress(ytPlayer.getCurrentTime());
                }, 250);
              },
              onStateChange: (e) => {
                if (e.data === 1) {
                  isPlaying = true; iconPlay.style.display = 'none'; iconPause.style.display = 'block'; bufferingSpinner.style.display = 'none'; showOverlay();
                } else if (e.data === 2 || e.data === 0) {
                  isPlaying = false; iconPlay.style.display = 'block'; iconPause.style.display = 'none'; showOverlay();
                } else if (e.data === 3) {
                  bufferingSpinner.style.display = 'block';
                }
              }
            }
          });
          
          setTimeout(() => {
            const iframe = document.querySelector('iframe');
            if (iframe) {
              iframe.style.position = 'absolute';
              iframe.style.top = '0'; iframe.style.left = '0';
              iframe.style.width = '100%'; iframe.style.height = '100%';
              iframe.style.pointerEvents = 'none';
            }
          }, 500);
        }

        if (window.YT && window.YT.Player) {
          onYouTubeIframeAPIReady();
        } else {
          const tag = document.createElement('script');
          tag.src = "https://www.youtube.com/iframe_api";
          document.head.appendChild(tag);
          window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
        }
      }

      // Shaka / DRM init
      async function initShaka(url) {
        manifestUrl = url;

        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
          return showError('Browser not supported for DRM playback.');
        }

        shakaPlayer = new shaka.Player(video);

        shakaPlayer.addEventListener('error', (e) => {
          console.error('Shaka Error', e);
          showError('Playback error: ' + (e.detail?.message || e.detail?.code));
        });

        shakaPlayer.addEventListener('trackschanged', () => {
          const tracks = shakaPlayer.getVariantTracks().filter(t => t.height).sort((a,b) => b.height - a.height);
          const unique = tracks.reduce((acc, t) => acc.find(x => x.height === t.height) ? acc : [...acc, t], []);
          
          const qt = document.getElementById('quality-tracks');
          qt.innerHTML = '';
          unique.forEach(t => {
            qt.innerHTML += `<div class="settings-item" onclick="setQuality('${t.id}', '${t.height}p')">${t.height}p</div>`;
          });
        });

        try {
          if (url.includes('.mpd')) {
            loaderText.textContent = 'Fetching DRM keys...';
            const kidRes = await fetch(`${WORKER}/api/pw/kid?mpdUrl=${encodeURIComponent(url.replace(/\.m3u8/i, '.mpd'))}`);
            const kidData = await kidRes.json();
            if (kidData.success && kidData.kid) {
              const keyRes = await fetch(`${WORKER}/api/pw/otp?kid=${kidData.kid}`);
              const keyData = await keyRes.json();
              if (keyData.success && keyData.key) {
                shakaPlayer.configure({
                  drm: { clearKeys: { [kidData.kid]: keyData.key } }
                });
              } else throw new Error('DRM key denied.');
            } else throw new Error('Could not extract DRM KID.');
          }

          const urlObj = new URL(url);
          if (urlObj.search) {
            shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
              if ((type === 0 || type === 1) && !request.uris[0].includes('?')) {
                request.uris[0] += urlObj.search;
              }
            });
          }

          await shakaPlayer.load(url);
          loader.style.display = 'none';
          showOverlay();

          try {
            video.muted = true;
            await video.play();
            setTimeout(() => { video.muted = false; }, 300);
          } catch(autoErr) {
            console.log('Autoplay blocked');
            video.muted = false;
          }

        } catch (err) {
          showError(err.message || 'Failed to load video.');
        }

        if (id === 'auto') {

        } else {
          const track = shakaPlayer.getVariantTracks().find(t => t.id == id);
          if (track) {
            shakaPlayer.configure({ abr: { enabled: false } });
            shakaPlayer.selectVariantTrack(track, true);
          }
          document.getElementById('val-quality').textContent = label + ' ›';
        }
        document.querySelectorAll('#settings-quality .settings-item').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('settings-menu').classList.remove('open');
      }

          await document.exitFullscreen();

      async function fetchVideo() {
        if (liveUrl) {
          loaderBar.style.width = '100%';
          let isYoutube = /youtube\.com|youtu\.be/.test(liveUrl);
          if (isYoutube) { initYouTube(liveUrl); } else { initShaka(liveUrl); }
          return;
        }
        if (!videoId || !batchId || !subjectId) return showError('Missing parameters');
        
        try {
          loaderBar.style.width = '10%';
          loaderText.textContent = 'Fetching video...';
          
          let finalUrl = null;
          let isYoutube = false;
          
          const res1 = await fetch(`${WORKER}/api/pw/video-url-details?batchId=${batchId}&childId=${videoId}&subjectId=${subjectId}`);
          const data1 = await res1.json();
          
          if (data1.success && data1.data && data1.data[0] && data1.data[0].url) {
            finalUrl = data1.data[0].url;
            if (data1.data[0].type === 'youtube') isYoutube = true;
          }
          
          loaderBar.style.width = '40%';
          
          if (!finalUrl) {
            const res2 = await fetch(`${WORKER}/api/pw/video?batchId=${batchId}&subjectId=${subjectSlug}&childId=${videoId}`);
            const data2 = await res2.json();
            if (data2.success && data2.data && data2.data.url) {
              finalUrl = data2.data.signedUrl ? data2.data.url + data2.data.signedUrl : data2.data.url;
              if (/youtube\.com|youtu\.be/.test(data2.data.url)) isYoutube = true;
            }
          }
          
          loaderBar.style.width = '80%';
          
          if (!finalUrl) {
            throw new Error('Video not available or locked.');
          }

          if (isYoutube) {
            initYouTube(finalUrl);
          } else {
            initShaka(finalUrl);
          }
          
        } catch (err) {
          showError(err.message);
        }
      }

                      <img src="${img}">

                        <div class="panel-item-meta">${(item.videoDetails && item.videoDetails.duration) || item.duration || ''}</div>
                      </div>
                    </div>
                  `;
                }).join('');
                document.getElementById('panel-lectures').innerHTML = html;
              } else {
                document.getElementById('panel-lectures').innerHTML = '<div style="padding: 20px; text-align: center; color: rgba(255,255,255,0.3)">No other lectures</div>';

            }).catch(()=>{});
        }
        
        if (scheduleId) {

            .then(r => r.json()).then(data => {
              if (data.success && data.data && data.data.slides && data.data.slides.length > 0) {
                document.getElementById('tab-slides').style.display = 'block';
                const html = '<div class="slides-grid">' + data.data.slides.map(s => {
                  if (!s.img || !s.img.baseUrl || !s.img.key) return '';
                  const imgUrl = s.img.baseUrl + s.img.key;
                  
                  let sec = 0;
                  if (s.timeStamp && s.timeStamp !== '0') {
                    const parts = s.timeStamp.split(':');
                    if (parts.length === 2) sec = parseInt(parts[0])*60 + parseInt(parts[1]);
                    else if (parts.length === 3) sec = parseInt(parts[0])*3600 + parseInt(parts[1])*60 + parseInt(parts[2]);
                  }
                  
                  const timeHtml = sec > 0 ? `<div class="slide-time">${formatTime(sec)}</div>` : '';
                  return `
                    <div class="slide-item" onclick="seekToSlide(${sec})">
                      <img src="${imgUrl}" loading="lazy">
                      ${timeHtml}
                    </div>
                  `;
                }).join('') + '</div>';
                document.getElementById('panel-slides').innerHTML = html;
              }
            }).catch(()=>{});
            
          fetch(`${WORKER}/api/pw/attachments-url?BatchId=${batchId}&SubjectId=${subjectId}&ContentId=${scheduleId}`)
            .then(r => r.json()).then(data => {
              if (data.success && data.data && data.data.length > 0) {
                document.getElementById('tab-notes').style.display = 'block';
                const html = data.data.map(n => {
                  const dlUrl = `${WORKER}/api/pw/view?url=${encodeURIComponent(n.url)}&filename=${encodeURIComponent(n.name)}`;
                  return `
                    <div class="note-item">
                      <div class="note-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg></div>
                      <div style="flex: 1; font-size: 0.875rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${n.name.replace(/</g, '&lt;')}</div>
                      <a href="${dlUrl}" target="_blank" style="padding: 8px; background: rgba(212,84,14,0.2); border-radius: 8px; color: #D4540E; text-decoration: none;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></a>
                    </div>
                  `;
                }).join('');
                document.getElementById('panel-notes').innerHTML = html;
              }
            }).catch(()=>{});
        }
      }
      
      window.seekToSlide = function(sec) {
        if (sec <= 0) return;
        if (isYT && ytPlayer) ytPlayer.seekTo(sec, true);
        else video.currentTime = sec;
      };

      // Expose functions globally
      window.togglePlay = togglePlay;
      window.toggleMute = toggleMute;
      window.seekBy = seekBy;
      window.toggleSettings = toggleSettings;
      window.toggleFullscreen = toggleFullscreen;
      window.toggleSidePanel = toggleSidePanel;
      window.openSubmenu = openSubmenu;
      window.closeSubmenu = closeSubmenu;
      window.setSpeed = setSpeed;
      window.setQuality = setQuality;

      fetchVideo();
      fetchPanelData();
    })();
  </script>
</body>
</html>
