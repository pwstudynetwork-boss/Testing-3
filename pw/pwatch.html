  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    
    :root {
      --bg: #F5F2EB;
      --bg2: #ECEAE2;
      --ink: #1A1814;
      --ink2: #6B6760;
      --ink3: #B0ADA7;
      --accent: #D4540E;
      --accentl: #F0A87A;
      --accentb: rgba(212,84,14,.08);
      --green: #2D6A3F;
      --greenl: #E4F0E8;
      --red: #DC2626;
      --redl: #FEE2E2;
      --blue: #1A4B8C;
      --bluel: #E4EBF7;
      --card: #FFFDFB;
      --border: rgba(26,24,20,.1);
      --borderh: rgba(26,24,20,.2);
      --shadow: 0 2px 0 var(--border), 0 8px 30px rgba(26,24,20,.06);
      --shadow-hover: 0 20px 40px rgba(26,24,20,.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* Floating bg words */
    .floating-words {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: .04;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 5vw, 5rem);
      color: var(--ink);
      white-space: nowrap;
      user-select: none;
    }
    .float-word {
      position: absolute;
      animation: floatAround 26s infinite alternate ease-in-out;
      letter-spacing: -2px;
    }
    .float-word:nth-child(1) { top: 8%; left: 3%; animation-duration: 22s; }
    .float-word:nth-child(2) { top: 22%; right: 5%; animation-duration: 30s; animation-delay: -5s; }
    .float-word:nth-child(3) { bottom: 18%; left: 8%; animation-duration: 24s; animation-delay: -8s; }
    .float-word:nth-child(4) { bottom: 32%; right: 4%; animation-duration: 28s; animation-delay: -13s; }
    @keyframes floatAround {
      0% { transform: translate(0,0) rotate(0deg); }
      25% { transform: translate(35px,-25px) rotate(1.5deg); }
      50% { transform: translate(-25px,30px) rotate(-1.5deg); }
      75% { transform: translate(20px,15px) rotate(.8deg); }
      100% { transform: translate(-15px,-20px) rotate(-.8deg); }
    }

    /* Header */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(245,242,235,.96);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      padding: 0 clamp(16px, 4vw, 40px);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .brand-logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: 1.5px;
    }
    .brand-name span { color: var(--accent); }
    .header-back, .header-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 40px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .2s;
      color: var(--ink2);
      flex-shrink: 0;
    }
    .header-back:hover, .header-btn:hover {
      background: var(--accentb);
      border-color: var(--accent);
      color: var(--accent);
    }
    .header-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      background: var(--accentb);
      padding: 6px 14px;
      border-radius: 100px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    /* Loading bar */
    .loading-bar {
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(212,84,14,.2);
      z-index: 1001;
    }
    .loading-bar-inner {
      height: 100%;
      width: 0%;
      background: var(--accent);
      animation: loadingProgress 1.5s ease-in-out infinite;
    }
    @keyframes loadingProgress {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }
    .hidden { display: none !important; }

    /* Main container */
    .main-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 88px clamp(16px, 4vw, 40px) 60px;
      position: relative;
      z-index: 1;
    }

    /* Section headers */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .section-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .section-dot-red { background: var(--accent); }
    .section-dot-white { background: var(--ink); }
    .section-dot-gray { background: var(--ink3); }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.3px;
    }
    .mb-6 { margin-bottom: 32px; }
    .mt-4 { margin-top: 16px; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .flex-col { flex-direction: column; }
    .w-full { width: 100%; }

    /* Live scroll container */
    .live-scroll {
      display: flex;
      overflow-x: auto;
      gap: 20px;
      padding-bottom: 8px;
      scrollbar-width: thin;
    }
    .custom-scrollbar::-webkit-scrollbar {
      height: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: var(--bg2);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--accentl);
      border-radius: 10px;
    }

    /* Live card */
    .live-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      min-width: 280px;
      max-width: 300px;
      flex-shrink: 0;
      transition: all .3s;
    }
    .live-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
    .live-card-image {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
    }
    .live-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .live-card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
    }
    .live-card-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      z-index: 1;
    }
    .badge-live {
      background: var(--red);
      color: white;
      animation: pulse 1.5s infinite;
    }
    .badge-upcoming {
      background: var(--blue);
      color: white;
    }
    .badge-ended {
      background: var(--ink3);
      color: var(--ink);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .live-card-body {
      padding: 16px;
    }
    .live-card-subject {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .live-card-topic {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .live-card-time {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--ink2);
      margin-bottom: 12px;
    }

    /* List item (subjects) */
    .list-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all .25s;
    }
    .list-item:hover {
      transform: translateX(4px);
      border-color: var(--accentl);
      box-shadow: var(--shadow);
    }
    .list-item-icon {
      width: 40px;
      height: 40px;
      background: var(--accentb);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .list-item-icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }
    .list-item-content {
      flex: 1;
    }
    .list-item-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
    }
    .list-item-arrow {
      color: var(--ink2);
      transition: all .2s;
    }
    .list-item:hover .list-item-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    /* Buttons */
    .btn {
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
      text-decoration: none;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-primary {
      background: var(--ink);
      color: var(--bg);
    }
    .btn-primary:hover {
      background: var(--accent);
      transform: translateY(-1px);
    }
    .btn-outline {
      background: transparent;
      color: var(--ink2);
      border: 1px solid var(--border);
    }
    .btn-outline:hover {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    /* About section */
    .about-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
    }
    .description {
      font-size: 13px;
      color: var(--ink2);
      line-height: 1.8;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 16px;
    }
    .empty-state-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink3);
    }

    /* Skeleton */
    .skeleton-list-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
    }
    .skeleton {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .skeleton-image {
      aspect-ratio: 16/9;
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-card-body {
      padding: 16px;
    }
    .skeleton-line {
      height: 14px;
      background: var(--bg2);
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .skeleton-line-lg {
      width: 80%;
      height: 18px;
    }
    .skeleton-line-sm {
      width: 50%;
    }
    .skeleton-btn {
      height: 36px;
      background: var(--bg2);
      border-radius: 10px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--ink);
      color: var(--bg);
      padding: 12px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      animation: slideUp .3s ease;
      pointer-events: auto;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Security watermark */
    .security-watermark {
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-size: 9px;
      color: rgba(107,103,96,.15);
      font-family: monospace;
      z-index: 9999;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 700px) {
      .main-container { padding-top: 80px; }
      .header-title { font-size: 13px; white-space: normal; }
      .brand-name { display: none; }
      .live-card { min-width: 260px; }
    }
  </style>
</head>

  }

  window.shareBatch = function() {
    const text = `${decodeURIComponent(batchName)}\n${window.location.href}`;
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
  };

  function parseTime(timeStr) {
    if (!timeStr) return '';
    try {
      const date = new Date(timeStr);
      return date.toLocaleTimeString('en-IN', { 
        hour: '2-digit', 
        minute: '2-digit',
        hour12: true,
        timeZone: 'Asia/Kolkata'
      });
    } catch (e) { return timeStr; }
  }

  async function fetchLiveClasses() {
    try {
      const res = await fetch(`${WORKER}/api/pw/live`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ batchId })
      });
      const data = await res.json();
      const container = document.getElementById('live-classes-container');
      const noLive = document.getElementById('no-live-state');
      
      container.innerHTML = '';
      
      if (!data || !Array.isArray(data.data) || data.data.length === 0) {
        noLive.classList.remove('hidden');
        return;
      }

      noLive.classList.add('hidden');

      data.data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'live-card';
        
        let tagClass = 'badge-upcoming';
        let tagText = 'UPCOMING';
        
        const status = (item.status || '').toUpperCase();
        const tag = (item.tag || '').toLowerCase();
        
        if (status === 'LIVE' || tag === 'live' || item.isLive) { tagClass = 'badge-live'; tagText = 'LIVE'; }
        else if (status === 'COMPLETED' || tag === 'ended') { tagClass = 'badge-ended'; tagText = 'ENDED'; }
        else if (status === 'CANCELED' || status === 'CANCELLED' || tag === 'cancelled') { tagClass = 'badge-ended'; tagText = 'CANCELLED'; }
        
        let actionBtn = '';
        const isPdfOnly = !item.isVideoLecture && item.hasAttachment;
        const subject = item.subjectId && (item.subjectId.name || item.subjectId.subject) ? (item.subjectId.name || item.subjectId.subject) : 'Class';
        const subjectSlug = item.subjectId ? item.subjectId.slug : '';
        const subject_id = item.subjectId ? item.subjectId._id : '';
        
        if (isPdfOnly) {
          actionBtn = `<button class="btn btn-outline w-full" onclick="openPdf('${item._id}', '${subject_id}')"><i class="fas fa-file-pdf"></i> Open PDF</button>`;
        } else {
          const vidId = (item.videoDetails && item.videoDetails.findKey) ? item.videoDetails.findKey : item._id;
          // UPDATED: pwplayer.html URL
          let targetUrl = `pwplayer.html?video_id=${vidId}&subject_slug=${subjectSlug}&batch_id=${batchId}&schedule_id=${item._id}&subject_id=${subject_id}`;
          if (item.url) { targetUrl += `&live_url=${encodeURIComponent(item.url)}`; }
          actionBtn = `<button class="btn btn-primary w-full" onclick="window.location.href='${targetUrl}'"><i class="fas fa-play"></i> Play Lecture</button>`;
        }
        
        let imgUrl = '';
        if (item.teachers && Array.isArray(item.teachers) && item.teachers.length > 0) {
          let tObj = item.teachers[0];
          let facId = typeof tObj === 'object' ? tObj._id : tObj;
          if (facId && teacherMap[facId] && teacherMap[facId].image && teacherMap[facId].image.baseUrl && teacherMap[facId].image.key) {
            imgUrl = teacherMap[facId].image.baseUrl + teacherMap[facId].image.key;
          } else if (typeof tObj === 'object' && tObj.image && tObj.image.baseUrl) {
            imgUrl = tObj.image.baseUrl + tObj.image.key;
          } else if (typeof tObj === 'object' && tObj.profileUrl) { imgUrl = tObj.profileUrl; }
        }
        if (!imgUrl && item.facultyId && typeof item.facultyId === 'object' && item.facultyId.image) {
          imgUrl = item.facultyId.image.baseUrl + item.facultyId.image.key;
        }
        if (!imgUrl && item.videoDetails && item.videoDetails.image) { imgUrl = item.videoDetails.image; }
        if (!imgUrl) { imgUrl = 'https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg'; }

        const timeDisplay = parseTime(item.startTime);

        card.innerHTML = `
          <div class="live-card-image">
            <div class="live-card-tag ${tagClass}">${tagText}</div>
            <img src="${imgUrl}" alt="${subject}" loading="lazy">
            <div class="live-card-gradient"></div>
          </div>
          <div class="live-card-body">
            <div class="live-card-subject">${subject}</div>
            <div class="live-card-topic">${item.topic || 'Untitled Session'}</div>
            <div class="live-card-time">
              <i class="far fa-clock"></i>
              ${timeDisplay}
            </div>
            <div class="mt-4 flex gap-2">${actionBtn}</div>
          </div>
        `;
        container.appendChild(card);
      });
    } catch (err) { console.error(err); }
  }

  async function fetchBatchDetails() {
    document.getElementById('loading-bar').classList.remove('hidden');
    try {
      const res = await fetch(`https://api.penpencil.co/v3/batches/${batchId}/details`);
      const json = await res.json();
      if (!json.data) throw new Error('No data');
      const data = json.data;
      
      if (data.teacherIds) { data.teacherIds.forEach(t => { teacherMap[t._id] = t; }); }
      allSubjects = data.subjects || [];
      
      if (data.description) {
        document.getElementById('about-section').classList.remove('hidden');
        document.getElementById('batch-description').innerHTML = data.description;
      }
      
      const subjectsContainer = document.getElementById('subjects-container');
      const noSubjects = document.getElementById('no-subjects-state');
      subjectsContainer.innerHTML = '';
      
      if (!data.subjects || data.subjects.length === 0) { noSubjects.classList.remove('hidden'); return; }
      
      data.subjects.forEach((sub, idx) => {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.style.animation = `slideUp 0.3s ease forwards ${idx * 0.05}s`;
        item.style.opacity = '0';
        item.style.transform = 'translateY(20px)';
        
        // UPDATED: pwsub.html URL
        item.onclick = () => {
          window.location.href = `pwsub.html?batchId=${batchId}&subjectSlug=${sub.slug}&subjectName=${encodeURIComponent(sub.subject)}&subjectId=${sub.subjectId}`;
        };
        
        let iconHtml = `<i class="fas fa-book-open"></i>`;
        if (sub.icon && sub.icon.baseUrl && sub.icon.key) { iconHtml = `<img src="${sub.icon.baseUrl}${sub.icon.key}" alt="">`; }
        
        item.innerHTML = `
          <div class="list-item-icon">${iconHtml}</div>
          <div class="list-item-content"><div class="list-item-title">${sub.subject}</div></div>
          <div class="list-item-arrow"><i class="fas fa-chevron-right"></i></div>
        `;
        subjectsContainer.appendChild(item);
        
        setTimeout(() => {
          item.style.opacity = '1';
          item.style.transform = 'translateY(0)';
        }, 50);
      });

    } catch (err) {
      console.error(err);
      document.getElementById('subjects-container').innerHTML = '<div class="empty-state"><p style="color:var(--accent)">Failed to load batch details.</p></div>';
    } finally {
      document.getElementById('loading-bar').classList.add('hidden');
    }
  }

  window.openPdf = async function(scheduleId, subjectId) {
    try {
      const res = await fetch(`${WORKER}/api/pw/attachments-url?BatchId=${batchId}&SubjectId=${subjectId}&ContentId=${scheduleId}`);
      const data = await res.json();
      if (data.success && data.data && data.data.length > 0) {
        const att = data.data[0];
        const viewUrl = `${WORKER}/api/pw/view?url=${encodeURIComponent(att.url)}&filename=${encodeURIComponent(att.name)}`;
        window.open(viewUrl, '_blank');
      } else { showToast('PDF not available', 'error'); }
    } catch (err) { showToast('Failed to fetch PDF', 'error'); }
  };

  window.openAnnouncements = function() {
    if (!allSubjects) { showToast('Still loading...', 'info'); return; }
    window.location.href = `announcements.html?batchId=${batchId}&batchName=${encodeURIComponent(batchName)}`;
  };

  if (!batchId) { window.location.href = 'index.html'; }
  else { 
    fetchBatchDetails();
    setTimeout(fetchLiveClasses, 500);
  }
})();
</script>

<style>
  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .live-card, .list-item {
    transition: all .25s cubic-bezier(.2,0,0,1);
  }
</style>
</body>
</html>
