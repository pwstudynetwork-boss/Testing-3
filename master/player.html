
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master Sahab - Video Player</title>
  <script>
    (function() {
      const THRESHOLD = 160;
      function isOpen() { return window.outerWidth - window.innerWidth > THRESHOLD || window.outerHeight - window.innerHeight > THRESHOLD; }
      function hide() { document.documentElement.style.display = "none"; }
      function show() { document.documentElement.style.display = ""; }
      window.addEventListener("resize", function() { isOpen() ? hide() : show(); });
      if (isOpen()) hide();
      setInterval(function() { const s = performance.now(); (function(){debugger;})(); if (performance.now() - s > 100) hide(); }, 1000);
      document.addEventListener("contextmenu", function(e) { e.preventDefault(); });
      document.addEventListener("keydown", function(e) {
        if (e.key==="F12"||(e.ctrlKey&&e.shiftKey&&["I","J","C"].includes(e.key))||(e.ctrlKey&&e.key==="U")) { e.preventDefault(); hide(); }
      });
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Overlay wrapper ── */
    #player-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Video ── */
    #main-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }

    /* ── Top bar ── */
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
      transition: opacity 0.3s;
      z-index: 10;
    }

    #top-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #back-btn {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: background 0.2s;
    }
    #back-btn:hover { background: rgba(255,255,255,0.25); }

    #logo {
      height: 32px;
      width: auto;
      object-fit: contain;
    }

    #video-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      max-width: 500px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.9;
    }

    #download-btn {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 7px 14px;
      display: flex; align-items: center; gap: 7px;
      cursor: pointer;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s;
    }
    #download-btn:hover { background: rgba(255,255,255,0.15); }

    /* ── Controls bar ── */
    #controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
      padding: 20px 16px 14px;
      transition: opacity 0.3s;
      z-index: 10;
    }

    /* Progress row */
    #progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    #time-display {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
      min-width: 90px;
      text-align: right;
    }

    /* Progress bar */
    #progress-container {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      transition: height 0.15s;
    }
    #progress-container:hover { height: 6px; }

    #progress-fill {
      height: 100%;
      background: #e53935;
      border-radius: 2px;
      width: 0%;
      pointer-events: none;
      position: relative;
    }

    #progress-fill::after {
      content: '';
      position: absolute;
      right: -5px; top: 50%;
      transform: translateY(-50%);
      width: 12px; height: 12px;
      background: #e53935;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #progress-container:hover #progress-fill::after { opacity: 1; }

    /* Buffered bar */
    #progress-buffered {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      width: 0%;
      pointer-events: none;
    }

    /* Buttons row */
    #buttons-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #left-controls, #right-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.12); }
    .ctrl-btn svg { width: 20px; height: 20px; }

    /* Volume slider */
    #volume-slider-wrap {
      display: flex;
      align-items: center;
      overflow: hidden;
      width: 0;
      transition: width 0.25s ease;
    }
    #volume-slider-wrap.open { width: 80px; }

    #volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 72px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }
    #volume-slider::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
    }

    /* ── Settings panel ── */
    #settings-panel {
      position: absolute;
      bottom: 70px;
      right: 16px;
      background: #1c1c1c;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      width: 240px;
      padding: 12px 0;
      z-index: 20;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    #settings-panel.open { display: block; }

    .settings-section {
      padding: 8px 16px;
    }
    .settings-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }
    .settings-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 6px 0;
    }

    /* Resolution options */
    .res-options {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .res-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .res-btn:hover, .res-btn.active { background: #e53935; border-color: #e53935; }

    /* PiP toggle */
    #pip-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 4px 0;
    }
    #pip-toggle span { font-size: 13px; color: #fff; }
    .toggle-track {
      width: 36px; height: 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-track.on { background: #e53935; }
    .toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
    }
    .toggle-track.on .toggle-thumb { left: 18px; }

    /* Speed options */
    .speed-options {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .speed-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .speed-btn:hover, .speed-btn.active { background: #e53935; border-color: #e53935; }

    /* ── Hidden state ── */
    .ui-hidden #top-bar,
    .ui-hidden #controls {
      opacity: 0;
      pointer-events: none;
    }
    .ui-hidden { cursor: none; }

    /* ── Center play indicator ── */
    #center-indicator {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.55);
      border-radius: 50%;
      width: 64px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 15;
    }
    #center-indicator.show { opacity: 1; }

    /* ── Loading spinner ── */
    #spinner {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #e53935;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
      z-index: 12;
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* ── Error message ── */
    #error-msg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
      z-index: 12;
    }
    #error-msg p { font-size: 15px; color: rgba(255,255,255,0.7); margin-top: 8px; }

    /* ── Seek flash ── */
    .seek-flash {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.45);
      border-radius: 50%;
      width: 72px; height: 72px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 15;
      font-size: 11px;
      color: #fff;
      gap: 2px;
    }
    .seek-flash.show { opacity: 1; }
    #seek-back { left: 15%; }
    #seek-fwd  { right: 15%; }
  </style>
</head>
<body>
<div id="player-wrapper">

  <!-- Video -->
  <video id="main-video" preload="metadata" playsinline></video>

  <!-- Spinner -->
  <div id="spinner"></div>

  <!-- Error -->
  <div id="error-msg">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <p id="error-text">Unable to load video.</p>
  </div>

  <!-- Center play/pause indicator -->
  <div id="center-indicator">
    <svg id="ci-play" width="28" height="28" viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg>
    <svg id="ci-pause" width="28" height="28" viewBox="0 0 24 24" fill="#fff" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
  </div>

  <!-- Seek flash indicators -->
  <div class="seek-flash" id="seek-back">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
    <span>-10s</span>
  </div>
  <div class="seek-flash" id="seek-fwd">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.5"/></svg>
    <span>+10s</span>
  </div>

  <!-- Top bar -->
  <div id="top-bar">
    <div id="top-left">
      <button id="back-btn" title="Go back" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <img id="logo" src="https://d2alr3mt323vql.cloudfront.net/0/admin_v1/application_management/clientlogo/3390552566_Group%2018440%20%284%29.png" alt="Master Sahab" />
      <span id="video-title"></span>
    </div>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel">
    <div class="settings-section">
      <div class="settings-label">Resolution</div>
      <div class="res-options">
        <button class="res-btn active" onclick="setRes(this)">Auto</button>
        <button class="res-btn" onclick="setRes(this)">480p</button>
        <button class="res-btn" onclick="setRes(this)">720p</button>
        <button class="res-btn" onclick="setRes(this)">1080p</button>
      </div>
    </div>
    <div class="settings-divider"></div>
    <div class="settings-section">
      <div class="settings-label">Picture in Picture</div>
      <div id="pip-toggle" onclick="togglePiP()">
        <span>Picture-in-Picture</span>
        <div class="toggle-track" id="pip-track"><div class="toggle-thumb"></div></div>
      </div>
    </div>
    <div class="settings-divider"></div>
    <div class="settings-section">
      <div class="settings-label">Playback Speed</div>
      <div class="speed-options">
        <button class="speed-btn" onclick="setSpeed(0.5,this)">0.5x</button>
        <button class="speed-btn" onclick="setSpeed(0.75,this)">0.75x</button>
        <button class="speed-btn active" onclick="setSpeed(1,this)">1x</button>
        <button class="speed-btn" onclick="setSpeed(1.25,this)">1.25x</button>
        <button class="speed-btn" onclick="setSpeed(1.5,this)">1.5x</button>
        <button class="speed-btn" onclick="setSpeed(2,this)">2x</button>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <!-- Progress row -->
    <div id="progress-row">
      <div id="progress-container">
        <div id="progress-buffered"></div>
        <div id="progress-fill"></div>
      </div>
      <span id="time-display">0:00 / 0:00</span>
    </div>
    <!-- Buttons row -->
    <div id="buttons-row">
      <div id="left-controls">
        <!-- Play/Pause -->
        <button class="ctrl-btn" id="play-btn" title="Play/Pause (Space)" onclick="togglePlay()">
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <!-- Volume -->
        <button class="ctrl-btn" id="vol-btn" title="Mute (M)" onclick="toggleMute()">
          <svg id="icon-vol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          <svg id="icon-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        </button>
        <div id="volume-slider-wrap">
          <input type="range" id="volume-slider" min="0" max="1" step="0.02" value="1" />
        </div>
      </div>

      <div id="right-controls">
        <!-- Settings -->
        <button class="ctrl-btn" id="settings-btn" title="Settings" onclick="toggleSettings()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <!-- Fullscreen -->
        <button class="ctrl-btn" id="fs-btn" title="Fullscreen (F)" onclick="toggleFullscreen()">
          <svg id="icon-fs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          <svg id="icon-exit-fs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Parse query params ──────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const videoUrl = params.get('url') || '';
  const videoTitle = params.get('title') || 'Video';

  // ── Elements ────────────────────────────────────────────────────────────────
  const video        = document.getElementById('main-video');
  const wrapper      = document.getElementById('player-wrapper');
  const spinner      = document.getElementById('spinner');
  const errorMsg     = document.getElementById('error-msg');
  const errorText    = document.getElementById('error-text');
  const topBar       = document.getElementById('top-bar');
  const controls     = document.getElementById('controls');
  const playBtn      = document.getElementById('play-btn');
  const iconPlay     = document.getElementById('icon-play');
  const iconPause    = document.getElementById('icon-pause');
  const ciPlay       = document.getElementById('ci-play');
  const ciPause      = document.getElementById('ci-pause');
  const centerInd    = document.getElementById('center-indicator');
  const volBtn       = document.getElementById('vol-btn');
  const iconVol      = document.getElementById('icon-vol');
  const iconMute     = document.getElementById('icon-mute');
  const volSlider    = document.getElementById('volume-slider');
  const volWrap      = document.getElementById('volume-slider-wrap');
  const progressCont = document.getElementById('progress-container');
  const progressFill = document.getElementById('progress-fill');
  const progressBuf  = document.getElementById('progress-buffered');
  const timeDisplay  = document.getElementById('time-display');
  const settingsBtn  = document.getElementById('settings-btn');
  const settingsPanel= document.getElementById('settings-panel');
  const fsBtn        = document.getElementById('fs-btn');
  const iconFs       = document.getElementById('icon-fs');
  const iconExitFs   = document.getElementById('icon-exit-fs');
  const titleEl      = document.getElementById('video-title');
  const seekBack     = document.getElementById('seek-back');
  const seekFwd      = document.getElementById('seek-fwd');
  const pipTrack     = document.getElementById('pip-track');

  // ── Init ────────────────────────────────────────────────────────────────────
  titleEl.textContent = videoTitle;
  document.title = videoTitle + ' - Master Sahab';

  if (videoUrl) {
    video.src = videoUrl;
  } else {
    showError('No video URL provided. Add ?url=VIDEO_URL to the address.');
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function formatTime(s) {
    if (isNaN(s) || s < 0) return '0:00';
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = Math.floor(s % 60);
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function showError(msg) {
    spinner.style.display = 'none';
    errorText.textContent = msg;
    errorMsg.style.display = 'block';
  }

  // ── Play / Pause ─────────────────────────────────────────────────────────────
  function togglePlay() {
    if (video.paused) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  }

  function updatePlayIcon(playing) {
    iconPlay.style.display  = playing ? 'none' : '';
    iconPause.style.display = playing ? '' : 'none';
  }

  function flashCenter(playing) {
    ciPlay.style.display  = playing ? 'none' : '';
    ciPause.style.display = playing ? '' : 'none';
    centerInd.classList.add('show');
    clearTimeout(centerInd._t);
    centerInd._t = setTimeout(() => centerInd.classList.remove('show'), 600);
  }

  video.addEventListener('play',  () => updatePlayIcon(true));
  video.addEventListener('pause', () => updatePlayIcon(false));
  video.addEventListener('ended', () => updatePlayIcon(false));

  // Click on video = play/pause
  video.addEventListener('click', () => {
    togglePlay();
    flashCenter(video.paused); // after toggle: if now paused show play icon
  });

  // ── Volume ───────────────────────────────────────────────────────────────────
  function toggleMute() {
    video.muted = !video.muted;
    updateVolIcon();
  }

  function updateVolIcon() {
    const muted = video.muted || video.volume === 0;
    iconVol.style.display  = muted ? 'none' : '';
    iconMute.style.display = muted ? '' : 'none';
    volSlider.value = muted ? 0 : video.volume;
  }

  volBtn.addEventListener('mouseenter', () => volWrap.classList.add('open'));
  volBtn.addEventListener('mouseleave', () => {
    // keep open if hovering slider
  });
  volWrap.addEventListener('mouseleave', () => volWrap.classList.remove('open'));

  volSlider.addEventListener('input', () => {
    video.volume = parseFloat(volSlider.value);
    video.muted = video.volume === 0;
    updateVolIcon();
  });

  // ── Progress ─────────────────────────────────────────────────────────────────
  video.addEventListener('timeupdate', () => {
    if (!video.duration) return;
    const pct = (video.currentTime / video.duration) * 100;
    progressFill.style.width = pct + '%';
    timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
  });

  video.addEventListener('progress', () => {
    if (!video.duration || !video.buffered.length) return;
    const buffered = video.buffered.end(video.buffered.length - 1);
    progressBuf.style.width = (buffered / video.duration * 100) + '%';
  });

  // Seek on click
  let isSeeking = false;
  function seekTo(e) {
    const rect = progressCont.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (video.duration) video.currentTime = ratio * video.duration;
  }

  progressCont.addEventListener('mousedown', (e) => {
    isSeeking = true;
    seekTo(e);
  });
  document.addEventListener('mousemove', (e) => { if (isSeeking) seekTo(e); });
  document.addEventListener('mouseup',   () => { isSeeking = false; });

  // Touch seek
  progressCont.addEventListener('touchstart', (e) => {
    isSeeking = true;
    seekTo(e.touches[0]);
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (isSeeking) seekTo(e.touches[0]);
  }, { passive: true });
  document.addEventListener('touchend', () => { isSeeking = false; });

  // ── Spinner ──────────────────────────────────────────────────────────────────
  video.addEventListener('waiting', () => { spinner.style.display = 'block'; });
  video.addEventListener('playing', () => { spinner.style.display = 'none'; errorMsg.style.display = 'none'; });
  video.addEventListener('canplay', () => { spinner.style.display = 'none'; });
  video.addEventListener('error',   () => {
    spinner.style.display = 'none';
    showError('Failed to load video. Check the URL or your connection.');
  });
  video.addEventListener('loadstart', () => { if (videoUrl) spinner.style.display = 'block'; });

  // ── Settings ─────────────────────────────────────────────────────────────────
  function toggleSettings() {
    settingsPanel.classList.toggle('open');
  }

  // Close settings when clicking outside
  document.addEventListener('click', (e) => {
    if (!settingsPanel.contains(e.target) && e.target !== settingsBtn && !settingsBtn.contains(e.target)) {
      settingsPanel.classList.remove('open');
    }
  });

  function setRes(btn) {
    document.querySelectorAll('.res-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // UI only — HLS resolution switching would require hls.js
  }

  function setSpeed(speed, btn) {
    video.playbackRate = speed;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // ── Picture-in-Picture ───────────────────────────────────────────────────────
  let pipActive = false;
  async function togglePiP() {
    try {
      if (document.pictureInPictureElement) {
        await document.exitPictureInPicture();
        pipActive = false;
      } else if (document.pictureInPictureEnabled) {
        await video.requestPictureInPicture();
        pipActive = true;
      }
    } catch (err) {
      console.warn('PiP error:', err);
    }
    pipTrack.classList.toggle('on', pipActive);
  }

  video.addEventListener('leavepictureinpicture', () => {
    pipActive = false;
    pipTrack.classList.remove('on');
  });

  // ── Fullscreen ───────────────────────────────────────────────────────────────
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      wrapper.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }

  document.addEventListener('fullscreenchange', () => {
    const isFs = !!document.fullscreenElement;
    iconFs.style.display     = isFs ? 'none' : '';
    iconExitFs.style.display = isFs ? '' : 'none';
  });

  // ── Auto-hide controls ───────────────────────────────────────────────────────
  let hideTimer = null;

  function showUI() {
    wrapper.classList.remove('ui-hidden');
    resetHideTimer();
  }

  function resetHideTimer() {
    clearTimeout(hideTimer);
    if (!video.paused) {
      hideTimer = setTimeout(() => {
        if (!settingsPanel.classList.contains('open')) {
          wrapper.classList.add('ui-hidden');
        }
      }, 3000);
    }
  }

  wrapper.addEventListener('mousemove', showUI);
  wrapper.addEventListener('mousedown', showUI);
  wrapper.addEventListener('touchstart', showUI, { passive: true });

  video.addEventListener('pause', () => {
    clearTimeout(hideTimer);
    wrapper.classList.remove('ui-hidden');
  });
  video.addEventListener('play', resetHideTimer);

  // ── Keyboard shortcuts ───────────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    // Don't fire on inputs
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    showUI();

    switch (e.code) {
      case 'Space':
      case 'KeyK':
        e.preventDefault();
        togglePlay();
        flashCenter(video.paused);
        break;
      case 'ArrowLeft':
        e.preventDefault();
        video.currentTime = Math.max(0, video.currentTime - 10);
        flashSeek('back');
        break;
      case 'ArrowRight':
        e.preventDefault();
        video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
        flashSeek('fwd');
        break;
      case 'ArrowUp':
        e.preventDefault();
        video.volume = Math.min(1, video.volume + 0.1);
        video.muted = false;
        updateVolIcon();
        break;
      case 'ArrowDown':
        e.preventDefault();
        video.volume = Math.max(0, video.volume - 0.1);
        updateVolIcon();
        break;
      case 'KeyM':
        toggleMute();
        break;
      case 'KeyF':
        toggleFullscreen();
        break;
    }
  });

  function flashSeek(dir) {
    const el = dir === 'back' ? seekBack : seekFwd;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 700);
  }

  // ── Double-click seek ────────────────────────────────────────────────────────
  video.addEventListener('dblclick', (e) => {
    const half = wrapper.offsetWidth / 2;
    if (e.clientX < half) {
      video.currentTime = Math.max(0, video.currentTime - 10);
      flashSeek('back');
    } else {
      video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
      flashSeek('fwd');
    }
  });
</script>
</body>
</html>
