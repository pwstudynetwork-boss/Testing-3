
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Mtaiirus — Batch Details</title>
  <link rel="icon" type="image/x-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #F5F2EB;
      --bg2: #ECEAE2;
      --ink: #1A1814;
      --ink2: #6B6760;
      --ink3: #B0ADA7;
      --accent: #D4540E;
      --accentl: #F0A87A;
      --accentb: rgba(212,84,14,.08);
      --green: #2D6A3F;
      --greenl: #E4F0E8;
      --blue: #1A4B8C;
      --bluel: #E4EBF7;
      --card: rgba(255,253,251,0.9);
      --border: rgba(26,24,20,.08);
      --danger: #D4540E;
      --success: #2D6A3F;
      --warning: #f59e0b;
      --shadow: 0 18px 50px rgba(26,24,20,.12);
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: var(--font-body);
      background:
        radial-gradient(circle at top left, rgba(212,84,14,0.1), transparent 30%),
        radial-gradient(circle at top right, rgba(240,168,122,0.08), transparent 28%),
        var(--bg);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    button, input { font: inherit; }
    button { cursor: pointer; border: none; }

    .app-header {
      position: sticky; top: 0; z-index: 50;
      min-height: 72px; padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      background: rgba(245,242,235,.78);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .brand-row {
      display: flex; align-items: center; gap: 12px; min-width: 0;
    }

    .back-btn, .icon-btn {
      width: 42px; height: 42px; border-radius: 12px;
      background: var(--card); color: var(--ink);
      display: grid; place-items: center;
      box-shadow: 0 4px 16px rgba(26,24,20,.06);
      border: 1px solid var(--border); transition: 0.2s ease;
      flex: 0 0 auto;
    }

    .back-btn:hover, .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(26,24,20,.1);
    }

    .brand-text { min-width: 0; }
    .brand-text h1 {
      font-family: var(--font-heading); font-size: clamp(18px, 3vw, 25px);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 62vw; letter-spacing: -.3px; font-weight: 800;
    }
    .brand-text p { margin-top: 2px; color: var(--ink2); font-size: 13px; }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .container { width: min(1180px, 100%); margin: 0 auto; padding: 18px; }

    .hero {
      margin-top: 10px; border-radius: 24px; padding: 22px; color: var(--bg);
      background:
        linear-gradient(135deg, rgba(26,24,20,.96), rgba(45,37,32,.92)),
        url("https://i.ibb.co/9Hm0NqsH/f69ed82b-7169-45fc-a82b-915e453c6340.png") center/cover;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
    }

    .hero::after {
      content: ""; position: absolute;
      width: 220px; height: 220px; border-radius: 999px;
      background: rgba(212,84,14,.14);
      top: -95px; right: -85px;
    }

    .hero-content { position: relative; z-index: 1; }

    .hero small {
      display: inline-flex; padding: 7px 12px; border-radius: 999px;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15);
      font-weight: 700; margin-bottom: 10px; font-size: 12px;
    }

    .hero h2 {
      font-family: var(--font-heading); font-size: clamp(24px, 5vw, 42px);
      line-height: 1.05; max-width: 760px; letter-spacing: -1px;
    }

    .hero p { margin-top: 10px; color: rgba(245,242,235,.8); max-width: 650px; }

    .top-actions {
      margin-top: 18px; display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px;
    }

    .btn {
      min-height: 46px; padding: 11px 15px; border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 9px; font-weight: 600; transition: 0.2s ease;
      background: var(--card); color: var(--ink);
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(26,24,20,.06);
      text-decoration: none; font-family: var(--font-body);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(26,24,20,.1);
    }

    .btn-primary {
      color: var(--bg); background: var(--ink); border: none;
    }
    .btn-primary:hover { background: var(--accent); }

    .btn-danger {
      color: #fff; background: var(--accent); border: none;
    }
    .btn-danger:hover { background: #bf4a0c; }

    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .section { margin-top: 22px; }

    .section-head {
      display: flex; align-items: end; justify-content: space-between;
      gap: 16px; margin-bottom: 14px;
    }

    .section-title {
      font-family: var(--font-heading); font-size: 22px;
      font-weight: 800; letter-spacing: -.3px;
    }

    .section-subtitle { color: var(--ink2); font-size: 13px; margin-top: 3px; }

    .search-wrap {
      position: relative; width: min(370px, 100%); flex: 0 1 370px;
    }

    .search-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--ink3);
    }

    .search-input {
      width: 100%; min-height: 44px; padding: 11px 14px 11px 42px;
      border-radius: 14px; border: 1px solid var(--border);
      background: var(--card); outline: none;
      box-shadow: 0 4px 16px rgba(26,24,20,.04);
      font-family: var(--font-body);
    }

    .search-input:focus {
      border-color: rgba(212,84,14,.4);
      box-shadow: 0 0 0 4px rgba(212,84,14,.08);
    }
    .search-input::placeholder { color: var(--ink3); }

    .live-scroller {
      display: flex; gap: 16px; overflow-x: auto;
      padding: 2px 2px 12px; scroll-snap-type: x mandatory;
    }

    .live-scroller::-webkit-scrollbar { height: 8px; }
    .live-scroller::-webkit-scrollbar-thumb {
      background: rgba(212,84,14,.2); border-radius: 999px;
    }

    .live-card {
      min-width: 306px; width: 306px; background: var(--card);
      border: 1px solid var(--border); border-radius: 20px;
      box-shadow: var(--shadow); overflow: hidden; scroll-snap-align: start;
    }

    .thumb {
      position: relative; aspect-ratio: 16 / 9;
      background: var(--bg2); overflow: hidden;
    }

    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .badge {
      position: absolute; top: 11px; right: 11px; padding: 6px 10px;
      border-radius: 999px; color: white; font-size: 11px;
      font-weight: 700; text-transform: uppercase;
      box-shadow: 0 4px 16px rgba(0,0,0,.2); letter-spacing: .3px;
    }

    .badge.live { background: var(--accent); animation: pulse 1.2s infinite; }
    .badge.recorded { background: rgba(26,24,20,.8); }
    .badge.cancelled { background: var(--accent); }
    .badge.upcoming { background: var(--warning); color: var(--ink); }

    @keyframes pulse { 50% { transform: scale(1.06); } }

    .live-body { padding: 14px; }

    .subject-name {
      color: var(--accent); font-weight: 700; font-size: 13px;
      margin-bottom: 4px; font-family: var(--font-heading);
    }

    .live-title {
      font-family: var(--font-heading); font-size: 16px;
      line-height: 1.3; min-height: 42px; font-weight: 700;
    }

    .meta-row {
      margin-top: 12px; display: flex; justify-content: space-between;
      gap: 8px; color: var(--ink2); font-size: 12px;
    }

    .meta-row span {
      display: inline-flex; align-items: center; gap: 5px; min-width: 0;
    }

    .meta-row span:first-child {
      max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .play-btn { width: 100%; margin-top: 14px; }

    .subject-grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .subject-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 14px; display: flex;
      align-items: center; gap: 12px;
      box-shadow: 0 4px 20px rgba(26,24,20,.06);
      transition: 0.2s ease;
    }

    .subject-card:hover {
      transform: translateY(-2px); box-shadow: var(--shadow);
    }

    .subject-card img {
      width: 46px; height: 46px; object-fit: contain;
      border-radius: 12px; background: var(--bg);
      padding: 5px; flex: 0 0 auto;
    }

    .subject-card h3 {
      font-family: var(--font-heading); font-size: 16px; font-weight: 700;
    }

    .about-card, .empty-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 18px; box-shadow: var(--shadow);
    }

    .about-content { color: var(--ink2); line-height: 1.7; overflow-wrap: anywhere; }
    .about-content img { max-width: 100%; border-radius: 14px; margin: 10px 0; }

    .empty-card { text-align: center; color: var(--ink2); font-weight: 600; }

    .skeleton {
      background: linear-gradient(90deg, var(--bg2), var(--bg), var(--bg2));
      background-size: 200% 100%; animation: shine 1.2s infinite;
      border-radius: 14px;
    }

    @keyframes shine { to { background-position-x: -200%; } }

    .sk-live { min-width: 306px; width: 306px; height: 285px; border-radius: 20px; }
    .sk-subject { height: 76px; border-radius: 18px; }

    .toast {
      position: fixed; left: 50%; bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: var(--bg);
      padding: 12px 16px; border-radius: 14px;
      box-shadow: 0 8px 32px rgba(26,24,20,.25);
      opacity: 0; pointer-events: none; transition: 0.25s ease;
      z-index: 120; font-weight: 600;
      max-width: calc(100% - 28px); text-align: center;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .drawer-backdrop {
      position: fixed; inset: 0; background: rgba(26,24,20,.42);
      opacity: 0; pointer-events: none; z-index: 90; transition: 0.2s ease;
    }

    .drawer {
      position: fixed; top: 0; right: 0;
      width: min(340px, 88vw); height: 100vh;
      background: rgba(255,253,251,.96); backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      z-index: 100; transform: translateX(105%);
      transition: 0.25s ease;
      box-shadow: -20px 0 70px rgba(26,24,20,.24);
      padding: 18px; display: flex; flex-direction: column; gap: 14px;
    }

    .drawer.open { transform: translateX(0); }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }

    .drawer-head {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }

    .drawer h3 { font-family: var(--font-heading); font-size: 22px; }

    .menu-link {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px; border-radius: 14px;
      color: var(--ink); background: var(--bg);
      border: 1px solid var(--border); text-decoration: none;
      font-weight: 600; font-family: var(--font-body);
    }

    .menu-link:hover { background: var(--accentb); }

    @media (max-width: 900px) {
      .search-wrap { max-width: 360px; flex-basis: 360px; }
    }

    @media (max-width: 720px) {
      .container { padding: 14px; }
      .app-header { padding: 12px 14px; }
      .brand-text h1 { max-width: 48vw; }
      .top-actions { grid-template-columns: 1fr; }
      .section-head { align-items: stretch; flex-direction: column; }
      .search-wrap { width: 100%; max-width: min(100%, 340px); flex: unset; }
      .search-input { height: 42px; padding-left: 40px; font-size: 15px; }
      .live-card, .sk-live { min-width: 286px; width: 286px; }
    }

    @media (max-width: 420px) {
      .search-wrap { max-width: 100%; }
      .search-input { height: 40px; border-radius: 13px; font-size: 14px; }
      .search-wrap svg { left: 13px; width: 16px; height: 16px; }
    }

    @media (max-width: 340px) {
      .search-input { height: 38px; font-size: 13px; padding-left: 38px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand-row">
      <button class="back-btn" id="backBtn" title="Back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"></path>
        </svg>

      <div class="brand-text">
        <h1 id="pageTitle">Batch</h1>
        <p>Mtaiirus Batch Details</p>
      </div>
    </div>

    <div class="header-actions">
      <button class="icon-btn" id="refreshBtn" title="Refresh">

          <path d="M21 12a9 9 0 0 1-15.4 6.4"></path>
          <path d="M3 12A9 9 0 0 1 18.4 5.6"></path>
          <path d="M18 2v4h4"></path>
          <path d="M6 22v-4H2"></path>
        </svg>
      </button>
      <button class="icon-btn" id="menuBtn" title="Menu">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
          <path d="M4 6h16"></path>
          <path d="M4 12h16"></path>
          <path d="M4 18h16"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-content">
        <h2 id="heroTitle">Loading batch...</h2>

        <div class="top-actions">
          <button class="btn" id="shareBtn">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <path d="m8.59 13.51 6.83 3.98"></path>
              <path d="m15.41 6.51-6.82 3.98"></path>

            Share
          </button>

          <button class="btn" id="announcementBtn">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.268 21a2 2 0 0 0 3.464 0"></path>
              <path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"></path>
            </svg>
            Announcement
          </button>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2 class="section-title">Today's Classes</h2>
          <p class="section-subtitle">Live, upcoming and recorded class cards.</p>
        </div>

        <label class="search-wrap">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input id="liveSearch" class="search-input" type="search" placeholder="Search class, teacher, subject..." />
        </label>
      </div>

      <div id="liveArea" class="live-scroller">
        <div class="skeleton sk-live"></div>
        <div class="skeleton sk-live"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2 class="section-title">Subjects</h2>
          <p class="section-subtitle">Open subject content from this batch.</p>
        </div>

        <label class="search-wrap">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input id="subjectSearch" class="search-input" type="search" placeholder="Search subject..." />
        </label>
      </div>

      <div id="subjectArea" class="subject-grid">
        <div class="skeleton sk-subject"></div>
        <div class="skeleton sk-subject"></div>
        <div class="skeleton sk-subject"></div>
        <div class="skeleton sk-subject"></div>
      </div>
    </section>

    <section class="section" id="aboutSection">
      <div class="about-card">
        <h2 class="section-title" style="margin-bottom: 12px;">About Batch</h2>
        <div id="aboutContent" class="about-content">
          <div class="skeleton" style="height: 170px;"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <div>
        <h3>Menu</h3>
        <p class="section-subtitle">Quick actions</p>
      </div>
      <button class="icon-btn" id="closeMenuBtn" title="Close">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </div>

    <a class="menu-link" href="/" id="homeLink">
      <span>🏠</span> Home
    </a>
    <a class="menu-link" href="#" id="subjectsLink">
      <span>📚</span> Subjects
    </a>
    <a class="menu-link" href="#" id="liveLink">
      <span>📺</span> Today's Classes
    </a>
    <a class="menu-link" href="#" id="aboutLink">
      <span>ℹ️</span> About Batch
    </a>
  </aside>

  <div class="toast" id="toast"></div>
