
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Mtaiirus — PW Topics</title>
  <link rel="icon" type="image/x-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #F5F2EB;
      --bg2: #ECEAE2;
      --ink: #1A1814;
      --ink2: #6B6760;
      --ink3: #B0ADA7;
      --accent: #D4540E;
      --accentl: #F0A87A;
      --accentb: rgba(212,84,14,.08);
      --green: #2D6A3F;
      --greenl: #E4F0E8;
      --blue: #1A4B8C;
      --bluel: #E4EBF7;
      --card: #FFFDFB;
      --border: rgba(26,24,20,.1);
      --borderh: rgba(26,24,20,.2);
      --danger: #D4540E;
      --success: #2D6A3F;
      --shadow: 0 16px 40px rgba(26,24,20,.10);
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    button, input { font: inherit; }
    button { cursor: pointer; border: none; }
    .hidden { display: none !important; }

    .app-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(245,242,235,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      max-width: 980px; margin: auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; gap: 12px;
    }
    .left-nav { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-text { min-width: 0; }
    .brand-text h1 {
      font-family: var(--font-heading); font-size: 18px; font-weight: 800;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--ink); letter-spacing: -.3px;
    }
    .brand-text p {
      font-size: 12px; color: var(--ink2); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .logo {
      width: 38px; height: 38px; border-radius: 12px;
      background: var(--ink); color: var(--bg);
      display: grid; place-items: center;
      font-family: var(--font-heading); font-weight: 800; font-size: 16px;
      border: 1px solid var(--border);
    }

    .header-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn, .btn {
      border-radius: 10px; background: var(--card); color: var(--ink);
      border: 1px solid var(--border); min-height: 42px; padding: 0 14px;
      font-weight: 600; display: inline-flex; align-items: center;
      justify-content: center; gap: 8px;
      box-shadow: 0 4px 12px rgba(26,24,20,.04); transition: .2s;
      font-family: var(--font-body); text-decoration: none;
    }
    .icon-btn { width: 42px; padding: 0; }
    .btn:hover, .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow); border-color: var(--borderh);
    }
    .btn.primary {
      background: var(--ink); color: var(--bg); border-color: transparent;
    }
    .btn.primary:hover { background: var(--accent); }
    .btn.ghost { background: transparent; box-shadow: none; }
    .btn.danger { background: var(--accentb); color: var(--accent); border-color: rgba(212,84,14,.25); }
    .btn.danger:hover { background: var(--accent); color: #fff; }

    .search-wrap { max-width: 980px; margin: 0 auto; padding: 0 16px 14px; }
    .search-box { position: relative; }
    .search-box input {
      width: 100%; height: 48px; border: 1px solid var(--border);
      border-radius: 14px; background: var(--card); color: var(--ink);
      padding: 0 48px 0 44px; outline: none;
      box-shadow: 0 4px 12px rgba(26,24,20,.04);
      font-family: var(--font-body);
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(212,84,14,.1);
    }
    .search-box input::placeholder { color: var(--ink3); }
    .search-icon, .clear-search {
      position: absolute; top: 50%; transform: translateY(-50%); color: var(--ink3);
    }
    .search-icon { left: 16px; }
    .clear-search { right: 12px; background: transparent; border: none; font-size: 20px; }

    .side-menu { position: fixed; inset: 0; z-index: 80; pointer-events: none; }
    .side-menu.open { pointer-events: auto; }
    .menu-overlay {
      position: absolute; inset: 0; background: rgba(26,24,20,.55);
      opacity: 0; transition: .2s;
    }
    .side-menu.open .menu-overlay { opacity: 1; }
    .menu-panel {
      position: absolute; right: 0; top: 0; height: 100%;
      width: min(360px, 92vw); background: var(--card);
      border-left: 1px solid var(--border); padding: 18px;
      transform: translateX(105%); transition: .25s;
      box-shadow: var(--shadow); overflow: auto;
    }
    .side-menu.open .menu-panel { transform: translateX(0); }
    .menu-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .menu-head h2 { font-family: var(--font-heading); font-size: 1.2rem; }
    .menu-list { display: grid; gap: 10px; }
    .menu-link {
      display: flex; align-items: center; gap: 12px; text-decoration: none;
      color: var(--ink); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; background: var(--bg); font-weight: 600;
      text-align: left; width: 100%; font-family: var(--font-body);
    }
    .menu-link:hover { background: var(--accentb); border-color: var(--accent); }

    main { max-width: 980px; margin: auto; padding: 22px 16px 42px; }
    .hero {
      border: 1px solid var(--border);
      background: linear-gradient(135deg, var(--accentb), rgba(240,168,122,.08));
      border-radius: 20px; padding: 18px; margin-bottom: 18px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 4px 16px rgba(26,24,20,.05);
    }
    .hero-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--accent); color: #fff;
      display: grid; place-items: center; font-size: 24px; flex: none;
    }
    .hero h2 {
      font-family: var(--font-heading); font-size: 20px;
      line-height: 1.25; letter-spacing: -.3px;
    }
    .hero p { color: var(--ink2); font-size: 14px; margin-top: 4px; line-height: 1.45; }
    .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .pill {
      border: 1px solid var(--border); background: var(--card);
      border-radius: 999px; padding: 7px 10px;
      font-size: 12px; font-weight: 600; color: var(--ink2);
    }

    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; gap: 10px;
    }
    .count-text { color: var(--ink2); font-size: 14px; font-weight: 600; }
    .list { display: grid; gap: 14px; }
    .topic-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px;
      box-shadow: 0 4px 16px rgba(26,24,20,.05);
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: .22s;
      width: 100%; text-align: left; color: var(--ink);
      font-family: var(--font-body);
    }
    .topic-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow); border-color: var(--accent);
    }
    .topic-strip {
      width: 7px; height: 48px; border-radius: 999px;
      background: linear-gradient(180deg, var(--accent), var(--accentl));
      flex: none;
    }
    .topic-main { min-width: 0; flex: 1; }
    .topic-title {
      font-family: var(--font-heading); font-size: 17px;
      font-weight: 700; line-height: 1.3; word-break: break-word;
      letter-spacing: -.2px;
    }
    .stats {
      display: flex; align-items: center; gap: 9px; flex-wrap: wrap;
      color: var(--ink2); font-size: 13px; font-weight: 500; margin-top: 8px;
    }
    .sep { color: var(--ink3); }
    .arrow {
      width: 36px; height: 36px; border-radius: 12px;
      display: grid; place-items: center;
      background: var(--accentb); color: var(--accent);
      font-weight: 700; flex: none;
    }
    .all-card {
      border-color: rgba(212,84,14,.3);
      background: linear-gradient(135deg, var(--accentb), rgba(240,168,122,.05)), var(--card);
    }

    .skeleton-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px;
      box-shadow: 0 4px 16px rgba(26,24,20,.05);
    }
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg) 50%, var(--bg2) 75%);
      background-size: 220% 100%; animation: shine 1.1s infinite linear;
      border-radius: 12px;
    }
    @keyframes shine { to { background-position: -220% 0; } }
    .sk-title { height: 22px; width: 70%; margin-bottom: 12px; }
    .sk-row { height: 14px; width: 45%; }

    .empty, .error {
      padding: 32px 20px; text-align: center;
      border: 1px dashed var(--border); border-radius: 16px;
      background: var(--card); color: var(--ink2);
    }
    .empty h3, .error h3 {
      font-family: var(--font-heading); color: var(--ink); margin-bottom: 8px;
    }
    .error {
      border-color: rgba(212,84,14,.25);
      background: var(--accentb); color: var(--accent);
    }

    .toast-box { position: fixed; top: 82px; right: 16px; z-index: 100; display: grid; gap: 10px; }
    .toast {
      min-width: 260px; max-width: 340px; background: var(--card);
      border: 1px solid var(--border); border-left: 4px solid var(--accent);
      box-shadow: var(--shadow); border-radius: 14px; padding: 14px;
      animation: toastIn .25s ease;
    }
    .toast.danger { border-left-color: var(--accent); }
    .toast h4 { font-family: var(--font-heading); font-size: 14px; }
    .toast p { font-size: 13px; color: var(--ink2); margin-top: 3px; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    .footer-note { text-align: center; margin-top: 28px; color: var(--ink3); font-size: 13px; }

    @media (max-width: 620px) {
      .brand-text h1 { font-size: 16px; }
      .brand-text p { max-width: 180px; }
      .hero { align-items: flex-start; }
      .hero h2 { font-size: 18px; }
      .topic-card { padding: 14px; }
      .topic-title { font-size: 16px; }
      .stats { font-size: 12px; }
      .arrow { display: none; }
      .hide-sm { display: none; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="nav">
      <div class="left-nav">
        <button class="icon-btn" id="backBtn" title="Back">‹</button>
        <div class="logo">M</div>
        <div class="brand-text">
          <h1 id="pageTitle">Subject</h1>
          <p id="pageSubTitle">Mtaiirus Topics</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="searchToggle" title="Search">🔍</button>
        <button class="icon-btn" id="themeToggle" title="Theme">🌙</button>
        <button class="icon-btn" id="menuToggle" title="Menu">☰</button>
      </div>
    </div>
    <div class="search-wrap hidden" id="searchWrap">
      <div class="search-box">
        <span class="search-icon">🔎</span>
        <input id="searchInput" type="search" placeholder="Search topics..." autocomplete="off" />
        <button class="clear-search hidden" id="clearSearch" title="Clear">×</button>
      </div>
    </div>
  </header>

  <aside class="side-menu" id="sideMenu">
    <div class="menu-overlay" data-close-menu></div>
    <div class="menu-panel">
      <div class="menu-head">
        <h2>Menu</h2>
        <button class="icon-btn" data-close-menu>×</button>
      </div>
      <div class="menu-list">
        <a class="menu-link" href="/">🏠 Home</a>
        <a class="menu-link" href="/study-v2/batches">📚 Batches</a>
        <button class="menu-link" id="reloadBtn">🔄 Reload Topics</button>
        <!-- UPDATED: Telegram link -->
        <a class="menu-link" href="https://t.me/mtaiirus" target="_blank" rel="noopener noreferrer">📢 Telegram</a>
      </div>
    </div>
  </aside>

  <main>
    <section class="hero">
      <div class="hero-icon">📖</div>
      <div>
        <h2 id="heroTitle">Loading subject topics...</h2>
        <p>Choose a topic to open videos, exercises and notes.</p>
        <div class="meta-row">
          <span class="pill" id="batchPill">BatchId: --</span>
          <span class="pill" id="subjectPill">SubjectId: --</span>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <p class="count-text" id="countText">Loading...</p>
      <button class="btn" id="clearSearchToolbar">Clear Search</button>
    </section>

    <section id="statusArea"></section>
    <section class="list" id="topicList"></section>
    <p class="footer-note">© 2025 Mtaiirus · Made with ♥ for Students of India</p>
  </main>

  <div class="toast-box" id="toastBox"></div>

  <script src="/apv/pwcont.js"></script>
</body>
</html>
