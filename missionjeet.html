
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#D4540E">
  <title>Mtaiirus — Mission JEET Batches</title>
  <meta name="description" content="Access free premium Mission JEET batches on Mtaiirus. No sign-up. No subscription. Just study.">
  <link rel="icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" />
  <link rel="apple-touch-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    :root {
      --bg: #F5F2EB;
      --bg2: #ECEAE2;
      --ink: #1A1814;
      --ink2: #6B6760;
      --ink3: #B0ADA7;
      --accent: #D4540E;
      --accentl: #F0A87A;
      --accentb: rgba(212,84,14,.08);
      --green: #2D6A3F;
      --greenl: #E4F0E8;
      --card: #FFFDFB;
      --border: rgba(26,24,20,.1);
      --borderh: rgba(26,24,20,.2);
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background:
        radial-gradient(ellipse at 20% 0%, rgba(212,84,14,.06), transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(240,168,122,.04), transparent 50%),
        var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 56px 24px 40px;
      position: relative;
      z-index: 1;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      object-fit: contain;
      border: 2px solid var(--border);
      background: #fff;
      margin: 0 auto 16px;
      display: block;
    }

    .header h1 {
      font-family: var(--font-heading);
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
    }

    .header h1 .white { color: var(--ink); }

    .header h1 .gradient {
      background: linear-gradient(135deg, #D4540E, #e8651f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .subtitle {
      margin-top: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--ink3);
    }

    /* ── Grid ── */
    .grid-wrapper {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px 80px;
      position: relative;
      z-index: 1;
    }

    .batch-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      justify-items: center;
    }

    @media (max-width: 1024px) {
      .batch-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .batch-grid { grid-template-columns: 1fr; }
      .header { padding: 40px 20px 28px; }
    }

    /* ── Batch Card ── */
    .batch-card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 1.5rem;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(26,24,20,.08);
      transition: border-color 0.4s ease, box-shadow 0.4s ease, transform 0.4s ease;
      opacity: 0;
      transform: translateY(40px);
    }

    .batch-card.visible {
      animation: cardEntrance 0.6s ease forwards;
    }

    .batch-card:hover {
      border-color: var(--accent);
      box-shadow: 0 16px 48px rgba(212,84,14,.12), 0 8px 32px rgba(26,24,20,.1);
      transform: translateY(-4px);
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card Image ── */
    .card-image-wrap {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: var(--bg2);
    }

    .card-image-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .batch-card:hover .card-image-wrap img {
      transform: scale(1.08);
    }

    /* ── Enrolled Pin Badge ── */
    .enrolled-pin {
      position: absolute;
      top: 16px; right: 16px;
      width: 36px; height: 36px;
      background: var(--greenl);
      border: 1.5px solid rgba(45,106,63,.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 2;
    }

    .enrolled-pin::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(45,106,63,.3);
      animation: pinPulse 2s ease-in-out infinite;
    }

    @keyframes pinPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%      { transform: scale(1.3); opacity: 0; }
    }

    .enrolled-pin svg { width: 16px; height: 16px; color: var(--green); }

    /* ── Card Body ── */
    .card-body {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card-title {
      font-family: var(--font-heading);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ink);
      text-align: center;
      transition: color 0.3s ease;
      line-height: 1.35;
      letter-spacing: -.2px;
    }

    .batch-card:hover .card-title { color: var(--accent); }

    /* ── Action Buttons ── */
    .card-actions {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.04em;
      padding: 14px 20px;
      border-radius: .875rem;
      transition: all 0.3s ease;
      text-decoration: none;
      line-height: 1;
    }

    .btn:active { transform: scale(0.95); }

    .btn-explore {
      flex: 1;
      background: var(--ink);
      color: var(--bg);
      border: none;
    }

    .btn-explore:hover {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 28px rgba(212,84,14,.3);
    }

    .btn-explore svg { width: 16px; height: 16px; transition: transform 0.3s ease; }
    .btn-explore:hover svg { transform: translateX(3px); }

    .btn-enroll {
      min-width: 80px;
      border-radius: .875rem;
      background: var(--accentb);
      color: var(--ink2);
      border: 1px solid var(--border);
    }

    .btn-enroll:hover {
      background: var(--bg2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-enroll svg { width: 16px; height: 16px; }

    .btn-enroll.is-enrolled {
      background: var(--greenl);
      color: var(--green);
      border-color: rgba(45,106,63,.5);
      box-shadow: 0 0 20px rgba(45,106,63,.08);
    }

    .btn-enroll.is-enrolled:hover {
      background: rgba(45,106,63,.15);
    }

    /* ── Show More ── */
    .show-more-wrap {
      display: flex;
      justify-content: center;
      margin-top: 44px;
    }

    .btn-show-more {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      color: var(--ink);
      border: 1px solid var(--border);
      padding: 16px 36px;
      border-radius: 1rem;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .btn-show-more:hover {
      background: var(--accentb);
      border-color: var(--accent);
    }

    .btn-show-more:active { transform: scale(0.95); }

    .btn-show-more svg {
      width: 20px; height: 20px;
      color: var(--accent);
      transition: transform 0.3s ease;
    }

    .btn-show-more:hover svg { transform: translateY(3px); }

    .hidden { display: none !important; }

    /* ── Loading State ── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      min-height: 40vh;
      position: relative;
      z-index: 1;
    }

    .spinner {
      width: 56px; height: 56px;
      border: 4px solid var(--accentb);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accentb); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(212,84,14,.3); }
  </style>
</head>
<body>

  <!-- Loading State -->
  <div id="loading" class="loading-state">
    <div class="spinner"></div>
    <div class="loading-text">Loading Batches...</div>
  </div>

  <!-- Main Content -->
  <div id="app" class="hidden">
    <header class="header">
      <img class="brand-logo" src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" alt="Mtaiirus" onerror="this.style.display='none'" />
      <h1><span class="white">Mission</span> <span class="gradient">JEET</span></h1>
      <p class="subtitle">Mtaiirus Exclusive Batches — Free Premium Access</p>
    </header>

    <div class="grid-wrapper">
      <div id="batchGrid" class="batch-grid"></div>
      <div id="showMoreWrap" class="show-more-wrap hidden">
        <button id="showMoreBtn" class="btn-show-more" onclick="showMore()">
          Show More
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const BATCHES = [
      { id: 185, title: 'Drona 2.0 JEE Class 11th', thumbnail: 'https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/2967410_131_drona%202.0%20JEE%20banner%20app.png' },
      { id: 184, title: 'Drona 2.0 NEET Class 11th', thumbnail: 'https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/241318_131_drona%202.0%20NEET%20banner%20app.png' },
      { id: 151, title: 'Drona JEE class 11th', thumbnail: 'https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/7574748_131_Class%2011th%20Mission%20Jeet%20JEE%20App%20Banners.jpg' },
      { id: 152, title: 'Drona NEET class 11th', thumbnail: 'https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/4072473_131_Class%2011th%20Mission%20Jeets%20NEET%20App%20Banners.jpg' }
    ];

    const FALLBACK_IMG = 'https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg';
    const LS_KEY = 'mtaiirus_enrollments';
    const PER_PAGE = 4;
    let visibleCount = 0;

    function getEnrollments() {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
      catch { return []; }
    }

    function setEnrollments(ids) { localStorage.setItem(LS_KEY, JSON.stringify(ids)); }

    function isEnrolled(id) { return getEnrollments().includes(id); }

    function toggleEnroll(id) {
      let enrolled = getEnrollments();
      if (enrolled.includes(id)) { enrolled = enrolled.filter(x => x !== id); }
      else { enrolled.push(id); }
      setEnrollments(enrolled);
      renderAll();
    }

    function getSortedBatches() {
      const enrolled = getEnrollments();
      return [...BATCHES].sort((a, b) => {
        const aE = enrolled.includes(a.id) ? 0 : 1;
        const bE = enrolled.includes(b.id) ? 0 : 1;
        return aE - bE;
      });
    }

    function buildCard(batch, index) {
      const enrolled = isEnrolled(batch.id);
      const enrolledPin = enrolled
        ? `<div class="enrolled-pin">
             <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
               <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/>
             </svg>
           </div>`
        : '';

      const enrollBtnClass = enrolled ? 'btn btn-enroll is-enrolled' : 'btn btn-enroll';
      const enrollIcon = enrolled
        ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>`
        : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>`;
      const enrollLabel = enrolled ? 'Enrolled' : 'Enroll';

      return `
        <div class="batch-card" data-index="${index}" style="animation-delay: ${index * 100}ms">
          <div class="card-image-wrap">
            <img src="${batch.thumbnail}" alt="${batch.title}" onerror="this.onerror=null;this.src='${FALLBACK_IMG}';" loading="lazy" />
            ${enrolledPin}
          </div>
          <div class="card-body">
            <div class="card-title">${batch.title}</div>
            <div class="card-actions">
              <a href="../missionjeet/batch.html?courseId=${batch.id}" class="btn btn-explore">
                Explore
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" /></svg>
              </a>
              <button class="${enrollBtnClass}" onclick="toggleEnroll(${batch.id})">
                ${enrollIcon}
                <span style="font-size:11px">${enrollLabel}</span>
              </button>
            </div>
          </div>
        </div>`;
    }

    function renderAll() {
      const sorted = getSortedBatches();
      const grid = document.getElementById('batchGrid');
      const showMoreWrap = document.getElementById('showMoreWrap');

      if (visibleCount === 0) visibleCount = PER_PAGE;
      const toShow = sorted.slice(0, visibleCount);

      grid.innerHTML = toShow.map((b, i) => buildCard(b, i)).join('');

      requestAnimationFrame(() => {
        const cards = grid.querySelectorAll('.batch-card');
        cards.forEach((card, i) => {
          setTimeout(() => card.classList.add('visible'), i * 100);
        });
      });

      if (visibleCount < sorted.length) {
        showMoreWrap.classList.remove('hidden');
      } else {
        showMoreWrap.classList.add('hidden');
      }
    }

    function showMore() {
      visibleCount += PER_PAGE;
      renderAll();
    }

    // ═══════════ SECURITY ═══════════
    (function() {
      'use strict';
      var R='kehamhai.html',f=false,t=160;
      function rd(){if(f)return;f=true;location.replace(R)}
      setInterval(function(){var w=outerWidth-innerWidth,h=outerHeight-innerHeight;if(w>t||h>t)rd()},600);
      setInterval(function(){(function(){var d=new Date();debugger;if(new Date()-d>100)rd()})()},3000);
      document.addEventListener('contextmenu',function(e){e.preventDefault();e.stopPropagation();return false},true);
      ['selectstart','dragstart','copy','cut'].forEach(function(e){document.addEventListener(e,function(ev){ev.preventDefault();return false})});
      document.addEventListener('keydown',function(e){var k=e.key||'';if(e.keyCode===123||k==='F12'){e.preventDefault();e.stopPropagation();return false}if((e.ctrlKey||e.metaKey)&&e.shiftKey&&['I','J','C'].includes(k.toUpperCase())){e.preventDefault();e.stopPropagation();return false}if((e.ctrlKey||e.metaKey)&&['u','s','p','a'].includes(k.toLowerCase())){e.preventDefault();e.stopPropagation();return false}},true);
      try{var n=function(){};['log','warn','error','info','debug'].forEach(function(m){if(console[m])console[m]=n})}catch(_){}
      document.documentElement.style.setProperty('-webkit-user-select','none');
    })();

    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        renderAll();
      }, 500);
    });
  </script>
</body>
</html>
