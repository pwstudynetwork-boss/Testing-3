<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mtaiirus — Free Premium Courses</title>
<link rel="icon" type="image/x-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F2EB;
    --bg2: #ECEAE2;
    --ink: #1A1814;
    --ink2: #6B6760;
    --ink3: #B0ADA7;
    --accent: #D4540E;
    --accentl: #F0A87A;
    --accentb: rgba(212,84,14,.08);
    --green: #2D6A3F;
    --greenl: #E4F0E8;
    --blue: #1A4B8C;
    --bluel: #E4EBF7;
    --card: #FFFDFB;
    --border: rgba(26,24,20,.1);
    --borderh: rgba(26,24,20,.2);
    --red: #D4540E;
    --yellow: #f59e0b;
    --shadow: 0 1px 4px rgba(26,24,20,.08), 0 4px 16px rgba(26,24,20,.06);
    --shadow-lg: 0 4px 24px rgba(26,24,20,.12);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; border: none; outline: none; font-family: inherit; }
  img { display: block; }
  input { font-family: inherit; outline: none; border: none; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ink3); border-radius: 4px; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(100%)} to{opacity:1;transform:translateY(0)} }
  @keyframes dotsTravel {
    0%   { left:66px; width:8px;  height:8px;  opacity:0.3; background:var(--ink3); }
    25%  { left:46px; width:14px; height:14px; opacity:1;   background:var(--accent); }
    50%  { left:27px; width:14px; height:14px; opacity:1;   background:var(--accent); }
    75%  { left:10px; width:11px; height:11px; opacity:0.6; background:var(--accentl); }
    100% { left:0px;  width:7px;  height:7px;  opacity:0;   background:var(--ink3); }
  }
  .dots-loader { position:relative; width:75px; height:20px; }
  .dots-loader div {
    position:absolute; border-radius:50%; top:50%; transform:translateY(-50%);
    animation: dotsTravel 2s ease-in-out infinite;
  }
  .dots-loader div:nth-child(1){animation-delay:-2s}
  .dots-loader div:nth-child(2){animation-delay:-1.34s}
  .dots-loader div:nth-child(3){animation-delay:-0.68s}
  .page-enter { animation: fadeIn 0.25s ease both; }

  .page { display:none; }
  .page.active { display:block; }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,242,235,.92); backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; padding: 0 16px; max-width: 1280px; margin: 0 auto;
  }
  .header-brand {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800;
    color: var(--ink); letter-spacing: 1.2px; text-decoration: none;
  }
  .header-brand span { color: var(--accent); }
  .blogo {
    width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; overflow: hidden; background: #fff;
    border: 1px solid var(--border);
  }
  .blogo img { width: 32px; height: 32px; object-fit: contain; display: block; }
  .header-search-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg2); display:flex; align-items:center; justify-content:center;
    transition: background 0.2s; color: var(--ink2);
  }
  .header-search-btn:hover { background: var(--accentb); color: var(--accent); }
  .header-search-row { display: flex; align-items: center; gap: 8px; width: 100%; }
  .header-search-input {
    flex: 1; background: var(--bg2); border-radius: 24px;
    padding: 8px 16px; font-size: 0.875rem; color: var(--ink);
  }
  .header-search-input::placeholder { color: var(--ink3); }
  .header-close-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--bg2); display:flex; align-items:center; justify-content:center;
    color: var(--ink2);
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--accent); font-size: 0.875rem; font-weight: 600;
    padding: 4px 8px; border-radius: 8px; background: var(--accentb);
    transition: opacity 0.2s;
  }
  .back-btn:hover { opacity: 0.8; }

  /* ── PDF VIEWER OVERLAY ── */
  .pdf-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(26,24,20,0.85); backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease both;
  }
  .pdf-overlay.open { display: flex; flex-direction: column; }
  .pdf-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--card);
    border-bottom: 1px solid var(--border); gap: 12px;
    flex-shrink: 0;
  }
  .pdf-toolbar-title {
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
    color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pdf-toolbar-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .pdf-toolbar-btn {
    width: 36px; height: 36px; border-radius: 8px; background: var(--bg2);
    color: var(--ink2); display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; font-size: 16px;
  }
  .pdf-toolbar-btn:hover { background: var(--accentb); color: var(--accent); }
  .pdf-toolbar-btn.danger:hover { background: rgba(212,84,14,.15); color: var(--accent); }
  .pdf-container {
    flex: 1; background: #525659; display: flex; align-items: center;
    justify-content: center; padding: 16px; overflow: auto;
  }
  .pdf-container iframe {
    width: 100%; height: 100%; border: none; border-radius: 8px;
    background: #fff; max-width: 900px; box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .pdf-loading {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    color: var(--bg); font-weight: 600;
  }

  .hero {
    background: var(--ink);
    padding: 32px 20px 40px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 200px; height: 200px; border-radius: 50%;
    background: rgba(212,84,14,0.08);
  }
  .hero::after {
    content: '';
    position: absolute; bottom: -60px; left: -30px;
    width: 240px; height: 240px; border-radius: 50%;
    background: rgba(240,168,122,0.06);
  }
  .hero-content { max-width: 1280px; margin: 0 auto; position: relative; z-index: 1; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(212,84,14,.2); color: var(--accentl);
    padding: 4px 12px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .hero-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.5rem, 4vw, 2.25rem); font-weight: 800;
    color: var(--bg); line-height: 1.2; margin-bottom: 8px;
    letter-spacing: -1px;
  }
  .hero-subtitle {
    font-size: 0.9rem; color: rgba(245,242,235,.65); max-width: 480px;
  }
  .hero-stats { display: flex; gap: 24px; margin-top: 20px; }
  .hero-stat { text-align: center; }
  .hero-stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.25rem; font-weight: 800; color: var(--bg);
  }
  .hero-stat-label {
    font-size: 0.7rem; color: rgba(245,242,235,.45);
    margin-top: 2px; text-transform: uppercase; letter-spacing: 1px;
  }

  .container { max-width: 1280px; margin: 0 auto; padding: 0 16px; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 24px 0 16px;
  }
  .section-title {
    font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800;
    color: var(--ink); display: flex; align-items: center; gap: 8px;
  }
  .section-title-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  }
  .section-count {
    font-size: 0.75rem; color: var(--ink2);
    background: var(--bg2); padding: 3px 8px; border-radius: 20px;
  }

  .filter-row {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
    margin-bottom: 16px; scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    font-size: 0.8rem; font-weight: 600; border: 1.5px solid var(--border);
    background: var(--card); color: var(--ink2); cursor: pointer;
    transition: all 0.2s;
  }
  .chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .chip:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .courses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
    padding-bottom: 32px;
  }

  .course-card {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border); overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    cursor: pointer; display: flex; flex-direction: column;
    position: relative;
  }
  .course-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg); border-color: var(--borderh);
  }
  .course-card-thumb { position: relative; padding: 10px 10px 0; }
  .course-card-img {
    width: 100%; aspect-ratio: 16/9; object-fit: cover;
    border-radius: 8px; background: var(--bg2);
  }
  .course-card-badges {
    position: absolute; top: 18px; left: 18px; right: 18px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 20px;
    font-size: 0.65rem; font-weight: 700; letter-spacing: .4px;
    text-transform: uppercase;
  }
  .badge-live { background: var(--accent); }
  .badge-live .dot { width:6px;height:6px;border-radius:50%;background:white;animation:pulse 1.2s infinite; }
  .badge-enrolled { background: var(--green); }
  .badge-inactive { background: var(--ink3); }
  .badge-recorded { background: var(--blue); }
  .badge-completed { background: var(--ink3); }
  .badge-upcoming { background: var(--yellow); color: var(--ink); }
  .badge-primary { background: var(--ink); color: var(--bg); }
  .badge-green { background: var(--green); }

  .course-card-body { padding: 12px 14px 14px; flex: 1; display: flex; flex-direction: column; }
  .course-card-title {
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
    color: var(--ink); line-height: 1.35; flex: 1;
  }
  .course-card-desc {
    font-size: 0.75rem; color: var(--ink2); margin-top: 4px;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
  }
  .course-card-price { display: flex; align-items: baseline; gap: 6px; margin-top: 8px; }
  .price-current { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: var(--ink); }
  .price-original { font-size: 0.78rem; color: var(--ink3); text-decoration: line-through; }
  .price-discount {
    font-size: 0.7rem; font-weight: 700; color: var(--green);
    background: var(--greenl); padding: 2px 6px; border-radius: 10px;
  }
  .course-card-meta { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .course-meta-tag {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 0.68rem; color: var(--ink2);
  }
  .course-card-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
    transition: all 0.18s; flex: 1; font-family: 'DM Sans', sans-serif;
  }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { background: var(--accent); }
  .btn-outline { background: var(--card); color: var(--ink); border: 1.5px solid var(--border); }
  .btn-outline:hover { background: var(--accentb); border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--accentb); color: var(--accent); border: 1.5px solid rgba(212,84,14,.25); }
  .btn-danger:hover { background: var(--accent); color: #fff; }
  .btn-sm { padding: 6px 10px; font-size: 0.78rem; }
  .btn-ghost { background: transparent; color: var(--ink2); padding: 6px 10px; font-size: 0.82rem; }
  .btn-ghost:hover { background: var(--bg2); color: var(--ink); }
  .btn-live { background: var(--accent); color: white; }
  .btn-live:hover { background: #bf4a0c; }
  .btn-disabled { background: var(--bg2); color: var(--ink3); cursor: not-allowed; }
  .btn-icon { width:32px;height:32px;padding:0;flex:0 0 32px;border-radius:50%; background:var(--bg2);color:var(--ink2); }
  .btn-icon:hover{background:var(--accentb);color:var(--accent);}

  .empty-state, .error-state {
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 20px; gap: 12px; text-align: center;
  }
  .empty-icon { font-size: 3rem; opacity: 0.3; }
  .error-state p { color: var(--accent); font-size: 0.9rem; }
  .empty-state p { color: var(--ink2); font-size: 0.9rem; }

  .loader-center { display:flex;justify-content:center;align-items:center;padding:60px 0; }

  .batch-hero {
    background: var(--ink);
    padding: 20px 16px 28px; position: relative; overflow:hidden;
  }
  .batch-hero::after {
    content:''; position:absolute; bottom:-50px;right:-50px;
    width:180px;height:180px;border-radius:50%;
    background:rgba(212,84,14,0.1);
  }
  .batch-hero-inner { max-width:1280px;margin:0 auto;position:relative;z-index:1; }
  .batch-hero-thumb {
    width:100%;max-width:520px; aspect-ratio:16/9;
    object-fit:cover; border-radius:10px;
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
    margin-bottom: 16px;
  }
  .batch-hero-title {
    font-family: 'Syne', sans-serif;
    font-size:clamp(1.2rem,3vw,1.75rem);font-weight:800;color:var(--bg);margin-bottom:8px;
    line-height:1.25;letter-spacing:-.5px;
  }
  .batch-hero-price { display:flex;align-items:baseline;gap:10px;margin-top:10px; }
  .batch-price-big { font-family: 'Syne', sans-serif; font-size:1.5rem;font-weight:800;color:var(--bg); }
  .batch-price-orig { font-size:0.9rem;color:rgba(245,242,235,.45);text-decoration:line-through; }

  .tabs-nav {
    display:flex; overflow-x:auto; scrollbar-width:none;
    background:var(--card); border-bottom:1px solid var(--border);
    position:sticky; top:56px; z-index:90;
  }
  .tabs-nav::-webkit-scrollbar{display:none}
  .tab-btn {
    display:flex;align-items:center;gap:6px;
    padding:14px 18px; white-space:nowrap;
    font-size:0.85rem;font-weight:600; color:var(--ink2);
    border-bottom:2px solid transparent; transition:all 0.18s;
    background:transparent; font-family: 'DM Sans', sans-serif;
  }
  .tab-btn:hover{color:var(--accent);background:var(--accentb);}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

  .tab-panel { display:none; }
  .tab-panel.active { display:block; animation: fadeIn 0.2s ease both; }
  .tab-content { padding:20px 0; }

  .topic-card {
    background:var(--card);border-radius:10px;
    border:1px solid var(--border);padding:14px 16px;
    display:flex;align-items:center;gap:14px;
    cursor:pointer;transition:all 0.2s;margin-bottom:10px;
  }
  .topic-card:hover{transform:translateX(4px);box-shadow:var(--shadow-lg);border-color:var(--borderh);}
  .topic-icon {
    width:44px;height:44px;border-radius:12px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .topic-icon-video{background:var(--accentb);}
  .topic-icon-notes{background:var(--greenl);}
  .topic-info{flex:1;}
  .topic-name{font-family: 'Syne', sans-serif; font-size:0.9rem;font-weight:700;color:var(--ink);}
  .topic-sub{font-size:0.75rem;color:var(--ink2);margin-top:2px;}

  .class-card {
    background:var(--card);border-radius:10px;
    border:1px solid var(--border);overflow:hidden;
    margin-bottom:12px;transition:box-shadow 0.2s;
  }
  .class-card:hover{box-shadow:var(--shadow-lg);}
  .class-card-head {
    padding:12px 14px;border-bottom:1px solid var(--border);
    background:var(--bg);display:flex;align-items:flex-start;gap:10px;
  }
  .class-icon {
    width:40px;height:40px;border-radius:8px;
    background:var(--accentb);display:flex;align-items:center;
    justify-content:center;flex-shrink:0;
  }
  .class-title{font-family: 'Syne', sans-serif; font-size:0.875rem;font-weight:700;color:var(--ink);line-height:1.3;}
  .class-teacher{font-size:0.73rem;color:var(--ink2);margin-top:3px;}
  .class-time{display:flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--ink3);margin-top:3px;}
  .class-card-tabs { display:flex;border-bottom:1px solid var(--border); }
  .class-tab-btn {
    flex:1;padding:8px 0;font-size:0.78rem;font-weight:600;
    color:var(--ink2);border-bottom:2px solid transparent;
    transition:all 0.15s;background:transparent; font-family: 'DM Sans', sans-serif;
  }
  .class-tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--card);}
  .class-tab-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .class-tab-panel{display:none;padding:12px 14px;}
  .class-tab-panel.active{display:block;}

  .overview-section{margin-bottom:24px;}
  .overview-section h3{
    font-family: 'Syne', sans-serif; font-size:0.95rem;font-weight:700;color:var(--ink);
    display:flex;align-items:center;gap:8px;margin-bottom:12px;letter-spacing:-.2px;
  }
  .overview-section ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
  .overview-section ul li{
    font-size:0.85rem;color:var(--ink2);padding:8px 12px;
    background:var(--bg);border-radius:8px;
    display:flex;align-items:flex-start;gap:8px;
  }
  .overview-section ul li::before{content:'•';color:var(--accent);font-weight:bold;flex-shrink:0;}

  .faculty-card{
    background:var(--card);border-radius:12px;
    border:1px solid var(--border);padding:20px;
    display:flex;gap:16px;align-items:flex-start;
  }
  .faculty-img{
    width:72px;height:72px;border-radius:50%;object-fit:cover;
    border:3px solid var(--accentb);flex-shrink:0;
  }
  .faculty-name{font-family: 'Syne', sans-serif; font-size:0.95rem;font-weight:800;}
  .faculty-role{font-size:0.75rem;color:var(--ink2);margin-top:2px;}
  .faculty-exp{font-size:0.73rem;color:var(--accent);margin-top:4px;font-weight:600;}
  .faculty-bio{font-size:0.8rem;color:var(--ink2);margin-top:8px;line-height:1.5;}

  .faq-item{
    background:var(--card);border-radius:10px;
    border:1px solid var(--border);margin-bottom:8px;overflow:hidden;
  }
  .faq-question{
    width:100%;padding:14px 16px;text-align:left;
    display:flex;align-items:center;justify-content:space-between;
    font-size:0.85rem;font-weight:600;color:var(--ink);
    background:transparent; font-family: 'DM Sans', sans-serif;
  }
  .faq-question svg{flex-shrink:0;transition:transform 0.2s;}
  .faq-question.open svg{transform:rotate(180deg);}
  .faq-answer{display:none;padding:0 16px 14px;font-size:0.82rem;color:var(--ink2);line-height:1.6;}
  .faq-answer.open{display:block;}

  .tt-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;background:var(--bg);border-radius:8px;margin-bottom:8px;
  }
  .tt-topic{font-size:0.85rem;font-weight:600;}
  .tt-time{font-size:0.78rem;color:var(--ink2);}

  .modal-overlay{

<script>

// ══════════════════ PDF VIEWER ══════════════════
let currentPdfUrl = '';
let currentPdfName = '';

function openPdfViewer(url, name) {
  currentPdfUrl = url;
  currentPdfName = name || 'PDF Document';
  document.getElementById('pdfTitle').textContent = currentPdfName;
  document.getElementById('pdfLoading').style.display = 'flex';
  document.getElementById('pdfOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  
  const container = document.getElementById('pdfContainer');
  // Remove existing iframe
  const existingIframe = container.querySelector('iframe');
  if (existingIframe) existingIframe.remove();
  
  // Create new iframe
  const iframe = document.createElement('iframe');
  iframe.src = url;
  iframe.onload = function() {
    document.getElementById('pdfLoading').style.display = 'none';
  };
  iframe.onerror = function() {
    document.getElementById('pdfLoading').innerHTML = '<span>⚠️ Failed to load PDF. <a href="' + url + '" target="_blank" style="color:var(--accentl);">Open in new tab</a></span>';
  };
  container.appendChild(iframe);
}

function closePdfViewer() {
  document.getElementById('pdfOverlay').classList.remove('open');
  document.body.style.overflow = '';
  const container = document.getElementById('pdfContainer');
  const existingIframe = container.querySelector('iframe');
  if (existingIframe) existingIframe.remove();
  document.getElementById('pdfLoading').style.display = 'flex';
  currentPdfUrl = '';
  currentPdfName = '';
}

function downloadPdf() {
  if (currentPdfUrl) {
    const a = document.createElement('a');
    a.href = currentPdfUrl;
    a.download = currentPdfName || 'document.pdf';
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
}

// Close PDF viewer with Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('pdfOverlay').classList.contains('open')) {
    closePdfViewer();
  }
});

// ══════════════════ STATE ══════════════════
const SW_KEY = 'swEnrolledCourses';
let allCourses = [];
let currentFilter = 'all';
let currentBatchId = null;
let batchData = null;
let videoTopicSelected = null;
let notesTopicSelected = null;
let playerWindow = null;
const PLAYER_URL = '../sw/player.html';

function openPlayer(videoUrl, title, quality = '') {
  if (!videoUrl) { showToast('❌ No video URL available', 'error'); return; }
  const displayTitle = quality ? `${title} (${quality})` : title;
  const encodedUrl = encodeURIComponent(videoUrl);
  const encodedTitle = encodeURIComponent(displayTitle);
  const playerFullUrl = `${PLAYER_URL}?url=${encodedUrl}&title=${encodedTitle}`;
  if (playerWindow && !playerWindow.closed) { playerWindow.focus(); playerWindow.location.href = playerFullUrl; }
  else { playerWindow = window.open(playerFullUrl, 'MtaiirusPlayer', 'width=1100,height=700,menubar=no,toolbar=no,location=no,status=no,resizable=yes'); if (!playerWindow) showToast('⚠️ Please allow popups to play videos', 'error'); }
}

function getEnrolled() { try { const v=JSON.parse(localStorage.getItem(SW_KEY)||'[]'); return Array.isArray(v)?v:[]; } catch{return[];} }
function saveEnrolled(ids){ localStorage.setItem(SW_KEY,JSON.stringify(ids)); }

function parseHash(){ const h = location.hash.slice(1); if(!h||h==='/') return{page:'home',id:null}; const m=h.match(/^\/batch\/(.+)/); return m?{page:'batch',id:m[1]}:{page:'home',id:null}; }
function navigate(page,id=null){ if(page==='batch') location.hash='/batch/'+id; else location.hash='/'; }
function goHome(){ navigate('home'); }
window.addEventListener('hashchange', handleRoute);
window.addEventListener('DOMContentLoaded', ()=>{ initHome(); handleRoute(); });

function handleRoute(){
  const {page,id}=parseHash();
  document.getElementById('page-home').classList.toggle('active',page==='home');
  document.getElementById('page-batch').classList.toggle('active',page==='batch');
  if(page==='batch'&&id){ loadBatch(id); }
}

function toggleHomeSearch(){ document.getElementById('home-header-inner').style.display='none'; document.getElementById('home-search-row').style.display='flex'; document.getElementById('home-search-input').focus(); }
function closeHomeSearch(){ document.getElementById('home-header-inner').style.display='flex'; document.getElementById('home-search-row').style.display='none'; document.getElementById('home-search-input').value=''; filterCourses(); }

async function initHome(){
  renderCoursesGrid('<div class="loader-center"><div class="dots-loader"><div></div><div></div><div></div></div></div>');
  try{
    const res=await fetch('https://backend.multistreaming.site/api/courses/');
    if(!res.ok) throw new Error('Failed to fetch');
    const j=await res.json();
    if(j.state!==200) throw new Error(j.message||'Error');
    allCourses=(j.data||[]).sort((a,b)=>(a.priority??999)-(b.priority??999));
    updateHeroStats(); filterCourses();
  }catch(e){ renderCoursesGrid(`<div class="error-state"><h3>Failed to Load</h3><p>${e.message}</p></div>`); }
}

function updateHeroStats(){
  const enrolled=getEnrolled();
  const live=allCourses.filter(c=>c.isLive&&c.status==='active').length;
  document.getElementById('stat-batches').textContent=allCourses.length;
  document.getElementById('stat-live').textContent=live;
  document.getElementById('stat-enrolled').textContent=enrolled.length;
  document.getElementById('hero-stats').style.display='flex';
}

function setFilter(f,btn){ currentFilter=f; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); btn.classList.add('active'); filterCourses(); }

function filterCourses(){
  const q=(document.getElementById('home-search-input').value||'').toLowerCase();
  const enrolled=getEnrolled();
  let list=allCourses;
  if(q) list=list.filter(c=>c.title.toLowerCase().includes(q)||((c.short_description||'').toLowerCase().includes(q)));
  if(currentFilter==='live') list=list.filter(c=>c.isLive&&c.status==='active');
  else if(currentFilter==='recorded') list=list.filter(c=>c.isRecorded);
  else if(currentFilter==='enrolled') list=list.filter(c=>enrolled.includes(c.id));
  document.getElementById('courses-count').textContent=list.length+' batch'+(list.length!==1?'es':'');
  if(list.length===0){ renderCoursesGrid('<div class="empty-state"><div class="empty-icon">🔍</div><h3>No batches found</h3><p>Try a different filter or search.</p></div>'); return; }
  renderCoursesGrid(list.map(renderCourseCard).join(''));
}

function getThumbnail(c){ return c.banner||c.bannerSquare||'https://placehold.co/400x225/D4540E/white?text=Course'; }

function renderCourseCard(c){
  const enrolled=getEnrolled().includes(c.id);
  const disc=c.price&&c.price>c.discountPrice?Math.round((1-c.discountPrice/c.price)*100):0;
  let leftBadge='';
  if(c.status==='inactive') leftBadge='<span class="badge badge-inactive">Inactive</span>';
  else if(c.isLive) leftBadge='<span class="badge badge-live"><span class="dot"></span>Live</span>';
  else if(c.isRecorded) leftBadge='<span class="badge badge-recorded">📹 Recorded</span>';
  const rightBadge=enrolled?'<span class="badge badge-enrolled">✓ Enrolled</span>':'';
  const enrollBtn=enrolled?`<button class="btn btn-danger" onclick="event.stopPropagation();unenroll('${c.id}')">Unenroll</button>`:`<button class="btn btn-outline" onclick="event.stopPropagation();enroll('${c.id}')">Enroll</button>`;
  const discTag=disc>0?`<span class="price-discount">${disc}% off</span>`:'';
  const origTag=c.price&&c.price>c.discountPrice?`<span class="price-original">₹${c.price}</span>`:'';
  const metaLive=c.isLive?'<span class="course-meta-tag">🔴 Live Classes</span>':'';
  const metaRec=c.isRecorded?'<span class="course-meta-tag">📹 Recorded</span>':'';
  const metaVal=c.validity?`<span class="course-meta-tag">⏳ ${c.validity}</span>`:'';
  return `<div class="course-card page-enter" onclick="navigate('batch','${c.id}')">
    <div class="course-card-thumb"><img class="course-card-img" src="${getThumbnail(c)}" alt="${esc(c.title)}" loading="lazy" onerror="this.src='https://placehold.co/400x225/D4540E/white?text=Course'" /><div class="course-card-badges">${leftBadge}${rightBadge}</div></div>
    <div class="course-card-body"><div class="course-card-title">${esc(c.title)}</div>${c.short_description?`<div class="course-card-desc">${esc(c.short_description)}</div>`:''}<div class="course-card-price"><span class="price-current">₹${c.discountPrice}</span>${origTag}${discTag}</div><div class="course-card-meta">${metaLive}${metaRec}${metaVal}</div><div class="course-card-actions"><button class="btn btn-primary" onclick="event.stopPropagation();navigate('batch','${c.id}')">Study</button>${enrollBtn}</div></div></div>`;
}

function renderCoursesGrid(html){ document.getElementById('courses-grid').innerHTML=html; }
function enroll(id){ const ids=[...getEnrolled(),id]; saveEnrolled(ids); showToast('Enrolled successfully!','success'); filterCourses(); updateHeroStats(); }
function unenroll(id){ saveEnrolled(getEnrolled().filter(x=>x!==id)); showToast('Unenrolled','error'); filterCourses(); updateHeroStats(); }

async function loadBatch(id){
  if(currentBatchId===id&&batchData) return;
  currentBatchId=id; batchData=null; videoTopicSelected=null; notesTopicSelected=null;
  document.getElementById('batch-tabs-nav').style.display='none';
  document.getElementById('batch-tab-content').style.display='none';
  document.getElementById('batch-header-title').textContent='';
  document.getElementById('batch-hero-inner').innerHTML='<div class="loader-center"><div class="dots-loader"><div></div><div></div><div></div></div></div>';
  try{
    const res=await fetch(`https://backend.multistreaming.site/api/courses/${id}`);
    if(!res.ok) throw new Error('Failed to load batch');
    const j=await res.json();
    if(j.state!==200) throw new Error(j.message||'Error');
    batchData=j.data;
    renderBatchHero(batchData, id);
    renderBatchOverview(batchData);
    document.getElementById('tab-videos').innerHTML='<div id="videos-inner"></div>';
    document.getElementById('tab-notes').innerHTML='<div id="notes-inner"></div>';
    renderTimetabTab(batchData);
    document.getElementById('batch-tabs-nav').style.display='flex';
    document.getElementById('batch-tab-content').style.display='block';
    switchTab('overview', document.querySelector('.tab-btn'));
  }catch(e){ document.getElementById('batch-hero-inner').innerHTML=`<div class="error-state" style="padding:40px 0;"><p style="color:var(--bg);">${e.message}</p></div>`; }
}

function renderBatchHero(b, id){
  const enrolled=getEnrolled().includes(id);
  const disc=b.price&&b.price>b.discountPrice?Math.round((1-b.discountPrice/b.price)*100):0;
  const img=b.banner||'https://placehold.co/520x293/1A1814/F0A87A?text=Course';
  document.getElementById('batch-header-title').textContent=b.title;
  document.getElementById('batch-hero-inner').innerHTML=`<img class="batch-hero-thumb" src="${esc(img)}" alt="${esc(b.title)}" onerror="this.src='https://placehold.co/520x293/1A1814/F0A87A?text=Course'" /><h1 class="batch-hero-title">${esc(b.title)}</h1><div class="batch-hero-price"><span class="batch-price-big">₹${b.discountPrice}</span>${b.price&&b.price>b.discountPrice?`<span class="batch-price-orig">₹${b.price}</span><span class="badge badge-green" style="font-size:0.75rem;">${disc}% off</span>`:''}</div><div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;">${b.isLive?'<span class="badge badge-live" style="font-size:0.75rem;"><span class="dot"></span>Live Course</span>':''}${b.isRecorded?'<span class="badge badge-recorded" style="font-size:0.75rem;">📹 Recorded</span>':''}${b.validity?`<span class="badge badge-primary" style="font-size:0.75rem;">⏳ ${esc(b.validity)}</span>`:''}${enrolled?'<span class="badge badge-enrolled" style="font-size:0.75rem;">✓ Enrolled</span>':''}</div><div style="margin-top:16px;display:flex;gap:10px;">${enrolled?`<button class="btn btn-danger" onclick="unenrollBatch('${currentBatchId}')">Unenroll</button>`:`<button class="btn btn-primary" style="background:var(--bg);color:var(--ink);" onclick="enrollBatch('${currentBatchId}')">Enroll Now</button>`}</div>`;
}

function enrollBatch(id){ const ids=[...getEnrolled(),id]; saveEnrolled(ids); renderBatchHero(batchData, id); updateHeroStats(); showToast('Enrolled successfully!','success'); }
function unenrollBatch(id){ saveEnrolled(getEnrolled().filter(x=>x!==id)); renderBatchHero(batchData, id); updateHeroStats(); showToast('Unenrolled','error'); }

function renderBatchOverview(b){
  let html='<div class="page-enter">';
  if(b.description&&b.description.length>0){ html+=`<div class="overview-section"><h3>Course Description</h3><ul>${b.description.map(d=>`<li>${esc(d)}</li>`).join('')}</ul></div>`; }
  if(b.courseHighlights&&b.courseHighlights.length>0){ html+=`<div class="overview-section"><h3>Highlights</h3><ul>${b.courseHighlights.map(h=>`<li>${esc(h)}</li>`).join('')}</ul></div>`; }
  if(b.facultyDetails){ const f=b.facultyDetails; html+=`<div class="overview-section"><h3>Faculty</h3><div class="faculty-card"><img class="faculty-img" src="${esc(f.imageUrl||'')}" alt="${esc(f.name)}" onerror="this.src='https://placehold.co/80x80/D4540E/white?text=${esc(f.name?f.name[0]:'?')}'" /><div><div class="faculty-name">${esc(f.name)}</div><div class="faculty-role">${esc(f.designation||'')}</div><div class="faculty-exp">${esc(f.experience||'')}${f.reach?' · '+esc(f.reach):''}</div>${f.bio?`<div class="faculty-bio">${esc(f.bio)}</div>`:''}</div></div></div>`; }
  if(b.faqs&&b.faqs.length>0){ html+=`<div class="overview-section"><h3>FAQs</h3>${b.faqs.map(f=>`<div class="faq-item"><button class="faq-question" onclick="toggleFaq(this)">${esc(f.question)}<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button><div class="faq-answer">${esc(f.answer)}</div></div>`).join('')}</div>`; }
  html+='</div>';
  document.getElementById('tab-overview').innerHTML=html;
}

function toggleFaq(btn){ btn.classList.toggle('open'); btn.nextElementSibling.classList.toggle('open'); }

async function loadVideosTab(){
  const el=document.getElementById('videos-inner');
  if(videoTopicSelected){ renderVideoTopic(videoTopicSelected); return; }
  el.innerHTML='<div class="loader-center"><div class="dots-loader"><div></div><div></div><div></div></div></div>';
  try{
    const res=await fetch(`https://backend.multistreaming.site/api/courses/${currentBatchId}/classes?populate=full`);
    const j=await res.json();
    const topics=(j.state===200&&j.data?.classes)?j.data.classes:[];
    const valid=topics.filter(t=>(t.classes||[]).length>0);
    if(valid.length===0){el.innerHTML='<div class="empty-state"><div class="empty-icon">🎬</div><p>No videos available yet.</p></div>';return;}
    el.innerHTML=valid.map((t,i)=>`<div class="topic-card" onclick="selectVideoTopic(${i})"><div class="topic-icon topic-icon-video">🎬</div><div class="topic-info"><div class="topic-name">${esc(t.topicName)}</div><div class="topic-sub">${(t.classes||[]).length} lecture${(t.classes||[]).length!==1?'s':''}</div></div><button class="btn-icon">→</button></div>`).join('');
    el._topics=valid;
  }catch(e){el.innerHTML=`<div class="error-state"><p>${e.message}</p></div>`;}
}

function selectVideoTopic(idx){ const el=document.getElementById('videos-inner'); videoTopicSelected=el._topics[idx]; renderVideoTopic(videoTopicSelected); }
function renderVideoTopic(topic){
  const items=topic.classes||[];
  const el=document.getElementById('videos-inner');
  el.innerHTML=`<button class="btn btn-ghost" style="margin-bottom:12px;" onclick="backToVideoTopics()">← Back to Topics</button><h3 style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:14px;">${esc(topic.topicName)}</h3>${items.map(cls=>renderClassCard(cls)).join('')}`;
}
function backToVideoTopics(){ videoTopicSelected=null; loadVideosTab(); }

function renderClassCard(cls){
  const isLive=cls.isLive&&cls.streamStatus!=='ended';
  const isUpcoming=cls.startDate&&new Date(cls.startDate)>new Date()&&!isLive;
  const isCompleted=cls.streamStatus==='ended'||(!isLive&&!isUpcoming);
  const hasRec=cls.mp4Recordings&&cls.mp4Recordings.length>0;
  const hasNotes=cls.classPdf&&cls.classPdf.length>0;
  const statusBadge=isLive?'<span class="badge badge-live"><span class="dot"></span>LIVE</span>':isUpcoming?'<span class="badge badge-upcoming">Upcoming</span>':'<span class="badge badge-completed">Completed</span>';
  const dateStr=cls.startDate?`<span class="class-time">${new Date(cls.startDate).toLocaleDateString()} • ${new Date(cls.startDate).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>`:'';
  let videoSection='';
  if(isLive){ videoSection=`<button class="btn btn-live" style="width:100%;" onclick="openLink('${esc(cls.class_link||'')}')">Join Live</button>`; }
  else if(isCompleted&&hasRec){ if(cls.mp4Recordings.length>1){ videoSection='<div style="display:flex;flex-wrap:wrap;gap:6px;">'+cls.mp4Recordings.map(r=>`<button class="btn btn-primary btn-sm" onclick="openPlayer('${esc(r.url)}', '${esc(cls.title)}', '${esc(r.quality)}')">▶ ${esc(r.quality)}</button>`).join('')+'</div>'; } else { videoSection=`<button class="btn btn-primary" style="width:100%;" onclick="openPlayer('${esc(cls.mp4Recordings[0].url)}', '${esc(cls.title)}')">▶ Watch Recording</button>`; } }
  else if(isUpcoming){ videoSection='<button class="btn btn-disabled" style="width:100%;" disabled>⏳ Upcoming</button>'; }
  else { videoSection=`<button class="btn btn-outline" style="width:100%;" onclick="openLink('${esc(cls.class_link||'')}')">▶ Play Video</button>`; }
  
  // Notes section with built-in PDF viewer
  const notesSection=hasNotes?cls.classPdf.map(pdf=>`<div class="pdf-row"><div class="pdf-row-info"><span class="pdf-row-name">${esc(pdf.name)}</span></div><button class="btn btn-primary btn-sm" onclick="openPdfViewer('${esc(pdf.url)}', '${esc(pdf.name)}')">📄 View</button></div>`).join(''):'<p style="font-size:0.8rem;color:var(--ink3);padding:8px 0;">No notes for this lecture</p>';
  
  const cardId='card-'+Math.random().toString(36).slice(2);
  return `<div class="class-card"><div class="class-card-head"><div class="class-icon">🎬</div><div style="flex:1;min-width:0;"><div class="class-title">${esc(cls.title)}</div>${cls.teacherName?`<div class="class-teacher">By ${esc(cls.teacherName)}</div>`:''}${dateStr}</div>${statusBadge}</div><div class="class-card-tabs"><button class="class-tab-btn active" onclick="switchClassTab(this,'${cardId}','video')">Lecture</button><button class="class-tab-btn" onclick="switchClassTab(this,'${cardId}','notes')" ${!hasNotes?'disabled':''}>Notes${hasNotes?` (${cls.classPdf.length})`:' (0)'}</button></div><div id="${cardId}-video" class="class-tab-panel active">${videoSection}</div><div id="${cardId}-notes" class="class-tab-panel">${notesSection}</div></div>`;
}

function switchClassTab(btn, cardId, tab){ const card=btn.closest('.class-card'); card.querySelectorAll('.class-tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); card.querySelectorAll('.class-tab-panel').forEach(p=>p.classList.remove('active')); document.getElementById(cardId+'-'+tab).classList.add('active'); }

async function loadNotesTab(){
  const el=document.getElementById('notes-inner');
  if(notesTopicSelected){ renderNotesTopic(notesTopicSelected); return; }
  el.innerHTML='<div class="loader-center"><div class="dots-loader"><div></div><div></div><div></div></div></div>';
  try{
    const res=await fetch(`https://gdgoenkaratia.com/api/courses/${currentBatchId}/pdfs?groupBy=topic`);
    const j=await res.json();
    const topics=(j.state===200&&j.data?.topics)?j.data.topics.filter(t=>t.pdfs&&t.pdfs.length>0):[];
    if(topics.length===0){el.innerHTML='<div class="empty-state"><div class="empty-icon">📄</div><p>No notes available yet.</p></div>';return;}
    el.innerHTML=topics.map((t,i)=>`<div class="topic-card" onclick="selectNotesTopic(${i})"><div class="topic-icon topic-icon-notes">📄</div><div class="topic-info"><div class="topic-name">${esc(t.topicName)}</div><div class="topic-sub">${t.pdfs.length} note${t.pdfs.length!==1?'s':''}</div></div><button class="btn-icon">→</button></div>`).join('');
    el._topics=topics;
  }catch(e){el.innerHTML=`<div class="error-state"><p>${e.message}</p></div>`;}
}

function selectNotesTopic(idx){ const el=document.getElementById('notes-inner'); notesTopicSelected=el._topics[idx]; renderNotesTopic(notesTopicSelected); }
function renderNotesTopic(topic){
  document.getElementById('notes-inner').innerHTML=`<button class="btn btn-ghost" style="margin-bottom:12px;" onclick="backToNotesTopics()">← Back to Topics</button><h3 style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:14px;">${esc(topic.topicName)}</h3>${topic.pdfs.map(pdf=>`<div class="pdf-row"><div class="pdf-row-info"><div><div class="pdf-row-name">${esc(pdf.title)}</div>${pdf.teacherName?`<div style="font-size:0.7rem;color:var(--ink3);">By ${esc(pdf.teacherName)}</div>`:''}</div></div><button class="btn btn-primary btn-sm" onclick="openPdfViewer('${esc(pdf.uploadPdf)}', '${esc(pdf.title)}')">📄 View</button></div>`).join('')}`;
}
function backToNotesTopics(){ notesTopicSelected=null; loadNotesTab(); }

async function renderTimetabTab(b){
  const el=document.getElementById('tab-timetable');
  const timeTable=b.timeTable||[];
  el.innerHTML='<div class="loader-center"><div class="dots-loader"><div></div><div></div><div></div></div></div>';
  let liveHtml='<p style="font-size:0.85rem;color:var(--ink3);padding:20px 0 10px;text-align:center;">No classes scheduled for today.</p>';
  try{
    const res=await fetch(`https://gdgoenkaratia.com/api/courses/${currentBatchId}/todays-classes`,{method:'POST',headers:{'Content-Type':'application/json','Origin':'https://www.selectionway.com'},body:JSON.stringify({}),cache:'no-store'});
    if(res.ok){ const j=await res.json(); const classes=j?.data?.classes||[]; if(classes.length>0){ const sorted=[...classes].sort((a,b)=>{ const o={LIVE:0,Upcoming:1,Completed:2}; return (o[getLiveStatus(a)]??2)-(o[getLiveStatus(b)]??2); }); liveHtml=sorted.map(c=>renderLiveClassCard(c)).join(''); } }
  }catch(e){}
  const ttHtml=timeTable.length>0?timeTable.map(t=>`<div class="tt-row"><span class="tt-topic">${esc(t.topic)}</span><span class="tt-time">${esc(t.time)}</span></div>`).join(''):'<p style="font-size:0.85rem;color:var(--ink3);padding:20px 0;text-align:center;">Time table will be updated soon.</p>';
  el.innerHTML=`<div class="overview-section"><h3>Today's Classes</h3>${liveHtml}</div><div class="overview-section"><h3>Time Table</h3>${ttHtml}</div>`;
}

function getLiveStatus(cls){ if(cls.isLive&&cls.streamStatus!=='ended') return 'LIVE'; if(cls.streamStatus==='ended') return 'Completed'; if(cls.startDate&&new Date(cls.startDate)>new Date()) return 'Upcoming'; return 'Completed'; }

function renderLiveClassCard(cls){
  const status=getLiveStatus(cls);
  const hasRec=cls.mp4Recordings&&cls.mp4Recordings.length>0;
  const badge=status==='LIVE'?'<span class="badge badge-live"><span class="dot"></span>LIVE</span>':status==='Upcoming'?'<span class="badge badge-upcoming">Upcoming</span>':'<span class="badge badge-completed">Completed</span>';
  let actionBtn='';
  if(status==='LIVE'&&cls.class_link){ actionBtn=`<button class="btn btn-live" style="width:100%;margin-top:10px;" onclick="openLink('${esc(cls.class_link)}')">Join Live</button>`; }
  else if(status==='Completed'&&hasRec){ if(cls.mp4Recordings.length>1){ actionBtn='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;">'+cls.mp4Recordings.map(r=>`<button class="btn btn-primary btn-sm" onclick="openPlayer('${esc(r.url)}', '${esc(cls.title)}', '${esc(r.quality)}')">▶ ${esc(r.quality)}</button>`).join('')+'</div>'; } else { actionBtn=`<button class="btn btn-primary" style="width:100%;margin-top:10px;" onclick="openPlayer('${esc(cls.mp4Recordings[0].url)}', '${esc(cls.title)}')">▶ Watch Recording</button>`; } }
  else if(status==='Upcoming'){ actionBtn=`<button class="btn btn-disabled" style="width:100%;margin-top:10px;" disabled>⏳ Upcoming</button>`; }
  return `<div class="class-card" style="margin-bottom:10px;"><div class="class-card-head"><div class="class-icon">📅</div><div style="flex:1;min-width:0;"><div class="class-title">${esc(cls.title)}</div><div class="class-time">${new Date(cls.startDate).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}${cls.endDate?` – ${new Date(cls.endDate).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`:''}</div></div>${badge}</div>${actionBtn?`<div style="padding:10px 14px;">${actionBtn}</div>`:''}</div>`;
}

function switchTab(name, clickedBtn){
  document.querySelectorAll('#batch-tabs-nav .tab-btn').forEach(b=>b.classList.remove('active'));
  if(clickedBtn) clickedBtn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const panel=document.getElementById('tab-'+name);
  if(panel) panel.classList.add('active');
  if(name==='videos') loadVideosTab();
  if(name==='notes') loadNotesTab();
}

function showQualityPicker(recs, title){
  document.getElementById('quality-options').innerHTML=recs.map(r=>`<button class="quality-btn" onclick="pickQuality('${esc(r.url)}', '${esc(title)}')"><span>${esc(r.quality)}</span><span class="quality-size">${r.size.toFixed(0)} MB</span></button>`).join('');
  document.getElementById('quality-modal').classList.add('open');
}
function pickQuality(url, title){ closeQualityModal(); openPlayer(url, title); }
function closeQualityModal(e){ if(e&&e.target!==document.getElementById('quality-modal')) return; document.getElementById('quality-modal').classList.remove('open'); }
function openLink(url){ if(url) window.open(url,'_blank','noopener,noreferrer'); }
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

function showToast(msg, type='success'){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div');t.id='toast'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;padding:10px 20px;border-radius:24px;font-size:0.85rem;font-weight:600;color:white;box-shadow:0 4px 20px rgba(0,0,0,0.2);transition:opacity 0.3s;pointer-events:none;'; document.body.appendChild(t); }
  t.textContent=msg; t.style.background=type==='success'?`var(--green)`:`var(--accent)`; t.style.opacity='1';
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.style.opacity='0',2800);
}
</script>
</body>
</html>
